name: Apple Build & Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: apple-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.8.3
  BUNDLE_ID: "com.netdiagnostic.app"
  APP_NAME: "NetDiagnostics"
  APP_SKU: "netdiag.ios.001"
  APP_LOCALE: "en-US"
  PROFILE_NAME: "NetDiagnostics AppStore"
  QT_INSTALL_DIR: "/Users/runner/qt-ios"
  QT_HOST_DIR: "/Users/runner/qt-desktop"

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Version — compute once, shared by all build jobs
  # ═══════════════════════════════════════════════════════════════════════
  version:
    name: Detect Version
    runs-on: ubuntu-latest
    outputs:
      pkg_version: ${{ steps.v.outputs.pkg_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: v
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -v '[-]' | head -1)
          VER="${LATEST#v}"
          echo "pkg_version=${VER:-0.0.1}" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════════════
  # macOS arm64 — native Apple Clang + simulator + DMG
  # ═══════════════════════════════════════════════════════════════════════
  macos-arm64:
    name: macOS arm64
    needs: [version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja qt@6

      - name: Generate macOS app icon (.icns)
        run: |
          mkdir -p icon.iconset
          sips -z 16 16 resources/icons/netanalysis.png --out icon.iconset/icon_16x16.png 2>/dev/null
          sips -z 32 32 resources/icons/netanalysis.png --out icon.iconset/icon_32x32.png 2>/dev/null
          sips -z 128 128 resources/icons/netanalysis.png --out icon.iconset/icon_128x128.png 2>/dev/null
          sips -z 256 256 resources/icons/netanalysis.png --out icon.iconset/icon_256x256.png 2>/dev/null
          sips -z 512 512 resources/icons/netanalysis.png --out icon.iconset/icon_512x512.png 2>/dev/null
          sips -z 1024 1024 resources/icons/netanalysis.png --out icon.iconset/icon_512x512@2x.png 2>/dev/null
          iconutil -c icns icon.iconset -o resources/icons/netanalysis.icns 2>/dev/null && echo "icon generated" || echo "icon skipped (png not found)"
        continue-on-error: true

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=macos-arm64 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostics

      - name: Bundle Qt frameworks (macdeployqt)
        run: |
          if [ -d build/net_diagnostics.app ]; then
            QT_PREFIX="$(brew --prefix qt@6)"
            echo "Qt prefix: ${QT_PREFIX}"
            # -qmldir is required so macdeployqt scans QML source files and
            # deploys all imported QML modules (QtQuick, QtQuick.Controls,
            # QtQuick.Layouts, etc.).  Binary-only auto-detection is unreliable
            # when QML files are embedded in .qrc resources.
            # macdeployqt reports non-fatal rpath errors for optional Qt modules
            # (StateMachine/Pdf/3D) not installed by brew qt@6 and not used by
            # this app.  Tolerate these so the build continues.
            "${QT_PREFIX}/bin/macdeployqt" build/net_diagnostics.app \
              -qmldir="${GITHUB_WORKSPACE}/resources/qml" \
              -verbose=1 || true
            echo "[OK] Qt frameworks bundled into .app"
            ls -la build/net_diagnostics.app/Contents/Frameworks/ 2>/dev/null || echo "  (no Frameworks dir)"
          else
            echo "[WARN] No .app bundle found; skipping macdeployqt"
          fi

      - name: Ad-hoc code sign (DMG artifact)
        run: |
          if [ -d build/net_diagnostics.app ]; then
            # Inside-out signing: sign frameworks → inner binary → .app bundle
            # (--deep is deprecated — Apple: "doesn't correctly sign nested code")
            if [ -d build/net_diagnostics.app/Contents/Frameworks ]; then
              find build/net_diagnostics.app/Contents/Frameworks -name "*.framework" -type d | while read fw; do
                codesign --force --sign - "$fw"
              done
            fi
            BIN=build/net_diagnostics.app/Contents/MacOS/net_diagnostics
            [ -f "$BIN" ] && codesign --force --sign - "$BIN"
            codesign --force --sign - build/net_diagnostics.app
            echo "[OK] .app ad-hoc signed (inside-out)"
          fi

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=macos-arm64 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostics_sim

      - name: Package DMG (production)
        continue-on-error: true
        run: |
          if [ -d build/net_diagnostics.app ]; then
            echo "Creating DMG with installer layout..."
            rm -rf dmg-staging
            mkdir -p dmg-staging
            cp -R build/net_diagnostics.app dmg-staging/
            ln -s /Applications dmg-staging/Applications
            hdiutil create -volname "NetDiagnostic" \
              -srcfolder dmg-staging \
              -ov -format UDZO \
              NetDiagnostics-macOS-arm64.dmg
            ls -lh NetDiagnostics-macOS-arm64.dmg
          else
            echo "No .app bundle found; falling back to binary packaging"
            mkdir -p pkg/NetDiagnostic.app/Contents/MacOS
            cp build/net_diagnostics pkg/NetDiagnostic.app/Contents/MacOS/
            hdiutil create -volname "NetDiagnostic" -srcfolder pkg/NetDiagnostic.app -ov -format UDZO NetDiagnostics-macOS-arm64.dmg || true
          fi

      - name: Tar .app (preserve symlinks + permissions)
        run: tar -czf NetDiagnostics-macOS.tar.gz -C build net_diagnostics.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-macOS-arm64
          path: |
            NetDiagnostics-macOS.tar.gz
            *.dmg
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # iOS — native build via aqtinstall + Xcode, production IPA
  # ═══════════════════════════════════════════════════════════════════════
  ios:
    name: iOS Build
    needs: [version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/select-xcode

      - name: Install dependencies
        run: |
          brew install cmake ninja python3
          pip3 install --break-system-packages aqtinstall

      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          install_dir: ${{ env.QT_HOST_DIR }}
          cache_key_prefix: qt6-ios-desktop

      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: ios
          arch: ios
          install_dir: ${{ env.QT_INSTALL_DIR }}
          cache_key_prefix: qt6-ios

      - name: Configure
        run: |
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          "$QT_INSTALL_DIR/$QT_VERSION/ios/bin/qt-cmake" \
            -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=ios \
            -DQT_HOST_PATH="$QT_HOST_DIR/$QT_VERSION/macos" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -B build -S .

      - name: Build
        run: ninja -v -C build net_diagnostics

      - name: Verify bundle
        run: |
          if [ -d build/net_diagnostics.app ]; then
            echo "[OK] .app bundle generated"
            ls -la build/net_diagnostics.app/
          else
            echo "[X] No .app bundle"; exit 1
          fi

      - name: Package IPA
        run: |
          APP_PATH="build/net_diagnostics.app"
          [ -d "$APP_PATH" ] || APP_PATH=$(find build -name "*.app" -type d | head -1)
          [ -n "$APP_PATH" ] || { echo "[X] No .app found for IPA packaging"; exit 1; }
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r NetDiagnostics-iOS.ipa Payload
          ls -lh NetDiagnostics-iOS.ipa

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-iOS
          path: |
            NetDiagnostics-iOS.ipa
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # TestFlight — upload macOS .pkg + iOS .ipa to Apple TestFlight
  # ═══════════════════════════════════════════════════════════════════════
  deploy-testflight:
    name: Deploy to TestFlight
    needs: [version, macos-arm64, ios]
    if: (!failure()) && (!cancelled())
    runs-on: macos-latest
    environment: TestFlight

    steps:
      - uses: actions/checkout@v4

      # ── Common setup ─────────────────────────────────────────────────
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install cmake ninja python3
          pip3 install --break-system-packages aqtinstall

      # ── Dedup: skip upload if this commit was already pushed to TestFlight ─
      # 5WHY: Every CI run uploaded to TestFlight even when source code was
      # unchanged, creating duplicate builds in App Store Connect and wasting
      # ~5 min per upload. Best practice: cache last-uploaded commit SHA.
      - name: Check if already uploaded
        id: dedup
        uses: actions/cache/restore@v4
        with:
          path: .testflight-sha
          key: testflight-uploaded-${{ runner.os }}-v1
      - name: Read last uploaded SHA
        id: last-sha
        run: |
          if [ -f .testflight-sha/macos ]; then
            echo "macos_last=$(cat .testflight-sha/macos)" >> "$GITHUB_OUTPUT"
          else
            echo "macos_last=none" >> "$GITHUB_OUTPUT"
          fi
          if [ -f .testflight-sha/ios ]; then
            echo "ios_last=$(cat .testflight-sha/ios)" >> "$GITHUB_OUTPUT"
          else
            echo "ios_last=none" >> "$GITHUB_OUTPUT"
          fi
          echo "current=${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Report dedup status
        run: |
          echo "Current commit: ${{ github.sha }}"
          echo "Last uploaded macOS: ${{ steps.last-sha.outputs.macos_last }}"
          echo "Last uploaded iOS:   ${{ steps.last-sha.outputs.ios_last }}"
          if [ "${{ steps.last-sha.outputs.macos_last }}" = "${{ github.sha }}" ]; then
            echo "[SKIP] macOS — same commit already uploaded, skipping"
          fi
          if [ "${{ steps.last-sha.outputs.ios_last }}" = "${{ github.sha }}" ]; then
            echo "[SKIP] iOS   — same commit already uploaded, skipping"
          fi

      # ── macOS: download artifact → untar → inject plist → sign → .pkg ──
      - uses: actions/download-artifact@v4
        with:
          name: NetDiagnostics-macOS-arm64
          path: macos-artifact

      - name: Extract macOS .app from tarball
        run: |
          tar -xzf macos-artifact/NetDiagnostics-macOS.tar.gz -C macos-artifact/
          find macos-artifact -name "*.app" -type d | head -5
          echo "Extraction OK"

      - name: Inject required Info.plist keys (macOS App Store)
        run: |
          APP=$(find macos-artifact -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in macOS artifact"; exit 1
          fi
          PLIST="$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 26.0" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 26.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :LSApplicationCategoryType string public.app-category.utilities" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :LSApplicationCategoryType public.app-category.utilities" "$PLIST"
          echo "=== Info.plist after injection ==="
          /usr/libexec/PlistBuddy -c "Print" "$PLIST" | grep -E "LSMinimum|LSCategory" || true

      - name: Install macOS provisioning profile
        run: |
          APP=$(find macos-artifact -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in macOS artifact"; exit 1
          fi
          if [ -n "${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}" ]; then
            echo -n "${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}" \
              | base64 -d > "$RUNNER_TEMP/mac-profile.provisionprofile"
            # Embed in .app (macOS App Store requirement)
            cp "$RUNNER_TEMP/mac-profile.provisionprofile" "$APP/Contents/embedded.provisionprofile"
            echo "[OK] macOS provisioning profile embedded"
          else
            echo "[WARN] MACOS_PROVISIONING_PROFILE_BASE64 not set —"
            echo "  macOS TestFlight upload will fail with profile-missing error."
            echo "  Generate one at: https://developer.apple.com/account/resources/profiles/list"
          fi

      - uses: ./.github/actions/setup-keychain
        id: mac-keychain
        with:
          primary_cert_base64: ${{ secrets.MACOS_INSTALLER_CERT_BASE64 }}
          primary_cert_password: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
          secondary_cert_base64: ${{ secrets.MACOS_APP_CERT_BASE64 }}
          secondary_cert_password: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
          allowed_tools: "/usr/bin/codesign /usr/bin/pkgbuild /usr/bin/productbuild"

      - name: Sign .app with entitlements and package as .pkg
        run: |
          APP=$(find macos-artifact -name "*.app" -type d | head -1)
          echo "macOS app: $APP"
          KCHAIN="${{ steps.mac-keychain.outputs.keychain_path }}"
          CODE_ID="${{ steps.mac-keychain.outputs.code_identity }}"
          PKG_ID="${{ steps.mac-keychain.outputs.installer_identity }}"
          if [ -z "$CODE_ID" ]; then
            echo "ERROR: No Mac App Distribution (code signing) identity found in keychain."
            echo "  Add the MACOS_APP_CERT_BASE64 / MACOS_APP_CERT_PASSWORD secrets containing"
            echo "  a '3rd Party Mac Developer Application' or 'Apple Distribution' certificate."
            exit 1
          fi
          # Sign frameworks first (inside-out signing order — required
          # after macdeployqt bundles Qt into Contents/Frameworks/)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
              codesign --force --options runtime --timestamp \
                --sign "$CODE_ID" --keychain "$KCHAIN" \
                "$fw"
            done
            echo "[OK] frameworks signed"
          fi
          # 5WHY: Apple distribution requires ALL executable code to be
          # signed, not just .framework bundles. macdeployqt copies
          # Homebrew Qt's standalone .dylib dependencies (libpcre2, libb2,
          # etc.) into Contents/Frameworks/ and Qt plugins (.dylib) into
          # Contents/PlugIns/. These flat .dylib files were missed by the
          # framework-only signing step, causing TestFlight upload failure
          # with "Invalid signature" errors.
          # Fix: sign all .dylib files outside .framework bundles first
          # (inside-out order: dylibs → frameworks → binary → .app).
          find "$APP/Contents" -name "*.dylib" -type f | while read dylib; do
            # Skip dylibs inside .framework bundles — those are already
            # signed with their parent framework above
            case "$dylib" in
              */Contents/Frameworks/*.framework/*) continue ;;
            esac
            codesign --force --options runtime --timestamp \
              --sign "$CODE_ID" --keychain "$KCHAIN" \
              "$dylib"
          done
          echo "[OK] standalone dylibs signed"
          # 5WHY: QtWebEngine bundles a helper .app (QtWebEngineProcess.app)
          # inside QtWebEngineCore.framework. Apple requires ALL executables,
          # including nested .app bundles, to be signed with App Sandbox
          # entitlements for TestFlight/App Store distribution.
          # Fix: sign nested .app bundles with the same entitlements as the
          # main app (inside-out: nested .apps → binary → main .app).
          find "$APP/Contents" -name "*.app" -type d | while read nested; do
            # The nested app's inner binary must be signed first
            NESTED_BIN="$nested/Contents/MacOS"
            if [ -d "$NESTED_BIN" ]; then
              find "$NESTED_BIN" -type f -perm +111 | while read exe; do
                codesign --force --options runtime --timestamp \
                  --entitlements resources/macos.entitlements \
                  --sign "$CODE_ID" --keychain "$KCHAIN" \
                  "$exe"
              done
            fi
            # Sign the nested .app bundle
            codesign --force --options runtime --timestamp \
              --entitlements resources/macos.entitlements \
              --sign "$CODE_ID" --keychain "$KCHAIN" \
              "$nested"
          done
          echo "[OK] nested .app bundles signed"
          # Sign inner binary first (required before signing the .app bundle)
          BIN="$APP/Contents/MacOS/net_diagnostics"
          if [ -f "$BIN" ]; then
            codesign --force --options runtime --timestamp \
              --entitlements resources/macos.entitlements \
              --sign "$CODE_ID" --keychain "$KCHAIN" \
              "$BIN"
            echo "[OK] binary signed"
          fi
          # Sign the .app bundle (deep signs all nested code)
          codesign --force --options runtime --timestamp \
            --entitlements resources/macos.entitlements \
            --sign "$CODE_ID" --keychain "$KCHAIN" \
            "$APP"
          echo "[OK] .app signed with entitlements"
          # Package as signed product archive (.pkg) for App Store / TestFlight
          # pkgbuild creates a component package; productbuild creates a
          # product archive — TestFlight only accepts product archives.
          productbuild --component "$APP" /Applications \
            --sign "$PKG_ID" --keychain "$KCHAIN" \
            NetDiagnostics-macOS.pkg
          ls -lh NetDiagnostics-macOS.pkg

      # ── iOS: rebuild + sign + archive → .ipa ─────────────────────────
      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          install_dir: ${{ env.QT_HOST_DIR }}
          cache_key_prefix: qt6-ios-desktop

      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: ios
          arch: ios
          install_dir: ${{ env.QT_INSTALL_DIR }}
          cache_key_prefix: qt6-ios

      - name: Write ASC key (late, clean early)
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          K=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_KEY_ID }}.p8
          echo -n "${{ secrets.APPSTORE_CONNECT_API_KEY }}" > "$K"
          chmod 600 "$K"
          echo "ASC_KEYFILE=${K}" >> "$GITHUB_ENV"

      - name: Generate App Store Connect JWT
        id: jwt
        run: |
          source scripts/ios/asc-app.sh
          JWT=$(asc_jwt \
            "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            "$ASC_KEYFILE")
          echo "jwt=${JWT}" >> "$GITHUB_OUTPUT"

      - name: Register Bundle ID + WiFi capability
        id: bundle
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"
          BID=$(asc_bundle_ensure "$JWT" "$APP_NAME" "$BUNDLE_ID")
          asc_bundle_capability_enable "$JWT" "$BID" ACCESS_WIFI_INFORMATION
          echo "bundle_id=${BID}" >> "$GITHUB_OUTPUT"

      - name: Ensure App Store Connect app
        id: asc-app
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"
          APP_ID=$(asc_app_ensure "$JWT" "$APP_NAME" "$BUNDLE_ID" "$APP_SKU" "$APP_LOCALE")
          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-keychain
        id: ios-keychain
        with:
          primary_cert_base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          primary_cert_password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          allowed_tools: "/usr/bin/codesign /usr/bin/xcodebuild"

      - name: Find distribution certificate
        id: cert-id
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"
          CERT_ID=$(asc_cert_find_distribution "$JWT")
          if [ -n "$CERT_ID" ]; then
            echo "cert_id=${CERT_ID}" >> "$GITHUB_OUTPUT"
            echo "auto_signing=false" >> "$GITHUB_OUTPUT"
          else
            echo "cert_id=" >> "$GITHUB_OUTPUT"
            echo "auto_signing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure provisioning profile
        id: profile
        run: |
          if [ -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ]; then
            echo -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" \
              | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
              <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")" 2>/dev/null || echo "")
            if [ -n "$PROFILE_UUID" ]; then
              PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
              mkdir -p "$PROFILE_DIR"
              cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
              echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
              echo "[OK] User-provided profile (UUID: ${PROFILE_UUID})"
              exit 0
            fi
          fi
          if [ "${{ steps.cert-id.outputs.auto_signing }}" != "true" ]; then
            source scripts/ios/asc-app.sh
            JWT="${{ steps.jwt.outputs.jwt }}"
            BID="${{ steps.bundle.outputs.bundle_id }}"
            CID="${{ steps.cert-id.outputs.cert_id }}"
            PROFILE_ID=$(asc_profile_ensure "$JWT" "$PROFILE_NAME" "$BID" "$CID")
            if [ -n "$PROFILE_ID" ]; then
              PROFILE_B64=$(asc_profile_download "$JWT" "$PROFILE_ID")
              if [ -n "$PROFILE_B64" ]; then
                echo -n "$PROFILE_B64" | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"
                PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
                  <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")" 2>/dev/null || echo "")
                if [ -n "$PROFILE_UUID" ]; then
                  PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
                  mkdir -p "$PROFILE_DIR"
                  cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
                  echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
                  echo "[OK] Auto-created profile (UUID: ${PROFILE_UUID})"
                  exit 0
                fi
              fi
            fi
          fi
          echo "profile_uuid=" >> "$GITHUB_OUTPUT"
          echo "[INFO] Falling back to Xcode automatic signing"

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" resources/Info.plist

      - name: Configure CMake for iOS (Xcode)
        run: |
          export IOS_TEAM_ID="${{ secrets.IOS_TEAM_ID }}"
          export ND_WIFI_ENTITLEMENT=1
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          "$QT_INSTALL_DIR/$QT_VERSION/ios/bin/qt-cmake" \
            -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=ios \
            -DQT_HOST_PATH="$QT_HOST_DIR/$QT_VERSION/macos" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -B build-ios -S .

      - name: Build and archive iOS
        run: |
          PROFILE_UUID="${{ steps.profile.outputs.profile_uuid }}"
          if [ -n "$PROFILE_UUID" ]; then
            echo "Manual signing with profile: $PROFILE_UUID"
            xcodebuild archive \
              -project build-ios/NetDiagnostic.xcodeproj \
              -scheme net_diagnostics \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build-ios/NetDiagnostic.xcarchive \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
              CODE_SIGN_STYLE="Manual" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
              CODE_SIGN_IDENTITY="iPhone Distribution" \
              -verbose 2>&1 | tail -100
          else
            echo "Automatic signing"
            xcodebuild archive \
              -project build-ios/NetDiagnostic.xcodeproj \
              -scheme net_diagnostics \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build-ios/NetDiagnostic.xcarchive \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
              CODE_SIGN_STYLE="Automatic" \
              -allowProvisioningUpdates \
              -authenticationKeyID "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
              -authenticationKeyIssuerID "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
              -authenticationKeyPath "$ASC_KEYFILE" \
              -verbose 2>&1 | tail -100
          fi
          [ -d build-ios/NetDiagnostic.xcarchive ] || { echo "[X] Archive failed"; exit 1; }
          echo "[OK] iOS archive created"

      - name: Package iOS IPA
        run: |
          APP_PATH="build-ios/NetDiagnostic.xcarchive/Products/Applications/net_diagnostics.app"
          [ -d "$APP_PATH" ] || APP_PATH=$(find build-ios/NetDiagnostic.xcarchive -name "*.app" -type d | head -1)
          [ -n "$APP_PATH" ] || { echo "[X] No .app found"; exit 1; }
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r NetDiagnostics-iOS.ipa Payload
          ls -lh NetDiagnostics-iOS.ipa

      # ── Upload + immediate cleanup ────────────────────────────────────
      # NOTE: xcrun altool is deprecated since Xcode 14 (2023).
      # Apple may remove it in a future Xcode release.
      # Migrate to: xcrun xcodebuild -exportArchive + App Store Connect API
      # See: https://developer.apple.com/documentation/xcode/uploading-apps-to-app-store-connect
      - name: Upload iOS to TestFlight
        if: steps.last-sha.outputs.ios_last != github.sha
        run: |
          xcrun altool --upload-app \
            -f NetDiagnostics-iOS.ipa \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --verbose
          echo "[OK] iOS uploaded to TestFlight"

      - name: Upload macOS to TestFlight
        if: steps.last-sha.outputs.macos_last != github.sha
        run: |
          xcrun altool --upload-app \
            -f NetDiagnostics-macOS.pkg \
            -t macos \
            --apiKey "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --verbose
          echo "[OK] macOS uploaded to TestFlight"

      # ── Persist uploaded SHA for dedup on next run ─────────────────────
      - name: Save uploaded SHA
        if: always()
        run: |
          mkdir -p .testflight-sha
          if [ "${{ steps.last-sha.outputs.ios_last }}" != "${{ github.sha }}" ]; then
            echo "${{ github.sha }}" > .testflight-sha/ios
          else
            echo "${{ steps.last-sha.outputs.ios_last }}" > .testflight-sha/ios
          fi
          if [ "${{ steps.last-sha.outputs.macos_last }}" != "${{ github.sha }}" ]; then
            echo "${{ github.sha }}" > .testflight-sha/macos
          else
            echo "${{ steps.last-sha.outputs.macos_last }}" > .testflight-sha/macos
          fi
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: .testflight-sha
          key: testflight-uploaded-${{ runner.os }}-v1

      - name: Clean up keys
        if: always()
        run: |
          rm -f "$ASC_KEYFILE" 2>/dev/null || true
