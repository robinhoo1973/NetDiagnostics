name: Apple Build & Deploy

on:
  push:
    tags: ['v*']
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: apple-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.8.3
  BUNDLE_ID: "com.netdiagnostic.app"
  APP_NAME: "NetDiagnostics"
  APP_SKU: "netdiag.ios.001"
  APP_LOCALE: "en-US"
  PROFILE_NAME: "NetDiagnostics AppStore"
  QT_INSTALL_DIR: "/Users/runner/qt-ios"
  QT_HOST_DIR: "/Users/runner/qt-desktop"

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Version — compute once, shared by all build jobs (reusable workflow)
  # 5WHY: was copy-pasted across build.yml/apple.yml/test.yml; now DRY.
  # ═══════════════════════════════════════════════════════════════════════
  version:
    name: Detect Version
    uses: ./.github/workflows/version.yml

  # ═══════════════════════════════════════════════════════════════════════
  # macOS arm64 — native Apple Clang + simulator + DMG
  # ═══════════════════════════════════════════════════════════════════════
  macos-arm64:
    name: macOS arm64
    needs: [version]
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja qt@6

      - uses: ./.github/actions/macos-icon

      # ═════════════════════════════════════════════════════════════════
      # Phase 1: Debug build + startup crash test + full auto-test
      # 5WHY: Release builds succeed but crash at startup on real
      # devices (d->i corruptions, SIOF, missing QML plugins).
      # Debug builds surface these issues with better diagnostics.
      # ═════════════════════════════════════════════════════════════════
      - name: Configure (debug)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=macos-arm64 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-debug -S .

      - name: Build (debug)
        run: ninja -C build-debug net_diagnostics

      - name: Startup Crash Test (debug)
        run: |
          echo "=== macOS Debug Startup Crash Test ==="
          BIN="build-debug/net_diagnostics"
          if [ ! -f "$BIN" ]; then
            BIN="build-debug/net_diagnostics.app/Contents/MacOS/net_diagnostics"
          fi
          if [ ! -f "$BIN" ]; then
            echo "[FAIL] Binary not found"; exit 1
          fi
          # 5WHY: httpbin.org was an uncontrolled external dependency.
          # If it was down or rate-limited, CI would fail for reasons
          # unrelated to the code under test.  Fix: start a local HTTP
          # server with security headers so all G5 diagnostics (including
          # G5SecurityHeaders which checks 7 headers) can run deterministically.
          # This eliminates the external dependency and speeds up the test.
          python3 scripts/ci-http-server.py 8888 &
          HTTP_PID=$!
          sleep 1  # Wait for server socket to bind
          # Run full auto-test in offscreen mode
          QT_QPA_PLATFORM=offscreen \
            ND_AUTO_TEST=1 \
            ND_AUTO_TEST_TARGET=localhost:8888 \
            ND_AUTO_TEST_EXIT_CODE=1 \
            "$BIN" 2>&1 | tail -30
          EXIT_CODE=$?
          kill $HTTP_PID 2>/dev/null || true
          if [ $EXIT_CODE -ne 0 ]; then
            echo "[FAIL] Debug auto-test exit code: $EXIT_CODE"
            exit 1
          fi
          echo "[PASS] macOS Debug startup + auto-test OK"

      # ═════════════════════════════════════════════════════════════════
      # Phase 2: Release build (production) + full auto-test
      # ═════════════════════════════════════════════════════════════════
      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=macos-arm64 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostics

      - name: Startup Crash Test (production)
        run: |
          echo "=== macOS Release Startup Crash Test ==="
          BIN="build/net_diagnostics"
          if [ ! -f "$BIN" ]; then
            BIN="build/net_diagnostics.app/Contents/MacOS/net_diagnostics"
          fi
          if [ ! -f "$BIN" ]; then
            echo "[FAIL] Binary not found"; exit 1
          fi
          # 5WHY: Same self-contained local server as Debug test above.
          python3 scripts/ci-http-server.py 8888 &
          HTTP_PID=$!
          sleep 1
          QT_QPA_PLATFORM=offscreen \
            ND_AUTO_TEST=1 \
            ND_AUTO_TEST_TARGET=localhost:8888 \
            ND_AUTO_TEST_EXIT_CODE=1 \
            "$BIN" 2>&1 | tail -30
          EXIT_CODE=$?
          kill $HTTP_PID 2>/dev/null || true
          if [ $EXIT_CODE -ne 0 ]; then
            echo "[FAIL] Release auto-test exit code: $EXIT_CODE"
            exit 1
          fi
          echo "[PASS] macOS Release startup + auto-test OK"

      - name: Bundle Qt frameworks (macdeployqt)
        run: |
          if [ -d build/net_diagnostics.app ]; then
            QT_PREFIX="$(brew --prefix qt@6)"
            echo "Qt prefix: ${QT_PREFIX}"
            # -qmldir is required so macdeployqt scans QML source files and
            # deploys all imported QML modules (QtQuick, QtQuick.Controls,
            # QtQuick.Layouts, etc.).  Binary-only auto-detection is unreliable
            # when QML files are embedded in .qrc resources.
            # 5WHY: resources/qml/ was deleted in MVC refactoring (QML files
            # moved to src/**/View/). macdeployqt needs a directory root that
            # contains all QML imports. src/ is now the canonical root.
            # 5WHY (v2): The old || true blanket suppression masked FATAL
            # macdeployqt errors (disk full, missing binary, corrupt framework
            # lookup).  The .app would pass CI with missing Qt frameworks and
            # crash at startup on user machines.  Fix: allow known non-fatal
            # rpath warnings for optional Qt modules (StateMachine/Pdf/3D) not
            # in brew qt@6, but FAIL on all other errors.  Then verify that
            # frameworks were actually deployed (outcome-based check).
            MACDEPLOY_LOG=$(mktemp)
            set +e
            "${QT_PREFIX}/bin/macdeployqt" build/net_diagnostics.app \
              -qmldir="${GITHUB_WORKSPACE}/src" \
              -verbose=1 >"$MACDEPLOY_LOG" 2>&1
            MACDEPLOY_EXIT=$?
            set -e
            echo "=== macdeployqt output (last 40 lines) ==="
            tail -40 "$MACDEPLOY_LOG"
            echo "=== end macdeployqt output ==="
            if [ $MACDEPLOY_EXIT -ne 0 ]; then
              # Known non-fatal: rpath warnings for optional Qt modules
              # (StateMachine/Pdf/3D) not installed by brew qt@6.
              # Also: "no external Qt frameworks to deploy" when the binary is
              # already self-contained or only uses system Qt.
              if grep -qE "(ERROR.*rpath|ERROR: Could not find any external Qt|WARNING: Could not find any)" "$MACDEPLOY_LOG"; then
                echo "[INFO] macdeployqt exited $MACDEPLOY_EXIT — known non-fatal (optional Qt modules or self-contained binary)"
              else
                echo "[FAIL] macdeployqt failed with exit code $MACDEPLOY_EXIT (unrecognized error)"
                rm -f "$MACDEPLOY_LOG"
                exit 1
              fi
            fi
            rm -f "$MACDEPLOY_LOG"
            # Outcome-based verification: frameworks must be present if the
            # app links against Qt dynamically (brew qt@6 is dynamic).
            if [ -d build/net_diagnostics.app/Contents/Frameworks ]; then
              FW_COUNT=$(find build/net_diagnostics.app/Contents/Frameworks -maxdepth 1 -not -name Frameworks | wc -l | tr -d ' ')
              echo "[OK] Qt frameworks bundled into .app (${FW_COUNT} entries in Frameworks/)"
              ls -la build/net_diagnostics.app/Contents/Frameworks/
            else
              echo "[WARN] No Frameworks dir after macdeployqt — app may not bundle Qt runtime"
              echo "  This is only safe for fully-static builds; dynamic Qt apps will crash."
            fi
          else
            echo "[WARN] No .app bundle found; skipping macdeployqt"
          fi

      - name: Ad-hoc code sign (DMG artifact)
        run: |
          if [ -d build/net_diagnostics.app ]; then
            # Inside-out signing: sign frameworks → inner binary → .app bundle
            # (--deep is deprecated — Apple: "doesn't correctly sign nested code")
            if [ -d build/net_diagnostics.app/Contents/Frameworks ]; then
              find build/net_diagnostics.app/Contents/Frameworks -name "*.framework" -type d | while read fw; do
                codesign --force --sign - "$fw"
              done
            fi
            BIN=build/net_diagnostics.app/Contents/MacOS/net_diagnostics
            [ -f "$BIN" ] && codesign --force --sign - "$BIN"
            codesign --force --sign - build/net_diagnostics.app
            echo "[OK] .app ad-hoc signed (inside-out)"
          fi

      - name: Configure (simulator)
        run: |
          # 5WHY: was $(brew --prefix qt) — missing @6, resolving to wrong Qt version.
          # Copy-paste error from the production configure step which correctly uses qt@6.
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=macos-arm64 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostics_sim

      - name: Package DMG (production)
        continue-on-error: true
        run: |
          if [ -d build/net_diagnostics.app ]; then
            echo "Creating DMG with installer layout..."
            rm -rf dmg-staging
            mkdir -p dmg-staging
            cp -R build/net_diagnostics.app dmg-staging/
            ln -s /Applications dmg-staging/Applications
            hdiutil create -volname "NetDiagnostics" \
              -srcfolder dmg-staging \
              -ov -format UDZO \
              NetDiagnostics-macOS-arm64.dmg
            ls -lh NetDiagnostics-macOS-arm64.dmg
          else
            echo "No .app bundle found; falling back to binary packaging"
            mkdir -p pkg/NetDiagnostic.app/Contents/MacOS
            cp build/net_diagnostics pkg/NetDiagnostic.app/Contents/MacOS/
            hdiutil create -volname "NetDiagnostics" -srcfolder pkg/NetDiagnostic.app -ov -format UDZO NetDiagnostics-macOS-arm64.dmg || true
          fi

      - name: Tar .app (preserve symlinks + permissions)
        run: tar -czf NetDiagnostics-macOS.tar.gz -C build net_diagnostics.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-macOS-arm64
          path: |
            NetDiagnostics-macOS.tar.gz
            *.dmg
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # iOS — native build via aqtinstall + Xcode, production IPA
  # ═══════════════════════════════════════════════════════════════════════
  ios:
    name: iOS Build
    needs: [version]
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/select-xcode

      - name: Install dependencies
        run: |
          brew install cmake ninja python3
          # 5WHY: --break-system-packages bypasses PEP 668 protection, risking
          # corruption of system Python packages. Use a venv for isolation.
          python3 -m venv /tmp/venv && source /tmp/venv/bin/activate && pip install aqtinstall
          echo "/tmp/venv/bin" >> "$GITHUB_PATH"

      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          install_dir: ${{ env.QT_HOST_DIR }}
          cache_key_prefix: qt6-ios-desktop

      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: ios
          arch: ios
          install_dir: ${{ env.QT_INSTALL_DIR }}
          cache_key_prefix: qt6-ios

      # ═════════════════════════════════════════════════════════════════
      # Phase 1: Debug Ninja build for simulator + startup crash test
      # 5WHY: Xcode build had unpredictable output paths (4 failures).
      # Ninja builds output to build-sim/net_diagnostics.app directly.
      # On Apple Silicon (arm64), Qt for ios shares the same arch as
      # the simulator — the same Qt install may work for both.
      # ═════════════════════════════════════════════════════════════════
      - name: Configure (debug, Ninja, simulator)
        id: sim-config
        run: |
          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          echo "Sim SDK: ${SIM_SDK}"
          "$QT_INSTALL_DIR/$QT_VERSION/ios/bin/qt-cmake" \
            -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=ios \
            -DQT_HOST_PATH="$QT_HOST_DIR/$QT_VERSION/macos" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="${SIM_SDK}" \
            -B build-sim -S . 2>&1 | tail -5

      - name: Build (debug, Ninja, simulator)
        id: sim-build
        run: ninja -C build-sim net_diagnostics 2>&1 | tail -10

      # ═════════════════════════════════════════════════════════════════
      # NOTE: Runtime simulator test is NOT possible in CI because
      # aqtinstall's Qt for ios target links against iphoneos frameworks,
      # not iphonesimulator.  The Ninja build above proves the code
      # compiles for the simulator SDK, but the resulting binary cannot
      # be installed on a simulator (xcrun simctl install rejects it).
      # The macOS arm64 job provides runtime startup crash detection
      # (Debug + Release with ND_AUTO_TEST=1 in offscreen mode).
      # ═════════════════════════════════════════════════════════════════

      # ═════════════════════════════════════════════════════════════════
      # Phase 2: Release device build (production)
      # ═════════════════════════════════════════════════════════════════
      - name: Configure
        run: |
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          "$QT_INSTALL_DIR/$QT_VERSION/ios/bin/qt-cmake" \
            -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=ios \
            -DQT_HOST_PATH="$QT_HOST_DIR/$QT_VERSION/macos" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -B build -S .

      - name: Build
        run: ninja -v -C build net_diagnostics

      # ═════════════════════════════════════════════════════════════════
      # iOS Startup Crash Prevention Checks (static analysis)
      # 5WHY: The device build succeeds but may crash at startup on real
      # devices due to: (1) LTO dead-strip removing diagnostic function
      # symbols, (2) missing QML static plugin imports, (3) QRC resource
      # embedding failures.  These are all detectable via static checks
      # on the built binary without needing a simulator.
      # ═════════════════════════════════════════════════════════════════
      - name: Verify iOS Diagnostic Symbols (LTO dead-strip check)
        run: |
          BIN=build/net_diagnostics.app/net_diagnostics
          echo "=== Checking for iOS diagnostic function symbols ==="
          # 5WHY: C++ name mangling means 'iosDhcpDiag' appears as
          # '__Z13iosDhcpDiag5DiagId' in the symbol table.  Use
          # c++filt to demangle and then grep for the function names.
          MISSING=""
          for sym in \
            iosDhcpDiag \
            iosDefaultGatewayDiag \
            iosRoutingTableDiag \
            iosDnsResolve \
            iosHttpDiagnostic; do
            if nm -g "$BIN" 2>/dev/null | c++filt | grep -q "$sym"; then
              echo "[OK]   $sym"
            else
              echo "[MISS] $sym — stripped by LTO/dead-code elimination"
              MISSING="$MISSING $sym"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing diagnostic function symbols:$MISSING"
            echo "These are called via lambdas in TaskFactory.cpp and need __attribute__((used))."
            exit 1
          fi
          echo "[PASS] All 5 iOS diagnostic symbols present"

      - name: Verify QML Plugin Import Generated
        run: |
          # 5WHY: build 0.0.2 (195) shipped to TestFlight and crashed at
          # startup with SIGABRT because qt_import_qml_plugins() ran AFTER
          # qt_finalize_executable(), so the generated qml_plugin_import.cpp
          # missed QtQuick.Layouts etc.  This step previously only printed
          # [MISS]/[WARN] and never failed, so the broken build passed CI
          # and reached users.  It now hard-fails (exit 1) on any missing
          # plugin or a missing qml_plugin_import.cpp so the regression
          # cannot silently ship again.
          #
          # 5WHY (v2): qml_plugin_import.cpp is only generated for STATIC
          # Qt builds (qt_import_qml_plugins() embeds QML plugins into the
          # binary).  The Ninja build in this job uses aqtinstall's DYNAMIC
          # Qt frameworks (compiled with -F.../QtCore.framework), so the
          # file is NOT expected.  Only static builds (Xcode, used in
          # deploy-testflight) need this check.
          # Fix: detect build type by checking Qt lib mode.  If frameworks
          # exist → dynamic → skip with [INFO].  If .a archives → static →
          # require the file.
          QT_FRAMEWORKS=$(find "$QT_INSTALL_DIR/$QT_VERSION/ios/lib" -name "*.framework" -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$QT_FRAMEWORKS" ]; then
            echo "[INFO] iOS Qt is dynamic (frameworks found) — qml_plugin_import.cpp not generated for dynamic builds."
            echo "[INFO] QML plugins are loaded from Qt frameworks at runtime, not embedded."
            echo "[INFO] Static QML plugin import check is done in deploy-testflight (Xcode static build)."
            echo "[PASS] QML plugin import — N/A for dynamic Ninja build"
            exit 0
          fi
          QML_IMPORT_CPP2=$(find build -name "qml_plugin_import.cpp" 2>/dev/null | head -1)
          if [ -z "$QML_IMPORT_CPP2" ]; then
            echo "[FAIL] qml_plugin_import.cpp not found — QML plugins will not load on iOS (static build)."
            echo "Check that qt_import_qml_plugins() ran BEFORE qt_finalize_executable()."
            exit 1
          fi
          echo "[OK]   qml_plugin_import.cpp found: $QML_IMPORT_CPP2"
          MISSING=""
          for mod in QtQuick QtQuickControls2 QtQuickLayouts; do
            if grep -q "$mod" "$QML_IMPORT_CPP2"; then
              echo "[OK]   $mod plugin registered"
            else
              echo "[MISS] $mod plugin NOT in qml_plugin_import.cpp"
              MISSING="$MISSING $mod"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing QML plugin imports:$MISSING"
            echo "Static iOS build will fail to load QML (rootObjects empty) → startup crash."
            exit 1
          fi
          echo "[PASS] All required QML plugins registered"

      - name: Verify QRC Resources Embedded
        run: |
          # 5WHY: A missing critical QML/font resource produces an empty
          # rootObjects() at runtime → startup failure.
          #
          # 5WHY (v2): The old check used `strings "$BIN" | grep` to find
          # resource aliases in the compiled binary.  This has known false
          # negatives for QML resources loaded via QML `import` statements
          # (e.g. ThemeEngine.qml, qmldir files).  These imports don't leave
          # string literals in the compiled C++ code because the QML engine
          # resolves them from the QRC at runtime.  The fix: verify the QRC
          # source files (.qrc XML) contain the required entries — this is
          # more reliable and doesn't depend on string-literal visibility.
          echo "=== Checking critical QRC resources in .qrc source files ==="
          MISSING=""
          for res in \
            "qml/main.qml" \
            "qml/theme/ThemeEngine.qml" \
            "qml/theme/qmldir" \
            "qml/widgets/qmldir" \
            "qml/screens/qmldir" \
            "fonts/JetBrainsMono-Regular.ttf"; do
            if grep -qr "alias=\"$res\"" resources/*.qrc; then
              echo "[OK]   $res"
            elif grep -qr ">$res<" resources/*.qrc; then
              echo "[OK]   $res"
            else
              echo "[MISS] $res — not found in any .qrc source file"
              MISSING="$MISSING $res"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing critical QRC resource entries:$MISSING"
            echo "These QML resources are required at startup.  Add them to resources/resources.qrc."
            exit 1
          fi
          echo "[PASS] All critical QRC resources registered in .qrc files"

      - name: Verify Required iOS Frameworks Linked
        run: |
          BIN=build/net_diagnostics.app/net_diagnostics
          echo "=== Checking required iOS frameworks ==="
          for fw in \
            NetworkExtension \
            CoreLocation \
            CoreTelephony \
            CFNetwork \
            SystemConfiguration \
            StoreKit; do
            if nm -m "$BIN" 2>/dev/null | grep -q "$fw"; then
              echo "[OK]   $fw"
            else
              echo "[WARN] $fw — not found in symbol table"
            fi
          done
          echo "[PASS] Framework check complete"

      - name: Verify Info.plist Keys
        run: |
          PLIST="build/net_diagnostics.app/Info.plist"
          if [ -f "$PLIST" ]; then
            echo "=== Checking required Info.plist keys ==="
            for key in \
              NSLocationWhenInUseUsageDescription \
              NSLocalNetworkUsageDescription \
              CFBundleIdentifier \
              CFBundleVersion; do
              if /usr/libexec/PlistBuddy -c "Print :$key" "$PLIST" 2>/dev/null | grep -q .; then
                echo "[OK]   $key"
              else
                echo "[MISS] $key — required for iOS operation"
              fi
            done
          fi
          echo "[PASS] Info.plist check complete"

      - name: Verify bundle
        run: |
          if [ -d build/net_diagnostics.app ]; then
            echo "[OK] .app bundle generated"
            ls -la build/net_diagnostics.app/
          else
            echo "[X] No .app bundle"; exit 1
          fi

      - name: Package IPA
        run: |
          APP_PATH="build/net_diagnostics.app"
          [ -d "$APP_PATH" ] || APP_PATH=$(find build -name "*.app" -type d | head -1)
          [ -n "$APP_PATH" ] || { echo "[X] No .app found for IPA packaging"; exit 1; }
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r NetDiagnostics-iOS.ipa Payload
          ls -lh NetDiagnostics-iOS.ipa

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-iOS
          path: |
            NetDiagnostics-iOS.ipa
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # TestFlight — upload macOS .pkg + iOS .ipa to Apple TestFlight
  # ═══════════════════════════════════════════════════════════════════════
  deploy-testflight:
    name: Deploy to TestFlight
    needs: [version, macos-arm64, ios]
    if: (!failure()) && (!cancelled())
    runs-on: macos-latest
    timeout-minutes: 30
    environment: TestFlight

    steps:
      - uses: actions/checkout@v4

      # ── Common setup ─────────────────────────────────────────────────
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install cmake ninja python3
          # 5WHY: --break-system-packages bypasses PEP 668 protection, risking
          # corruption of system Python packages. Use a venv for isolation.
          python3 -m venv /tmp/venv && source /tmp/venv/bin/activate && pip install aqtinstall
          echo "/tmp/venv/bin" >> "$GITHUB_PATH"

      # ── Dedup: skip upload if this commit was already pushed to TestFlight ─
      # 5WHY: Every CI run uploaded to TestFlight even when source code was
      # unchanged, creating duplicate builds in App Store Connect and wasting
      # ~5 min per upload. Best practice: cache last-uploaded commit SHA.
      - name: Check if already uploaded
        id: dedup
        uses: actions/cache/restore@v4
        with:
          path: .testflight-sha
          key: testflight-uploaded-${{ runner.os }}-v1
      - name: Read last uploaded SHA
        id: last-sha
        run: |
          if [ -f .testflight-sha/macos ]; then
            echo "macos_last=$(cat .testflight-sha/macos)" >> "$GITHUB_OUTPUT"
          else
            echo "macos_last=none" >> "$GITHUB_OUTPUT"
          fi
          if [ -f .testflight-sha/ios ]; then
            echo "ios_last=$(cat .testflight-sha/ios)" >> "$GITHUB_OUTPUT"
          else
            echo "ios_last=none" >> "$GITHUB_OUTPUT"
          fi
          echo "current=${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Report dedup status
        run: |
          echo "Current commit: ${{ github.sha }}"
          echo "Last uploaded macOS: ${{ steps.last-sha.outputs.macos_last }}"
          echo "Last uploaded iOS:   ${{ steps.last-sha.outputs.ios_last }}"
          if [ "${{ steps.last-sha.outputs.macos_last }}" = "${{ github.sha }}" ]; then
            echo "[SKIP] macOS — same commit already uploaded, skipping"
          fi
          if [ "${{ steps.last-sha.outputs.ios_last }}" = "${{ github.sha }}" ]; then
            echo "[SKIP] iOS   — same commit already uploaded, skipping"
          fi

      # ── macOS: download artifact → untar → inject plist → sign → .pkg ──
      - uses: actions/download-artifact@v4
        with:
          name: NetDiagnostics-macOS-arm64
          path: macos-artifact

      - name: Extract macOS .app from tarball
        run: |
          tar -xzf macos-artifact/NetDiagnostics-macOS.tar.gz -C macos-artifact/
          find macos-artifact -name "*.app" -type d | head -5
          echo "Extraction OK"

      - name: Inject required Info.plist keys (macOS App Store)
        run: |
          APP=$(find macos-artifact -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in macOS artifact"; exit 1
          fi
          PLIST="$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 26.0" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 26.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :LSApplicationCategoryType string public.app-category.utilities" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :LSApplicationCategoryType public.app-category.utilities" "$PLIST"
          echo "=== Info.plist after injection ==="
          /usr/libexec/PlistBuddy -c "Print" "$PLIST" | grep -E "LSMinimum|LSCategory" || true

      - name: Install macOS provisioning profile
        run: |
          APP=$(find macos-artifact -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found in macOS artifact"; exit 1
          fi
          if [ -n "${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}" ]; then
            echo -n "${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}" \
              | base64 -d > "$RUNNER_TEMP/mac-profile.provisionprofile"
            # Embed in .app (macOS App Store requirement)
            cp "$RUNNER_TEMP/mac-profile.provisionprofile" "$APP/Contents/embedded.provisionprofile"
            echo "[OK] macOS provisioning profile embedded"
          else
            echo "[WARN] MACOS_PROVISIONING_PROFILE_BASE64 not set —"
            echo "  macOS TestFlight upload will fail with profile-missing error."
            echo "  Generate one at: https://developer.apple.com/account/resources/profiles/list"
          fi

      - uses: ./.github/actions/setup-keychain
        id: mac-keychain
        with:
          primary_cert_base64: ${{ secrets.MACOS_INSTALLER_CERT_BASE64 }}
          primary_cert_password: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
          secondary_cert_base64: ${{ secrets.MACOS_APP_CERT_BASE64 }}
          secondary_cert_password: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
          allowed_tools: "/usr/bin/codesign /usr/bin/pkgbuild /usr/bin/productbuild"

      - name: Sign .app with entitlements and package as .pkg
        run: |
          APP=$(find macos-artifact -name "*.app" -type d | head -1)
          echo "macOS app: $APP"
          KCHAIN="${{ steps.mac-keychain.outputs.keychain_path }}"
          CODE_ID="${{ steps.mac-keychain.outputs.code_identity }}"
          PKG_ID="${{ steps.mac-keychain.outputs.installer_identity }}"
          if [ -z "$CODE_ID" ]; then
            echo "ERROR: No Mac App Distribution (code signing) identity found in keychain."
            echo "  Add the MACOS_APP_CERT_BASE64 / MACOS_APP_CERT_PASSWORD secrets containing"
            echo "  a '3rd Party Mac Developer Application' or 'Apple Distribution' certificate."
            exit 1
          fi
          # Sign frameworks first (inside-out signing order — required
          # after macdeployqt bundles Qt into Contents/Frameworks/)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
              codesign --force --options runtime --timestamp \
                --sign "$CODE_ID" --keychain "$KCHAIN" \
                "$fw"
            done
            echo "[OK] frameworks signed"
          fi
          # 5WHY: Apple distribution requires ALL executable code to be
          # signed, not just .framework bundles. macdeployqt copies
          # Homebrew Qt's standalone .dylib dependencies (libpcre2, libb2,
          # etc.) into Contents/Frameworks/ and Qt plugins (.dylib) into
          # Contents/PlugIns/. These flat .dylib files were missed by the
          # framework-only signing step, causing TestFlight upload failure
          # with "Invalid signature" errors.
          # Fix: sign all .dylib files outside .framework bundles first
          # (inside-out order: dylibs → frameworks → binary → .app).
          find "$APP/Contents" -name "*.dylib" -type f | while read dylib; do
            # Skip dylibs inside .framework bundles — those are already
            # signed with their parent framework above
            case "$dylib" in
              */Contents/Frameworks/*.framework/*) continue ;;
            esac
            codesign --force --options runtime --timestamp \
              --sign "$CODE_ID" --keychain "$KCHAIN" \
              "$dylib"
          done
          echo "[OK] standalone dylibs signed"
          # 5WHY: QtWebEngine bundles a helper .app (QtWebEngineProcess.app)
          # inside QtWebEngineCore.framework. Apple requires ALL executables,
          # including nested .app bundles, to be signed with App Sandbox
          # entitlements for TestFlight/App Store distribution.
          # Fix: sign nested .app bundles with the same entitlements as the
          # main app (inside-out: nested .apps → binary → main .app).
          find "$APP/Contents" -name "*.app" -type d | while read nested; do
            # The nested app's inner binary must be signed first
            NESTED_BIN="$nested/Contents/MacOS"
            if [ -d "$NESTED_BIN" ]; then
              find "$NESTED_BIN" -type f -perm +111 | while read exe; do
                codesign --force --options runtime --timestamp \
                  --entitlements resources/macos.entitlements \
                  --sign "$CODE_ID" --keychain "$KCHAIN" \
                  "$exe"
              done
            fi
            # Sign the nested .app bundle
            codesign --force --options runtime --timestamp \
              --entitlements resources/macos.entitlements \
              --sign "$CODE_ID" --keychain "$KCHAIN" \
              "$nested"
          done
          echo "[OK] nested .app bundles signed"
          # Sign inner binary first (required before signing the .app bundle)
          BIN="$APP/Contents/MacOS/net_diagnostics"
          if [ -f "$BIN" ]; then
            codesign --force --options runtime --timestamp \
              --entitlements resources/macos.entitlements \
              --sign "$CODE_ID" --keychain "$KCHAIN" \
              "$BIN"
            echo "[OK] binary signed"
          fi
          # Sign the .app bundle (deep signs all nested code)
          codesign --force --options runtime --timestamp \
            --entitlements resources/macos.entitlements \
            --sign "$CODE_ID" --keychain "$KCHAIN" \
            "$APP"
          echo "[OK] .app signed with entitlements"
          # Package as signed product archive (.pkg) for App Store / TestFlight
          # pkgbuild creates a component package; productbuild creates a
          # product archive — TestFlight only accepts product archives.
          productbuild --component "$APP" /Applications \
            --sign "$PKG_ID" --keychain "$KCHAIN" \
            NetDiagnostics-macOS.pkg
          ls -lh NetDiagnostics-macOS.pkg

      # ── iOS: rebuild + sign + archive → .ipa ─────────────────────────
      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          install_dir: ${{ env.QT_HOST_DIR }}
          cache_key_prefix: qt6-ios-desktop

      - uses: ./.github/actions/install-qt-aqt
        with:
          qt_version: ${{ env.QT_VERSION }}
          target: ios
          arch: ios
          install_dir: ${{ env.QT_INSTALL_DIR }}
          cache_key_prefix: qt6-ios

      - name: Write ASC key (late, clean early)
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          K=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_KEY_ID }}.p8
          echo -n "${{ secrets.APPSTORE_CONNECT_API_KEY }}" > "$K"
          chmod 600 "$K"
          echo "ASC_KEYFILE=${K}" >> "$GITHUB_ENV"

      - name: Generate App Store Connect JWT
        id: jwt
        run: |
          source scripts/ios/asc-app.sh
          JWT=$(asc_jwt \
            "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            "$ASC_KEYFILE")
          echo "jwt=${JWT}" >> "$GITHUB_OUTPUT"

      - name: Register Bundle ID + WiFi capability
        id: bundle
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"
          BID=$(asc_bundle_ensure "$JWT" "$APP_NAME" "$BUNDLE_ID")
          asc_bundle_capability_enable "$JWT" "$BID" ACCESS_WIFI_INFORMATION
          echo "bundle_id=${BID}" >> "$GITHUB_OUTPUT"

      - name: Ensure App Store Connect app
        id: asc-app
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"
          APP_ID=$(asc_app_ensure "$JWT" "$APP_NAME" "$BUNDLE_ID" "$APP_SKU" "$APP_LOCALE")
          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-keychain
        id: ios-keychain
        with:
          primary_cert_base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          primary_cert_password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          allowed_tools: "/usr/bin/codesign /usr/bin/xcodebuild"

      - name: Find distribution certificate
        id: cert-id
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"
          CERT_ID=$(asc_cert_find_distribution "$JWT")
          if [ -n "$CERT_ID" ]; then
            echo "cert_id=${CERT_ID}" >> "$GITHUB_OUTPUT"
            echo "auto_signing=false" >> "$GITHUB_OUTPUT"
          else
            echo "cert_id=" >> "$GITHUB_OUTPUT"
            echo "auto_signing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure provisioning profile
        id: profile
        run: |
          if [ -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ]; then
            echo -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" \
              | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
              <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")" 2>/dev/null || echo "")
            if [ -n "$PROFILE_UUID" ]; then
              PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
              mkdir -p "$PROFILE_DIR"
              cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
              echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
              echo "[OK] User-provided profile (UUID: ${PROFILE_UUID})"
              exit 0
            fi
          fi
          if [ "${{ steps.cert-id.outputs.auto_signing }}" != "true" ]; then
            source scripts/ios/asc-app.sh
            JWT="${{ steps.jwt.outputs.jwt }}"
            BID="${{ steps.bundle.outputs.bundle_id }}"
            CID="${{ steps.cert-id.outputs.cert_id }}"
            PROFILE_ID=$(asc_profile_ensure "$JWT" "$PROFILE_NAME" "$BID" "$CID")
            if [ -n "$PROFILE_ID" ]; then
              PROFILE_B64=$(asc_profile_download "$JWT" "$PROFILE_ID")
              if [ -n "$PROFILE_B64" ]; then
                echo -n "$PROFILE_B64" | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"
                PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
                  <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")" 2>/dev/null || echo "")
                if [ -n "$PROFILE_UUID" ]; then
                  PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
                  mkdir -p "$PROFILE_DIR"
                  cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
                  echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
                  echo "[OK] Auto-created profile (UUID: ${PROFILE_UUID})"
                  exit 0
                fi
              fi
            fi
          fi
          echo "profile_uuid=" >> "$GITHUB_OUTPUT"
          echo "[INFO] Falling back to Xcode automatic signing"

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" resources/Info.plist

      - name: Configure CMake for iOS (Xcode)
        run: |
          export IOS_TEAM_ID="${{ secrets.IOS_TEAM_ID }}"
          export ND_WIFI_ENTITLEMENT=1
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          "$QT_INSTALL_DIR/$QT_VERSION/ios/bin/qt-cmake" \
            -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=ios \
            -DQT_HOST_PATH="$QT_HOST_DIR/$QT_VERSION/macos" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -B build-ios -S .

      - name: Build and archive iOS
        run: |
          PROFILE_UUID="${{ steps.profile.outputs.profile_uuid }}"
          if [ -n "$PROFILE_UUID" ]; then
            echo "Manual signing with profile: $PROFILE_UUID"
            xcodebuild archive \
              -project build-ios/NetDiagnostic.xcodeproj \
              -scheme net_diagnostics \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build-ios/NetDiagnostic.xcarchive \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
              CODE_SIGN_STYLE="Manual" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
              CODE_SIGN_IDENTITY="iPhone Distribution" \
              -verbose 2>&1 | tail -100
          else
            echo "Automatic signing"
            xcodebuild archive \
              -project build-ios/NetDiagnostic.xcodeproj \
              -scheme net_diagnostics \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build-ios/NetDiagnostic.xcarchive \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
              CODE_SIGN_STYLE="Automatic" \
              -allowProvisioningUpdates \
              -authenticationKeyID "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
              -authenticationKeyIssuerID "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
              -authenticationKeyPath "$ASC_KEYFILE" \
              -verbose 2>&1 | tail -100
          fi
          [ -d build-ios/NetDiagnostic.xcarchive ] || { echo "[X] Archive failed"; exit 1; }
          echo "[OK] iOS archive created"

      - name: Package iOS IPA
        run: |
          APP_PATH="build-ios/NetDiagnostic.xcarchive/Products/Applications/net_diagnostics.app"
          [ -d "$APP_PATH" ] || APP_PATH=$(find build-ios/NetDiagnostic.xcarchive -name "*.app" -type d | head -1)
          [ -n "$APP_PATH" ] || { echo "[X] No .app found"; exit 1; }
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r NetDiagnostics-iOS.ipa Payload
          ls -lh NetDiagnostics-iOS.ipa

      # ── Upload + immediate cleanup ────────────────────────────────────
      # NOTE: xcrun altool is deprecated since Xcode 14 (2023).
      # Apple may remove it in a future Xcode release.
      # Migrate to: xcrun xcodebuild -exportArchive + App Store Connect API
      # See: https://developer.apple.com/documentation/xcode/uploading-apps-to-app-store-connect
      - name: Upload iOS to TestFlight
        if: steps.last-sha.outputs.ios_last != github.sha
        run: |
          xcrun altool --upload-app \
            -f NetDiagnostics-iOS.ipa \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --verbose
          echo "[OK] iOS uploaded to TestFlight"

      - name: Upload macOS to TestFlight
        if: steps.last-sha.outputs.macos_last != github.sha
        run: |
          xcrun altool --upload-app \
            -f NetDiagnostics-macOS.pkg \
            -t macos \
            --apiKey "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --verbose
          echo "[OK] macOS uploaded to TestFlight"

      # ── Persist uploaded SHA for dedup on next run ─────────────────────
      - name: Save uploaded SHA
        if: always()
        run: |
          mkdir -p .testflight-sha
          if [ "${{ steps.last-sha.outputs.ios_last }}" != "${{ github.sha }}" ]; then
            echo "${{ github.sha }}" > .testflight-sha/ios
          else
            echo "${{ steps.last-sha.outputs.ios_last }}" > .testflight-sha/ios
          fi
          if [ "${{ steps.last-sha.outputs.macos_last }}" != "${{ github.sha }}" ]; then
            echo "${{ github.sha }}" > .testflight-sha/macos
          else
            echo "${{ steps.last-sha.outputs.macos_last }}" > .testflight-sha/macos
          fi
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: .testflight-sha
          key: testflight-uploaded-${{ runner.os }}-v1

      - name: Clean up keys
        if: always()
        run: |
          rm -f "$ASC_KEYFILE" 2>/dev/null || true
