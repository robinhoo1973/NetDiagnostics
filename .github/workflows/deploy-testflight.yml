name: Deploy iOS to TestFlight

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-ios:
    name: Deploy iOS to TestFlight
    runs-on: macos-26
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      QT_VERSION: "6.8.3"
      BUNDLE_ID: "com.netdiagnostic.app"
      APP_NAME: "NetDiagnostic"
      APP_SKU: "netdiag.ios.001"
      APP_LOCALE: "en-US"
      PROFILE_NAME: "NetDiagnostic AppStore"
      QT_INSTALL_DIR: "/Users/runner/qt-ios"
      QT_HOST_DIR: "/Users/runner/qt-desktop"

    steps:
      # ═════════════════════════════════════════════════════════════════
      # Checkout
      # ═════════════════════════════════════════════════════════════════
      - uses: actions/checkout@v4

      # ═════════════════════════════════════════════════════════════════
      # Install build tools
      # ═════════════════════════════════════════════════════════════════
      - name: Install homebrew dependencies
        run: brew install cmake ninja python3

      # ═════════════════════════════════════════════════════════════════
      # Cache & install Qt 6 for macOS (host tools for cross-compilation)
      # ═════════════════════════════════════════════════════════════════
      - name: Cache Qt 6 macOS (host)
        id: cache-qt-mac
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_HOST_DIR }}
          key: qt6-ios-desktop-${{ env.QT_VERSION }}-v1

      - name: Install Qt 6 for macOS via aqt
        if: steps.cache-qt-mac.outputs.cache-hit != 'true'
        run: |
          pip3 install --break-system-packages aqtinstall
          aqt install-qt mac desktop $QT_VERSION clang_64 -O $QT_HOST_DIR

      # ═════════════════════════════════════════════════════════════════
      # Cache & install Qt 6 for iOS
      # ═════════════════════════════════════════════════════════════════
      - name: Cache Qt 6 iOS
        id: cache-qt-ios
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_INSTALL_DIR }}
          key: qt6-ios-${{ env.QT_VERSION }}-v3

      - name: Install Qt 6 for iOS via aqt
        if: steps.cache-qt-ios.outputs.cache-hit != 'true'
        run: |
          pip3 install --break-system-packages aqtinstall
          aqt install-qt mac ios $QT_VERSION ios_arm64 -O $QT_INSTALL_DIR

      # ═════════════════════════════════════════════════════════════════
      # Write ASC private key to disk
      # ═════════════════════════════════════════════════════════════════
      - name: Prepare App Store Connect key
        run: |
          KEYFILE="$RUNNER_TEMP/asc-key.p8"
          echo "${{ secrets.APPSTORE_CONNECT_API_KEY }}" > "$KEYFILE"
          chmod 600 "$KEYFILE"
          echo "ASC_KEYFILE=${KEYFILE}" >> "$GITHUB_ENV"

      # ═════════════════════════════════════════════════════════════════
      # Generate JWT (used by all subsequent ASC API calls)
      # ═════════════════════════════════════════════════════════════════
      - name: Generate App Store Connect JWT
        id: jwt
        run: |
          source scripts/ios/asc-app.sh
          JWT=$(asc_jwt \
            "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            "$ASC_KEYFILE")
          echo "jwt=${JWT}" >> "$GITHUB_OUTPUT"
          echo "✅ JWT generated"

      # ═════════════════════════════════════════════════════════════════
      # Step A: Register Bundle ID in Developer Portal (if not exists)
      # ═════════════════════════════════════════════════════════════════
      - name: Register Bundle ID (auto) + Enable WiFi capability
        id: bundle
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"

          echo "Checking bundle ID: ${BUNDLE_ID}..."
          BID=$(asc_bundle_ensure "$JWT" "$APP_NAME" "$BUNDLE_ID")

          echo "bundle_id=${BID}" >> "$GITHUB_OUTPUT"
          echo "✅ Bundle ID ready (id: ${BID})"

      # ═════════════════════════════════════════════════════════════════
      # Step B: Ensure App exists in App Store Connect (if not exists)
      # ═════════════════════════════════════════════════════════════════
      - name: Ensure App Store Connect app (auto)
        id: asc-app
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"

          echo "Checking App Store Connect app: ${APP_NAME}..."
          APP_ID=$(asc_app_ensure "$JWT" "$APP_NAME" "$BUNDLE_ID" "$APP_SKU" "$APP_LOCALE")

          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ App Store Connect app ready (id: ${APP_ID})"

      # ═════════════════════════════════════════════════════════════════
      # Import iOS Distribution Certificate (.p12) into keychain
      # (User must provide this — private keys can't be auto-generated)
      # ═════════════════════════════════════════════════════════════════
      - name: Import iOS distribution certificate
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          echo "${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}" \
            | base64 -d > "$RUNNER_TEMP/dist-cert.p12"

          security import "$RUNNER_TEMP/dist-cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}" \
            -A -T /usr/bin/codesign -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null 2>&1

          echo "✅ Distribution certificate imported"

      # ═════════════════════════════════════════════════════════════════
      # Step C: Look up the Distribution Certificate ID in Developer Portal
      # ═════════════════════════════════════════════════════════════════
      - name: Find distribution certificate in Developer Portal
        id: cert-id
        run: |
          source scripts/ios/asc-app.sh
          JWT="${{ steps.jwt.outputs.jwt }}"

          CERT_ID=$(asc_cert_find_distribution "$JWT")

          if [ -z "$CERT_ID" ]; then
            echo "WARNING: Could not find distribution certificate via API."
            echo "This is normal if the API key lacks Certificates access."
            echo "Falling back to automatic code signing (Xcode managed)."
            echo "cert_id=" >> "$GITHUB_OUTPUT"
            echo "auto_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "cert_id=${CERT_ID}" >> "$GITHUB_OUTPUT"
            echo "auto_signing=false" >> "$GITHUB_OUTPUT"
            echo "✅ Distribution certificate found (id: ${CERT_ID})"
          fi

      # ═════════════════════════════════════════════════════════════════
      # Step D: Create provisioning profile (auto, if not exists)
      # Falls back to user-provided profile if ASC API creation fails
      # ═════════════════════════════════════════════════════════════════
      - name: Ensure provisioning profile (auto)
        id: profile
        run: |
          # Priority 1: user-provided provisioning profile (via secret)
          if [ -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ]; then
            echo "Using user-provided provisioning profile..."
            echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" \
              | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
              <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")" 2>/dev/null || echo "")
            if [ -n "$PROFILE_UUID" ]; then
              PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
              mkdir -p "$PROFILE_DIR"
              cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
              echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
              echo "✅ Using user-provided provisioning profile (UUID: ${PROFILE_UUID})"
              exit 0
            fi
            echo "WARNING: Failed to parse user-provided profile UUID"
          fi

          # Priority 2: auto-create via ASC API (if cert lookup worked)
          if [ "${{ steps.cert-id.outputs.auto_signing }}" != "true" ]; then
            source scripts/ios/asc-app.sh
            JWT="${{ steps.jwt.outputs.jwt }}"
            BID="${{ steps.bundle.outputs.bundle_id }}"
            CID="${{ steps.cert-id.outputs.cert_id }}"

            echo "Auto-creating provisioning profile: ${PROFILE_NAME}..."
            PROFILE_ID=$(asc_profile_ensure "$JWT" "$PROFILE_NAME" "$BID" "$CID")

            if [ -n "$PROFILE_ID" ]; then
              echo "Downloading provisioning profile content..."
              PROFILE_B64=$(asc_profile_download "$JWT" "$PROFILE_ID")

              if [ -n "$PROFILE_B64" ]; then
                echo "$PROFILE_B64" | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"
                PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
                  <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")" 2>/dev/null || echo "")
                if [ -n "$PROFILE_UUID" ]; then
                  PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
                  mkdir -p "$PROFILE_DIR"
                  cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
                  echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
                  echo "✅ Provisioning profile auto-created (UUID: ${PROFILE_UUID})"
                  exit 0
                fi
              fi
            fi
            echo "WARNING: ASC API profile creation failed, falling back to auto signing"
          fi

          # Priority 3: use Xcode automatic signing
          echo "Using Xcode automatic signing (no manual profile)"
          echo "profile_uuid=" >> "$GITHUB_OUTPUT"

      # ═════════════════════════════════════════════════════════════════
      # Auto-increment build number (CFBundleVersion) for TestFlight
      # ═════════════════════════════════════════════════════════════════
      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" resources/Info.plist
          echo "Build number set to $GITHUB_RUN_NUMBER"

      # ═════════════════════════════════════════════════════════════════
      # Configure CMake for iOS (Xcode generator)
      # iOS uses NSURLSession (IosHttpTask.mm) — no libcurl cross-compile needed
      # ═════════════════════════════════════════════════════════════════
      - name: Configure CMake for iOS
        id: cmake
        run: |
          QT_IOS="$QT_INSTALL_DIR/$QT_VERSION/ios_arm64"
          QT_MAC="$QT_HOST_DIR/$QT_VERSION/clang_64"

          # Set QT_HOST_PATH as env var (matching build.yml pattern)
          export QT_HOST_PATH="$QT_MAC"
          # Set IOS_TEAM_ID so CMake can configure Xcode code signing properly
          export IOS_TEAM_ID="${{ secrets.IOS_TEAM_ID }}"
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)

          "$QT_IOS/bin/qt-cmake" \
            -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -B build-ios -S .

      # ═════════════════════════════════════════════════════════════════
      # Build + Archive (xcodebuild handles automatic signing)
      # ═════════════════════════════════════════════════════════════════
      - name: Build and archive iOS app
        run: |
          # Determine signing strategy
          PROFILE_UUID="${{ steps.profile.outputs.profile_uuid }}"
          if [ -n "$PROFILE_UUID" ]; then
            echo "Manual signing with provisioning profile: $PROFILE_UUID"
            xcodebuild archive \
              -project build-ios/NetDiagnostic.xcodeproj \
              -scheme net_diagnostic \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build-ios/NetDiagnostic.xcarchive \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
              CODE_SIGN_STYLE="Manual" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
              CODE_SIGN_IDENTITY="iPhone Distribution" \
              -verbose 2>&1 | tail -200
          else
            echo "Automatic signing (API key auth)"
            xcodebuild archive \
              -project build-ios/NetDiagnostic.xcodeproj \
              -scheme net_diagnostic \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -archivePath build-ios/NetDiagnostic.xcarchive \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
              CODE_SIGN_STYLE="Automatic" \
              -allowProvisioningUpdates \
              -authenticationKeyID "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
              -authenticationKeyIssuerID "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
              -authenticationKeyPath "$ASC_KEYFILE" \
              -verbose 2>&1 | tail -200
          fi

          if [ -d build-ios/NetDiagnostic.xcarchive ]; then
            echo "✅ Archive created"
          else
            echo "❌ Archive not created"
            exit 1
          fi

      # ═════════════════════════════════════════════════════════════════
      # Package IPA from signed .xcarchive
      # ═════════════════════════════════════════════════════════════════
      - name: Package IPA from archive
        run: |
          # Extract the signed .app from the archive
          APP_PATH="build-ios/NetDiagnostic.xcarchive/Products/Applications/net_diagnostic.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App not found in archive at $APP_PATH"
            # Try alternate location
            APP_PATH=$(find build-ios/NetDiagnostic.xcarchive -name "*.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "❌ No .app found in archive"
              find build-ios/NetDiagnostic.xcarchive -type d | head -20
              exit 1
            fi
          fi
          echo "✅ Found app: $APP_PATH"
          ls -la "$APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r NetDiagnostic-iOS.ipa Payload
          ls -lh NetDiagnostic-iOS.ipa
          echo "✅ IPA packaged"

      # ═════════════════════════════════════════════════════════════════
      # Upload to TestFlight via altool
      # ═════════════════════════════════════════════════════════════════
      - name: Upload to TestFlight
        run: |
          if [ ! -f NetDiagnostic-iOS.ipa ]; then
            echo "ERROR: No .ipa found"
            exit 1
          fi

          echo "Uploading NetDiagnostic-iOS.ipa to TestFlight..."

          mkdir -p ~/.appstoreconnect/private_keys
          cp "$ASC_KEYFILE" \
            ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            -f NetDiagnostic-iOS.ipa \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --verbose

          echo "✅ Uploaded to TestFlight"

      # ═════════════════════════════════════════════════════════════════
      # Clean up sensitive key material (always)
      # ═════════════════════════════════════════════════════════════════
      - name: Clean up keys
        if: always()
        run: |
          rm -f "$ASC_KEYFILE" 2>/dev/null || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8 2>/dev/null || true