name: CI Test & Code Review

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Version — detect from git tags (reusable workflow)
  # 5WHY: was copy-pasted across build.yml/apple.yml/test.yml; now DRY.
  # ═══════════════════════════════════════════════════════════════════════
  version:
    name: Detect Version
    uses: ./.github/workflows/version.yml

  test-windows:
    name: Test Windows (ND_TESTING + Headless + Code Review)
    needs: [version]
    runs-on: windows-2022
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-static
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-brotli
            mingw-w64-ucrt-x86_64-pcre2
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-libtiff
            mingw-w64-ucrt-x86_64-libwebp
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-harfbuzz

      - name: Build (ND_TESTING=ON)
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          mkdir -p build && cd build
          # 5WHY: PROJECT_VERSION was hardcoded to "0.0.1" — didn't match
          # release builds. Now uses git tag detection for version consistency.
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER="${{ github.run_number }}" \
            -DAPP_EDITION=static \
            -DCMAKE_PREFIX_PATH=/ucrt64/qt6-static \
            -DBUILD_SIMULATOR=OFF \
            -DNO_CURL=ON \
            -DBUILD_TESTS=OFF \
            -DND_DEBUG=OFF \
            -DND_TESTING=ON \
            ..
          ninja net_diagnostics

      - name: Run headless tests
        shell: msys2 {0}
        run: |
          # Verify binary exists and doesn't crash on startup
          if [ ! -f ./build/net_diagnostics.exe ]; then
            echo "::error::Binary not found — build may have failed"
            exit 1
          fi
          # Run tests with full output capture
          set +e  # Don't exit on test failure — we want to capture output
          ./build/net_diagnostics.exe --test 2>&1 | tee test-output.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e
          # 5WHY: Test process exit code was ignored — if the binary crashes
          # before test harness runs, we get exit -1 or SIGSEGV with no log.
          echo "Exit code: $TEST_EXIT"
          if [ $TEST_EXIT -lt 0 ]; then
            echo "::error::Binary crashed (signal $((TEST_EXIT * -1))) — check startup log"
            exit 1
          elif [ $TEST_EXIT -gt 0 ] && [ $TEST_EXIT -ne 1 ]; then
            echo "::error::Unexpected exit code $TEST_EXIT"
            exit 1
          fi
          # Extract pass/fail from output
          if grep -q "All passed: YES" test-output.log; then
            echo "ALL TESTS PASSED"
          elif grep -q "passed:" test-output.log; then
            echo "SOME TESTS FAILED — check test-output.log"
            grep -E "passed:|failed:|PASS|FAIL" test-output.log || true
            exit 1
          else
            echo "::error::No test results found — test harness may have crashed"
            cat test-output.log
            exit 1
          fi

      - name: Verify no QML/startup failures
        shell: msys2 {0}
        run: |
          # 5WHY: QML import failures cause silent crash before test harness.
          # Check for crash markers in test output.
          if grep -qiE "FATAL|QML.*fail|create.*fail|engine.*fail|crash" test-output.log 2>/dev/null; then
            echo "::warning::Possible startup/QML failure detected in output"
            grep -iE "FATAL|QML.*fail|create.*fail|engine.*fail" test-output.log || true
          else
            echo "No startup/QML failures detected"
          fi

      - name: Code review compliance
        shell: pwsh
        run: |
          # Check 5WHY in recent commits — matches both "5WHY:" inline comments
          # and "Why #N" numbered patterns for backward compatibility.
          # 5WHY: The regex was checking for "Why #1" but the adopted format is
          # "5WHY:" inline in code and commit messages. Fixed to match both.
          $commits = git log --oneline -10 --format="%B"
          $inline5Why = ($commits | Select-String "5WHY:" | Measure-Object).Count
          $numberedWhy = ($commits | Select-String "Why #[1-5]" | Measure-Object).Count
          Write-Host "Commits with 5WHY: inline=$inline5Why, numbered=$numberedWhy"
          if ($inline5Why -eq 0 -and $numberedWhy -eq 0) {
            Write-Host "::warning::No 5WHY analysis found in last 10 commits"
          } else {
            Write-Host "5WHY analysis detected in recent commits"
          }

          # Preprocessor balance
          $failed = 0
          Get-ChildItem -Path src -Recurse -Include *.cpp,*.h | ForEach-Object {
            # 5WHY: Old regex '#if[^ ]' required non-space char after #if,
            # missing '#if defined(X)' (space after #if). '#if\b' uses word
            # boundary, matching all variants: #if defined, #ifdef, #ifndef, #if().
            $ifs = (Select-String -Path $_.FullName -Pattern '^\s*\#(if|elif)\b' | Measure-Object).Count
            $ends = (Select-String -Path $_.FullName -Pattern '^\s*\#endif' | Measure-Object).Count
            if ($ifs -ne $ends) {
              Write-Host "::error::$($_.Name): #if=$ifs #endif=$ends"
              $failed++
            }
          }
          if ($failed -gt 0) { exit 1 }

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-windows
          path: test-output.log


  # ═══════════════════════════════════════════════════════════════════════
  # Linux test — cross-platform verification
  # 5WHY: Tests only ran on Windows, missing Linux-specific regressions
  # (file paths, network stack differences, QPA backend variants).
  # Uses QT_QPA_PLATFORM=offscreen for headless QML rendering.
  # ═══════════════════════════════════════════════════════════════════════
  test-linux:
    name: Test Linux (Headless)
    needs: [version]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-declarative-dev \
            libqt6quickcontrols2-6 qt6-tools-dev qt6-tools-dev-tools \
            libcurl4-openssl-dev

      - name: Build (ND_TESTING=ON)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER="${{ github.run_number }}" \
            -DAPP_EDITION=linux-x86_64 \
            -DBUILD_SIMULATOR=OFF \
            -DBUILD_TESTS=OFF \
            -DND_DEBUG=OFF \
            -DND_TESTING=ON \
            -B build -S .
          ninja -C build net_diagnostics

      - name: Run headless tests
        run: |
          export QT_QPA_PLATFORM=offscreen
          export QT_QUICK_BACKEND=software
          if [ ! -f ./build/net_diagnostics ]; then
            echo "::error::Binary not found — build may have failed"
            exit 1
          fi
          set +e
          ./build/net_diagnostics --test 2>&1 | tee test-output.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e
          echo "Exit code: $TEST_EXIT"
          if [ $TEST_EXIT -lt 0 ]; then
            echo "::error::Binary crashed (signal $((TEST_EXIT * -1))) — check startup log"
            exit 1
          elif [ $TEST_EXIT -gt 0 ] && [ $TEST_EXIT -ne 1 ]; then
            echo "::error::Unexpected exit code $TEST_EXIT"
            exit 1
          fi
          if grep -q "All passed: YES" test-output.log; then
            echo "ALL TESTS PASSED"
          elif grep -q "passed:" test-output.log; then
            echo "SOME TESTS FAILED — check test-output.log"
            grep -E "passed:|failed:|PASS|FAIL" test-output.log || true
            exit 1
          else
            echo "::error::No test results found — test harness may have crashed"
            cat test-output.log
            exit 1
          fi

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-linux
          path: test-output.log
