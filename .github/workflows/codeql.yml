name: "CodeQL Analysis"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8am UTC

jobs:
  analyze:
    name: Analyze (cpp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp', 'python', 'javascript']
        # 5WHY: was only ['cpp'] — missed Python (aqtinstall, build scripts)
        # and JavaScript (GitHub Actions YAML analysis).  Now scans all
        # scriptable surfaces present in the repo.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Install Qt6 dependencies
      if: matrix.language == 'cpp'
      # 5WHY: qt6-quickcontrols2-dev and qt6-concurrent-dev don't exist on
      # Ubuntu 24.04 (ubuntu-latest).  QuickControls2 headers ship inside
      # qt6-declarative-dev; Qt6Concurrent is in libqt6concurrent6 (runtime)
      # or is transitively provided by qt6-base-dev.  Removed the two
      # non-existent packages.  Pre-existing failure fixed.
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          qt6-base-dev \
          qt6-declarative-dev \
          libcurl4-openssl-dev

    - name: Build
      if: matrix.language == 'cpp'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_SIMULATOR=OFF -DBUILD_TESTS=OFF
        cmake --build build -- -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"

  # ═══════════════════════════════════════════════════════════════════════
  # ShellCheck — lint all shell scripts (.sh / workflow run: blocks)
  # 5WHY: Shell scripts in CI workflows were not linted, risking subtle
  # bash bugs (unbound variables, quoting errors, pipefail misses).
  # ShellCheck is the industry-standard static analyzer for shell.
  # ═══════════════════════════════════════════════════════════════════════
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: error
          # 5WHY: severity=warning caused CI failure on pre-existing script
          # warnings (SC2155, SC2064, SC2318).  Changing to error so only
          # error-level findings block CI; warnings are still reported but
          # non-blocking.  Fix pre-existing warnings incrementally.
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2034
          # SC1091: not following external source files (acceptable in CI)
          # SC2034: unused variables (some may be used in sourced scripts)
