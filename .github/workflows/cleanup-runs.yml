name: Cleanup CI Runs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # weekly Sunday 03:00 UTC

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs — keep only last success per workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          workflows=$(gh api "repos/$REPO/actions/workflows" --jq '.workflows[].id')
          total_deleted=0

          self_name="$GITHUB_WORKFLOW"
          self_run_id="$GITHUB_RUN_ID"

          for wf_id in $workflows; do
            wf_name=$(gh api "repos/$REPO/actions/workflows/$wf_id" --jq '.name')
            echo "::group::Workflow: $wf_name (id=$wf_id)"

            # Decide which run to keep:
            #   Self:  keep the CURRENT run ($GITHUB_RUN_ID)
            #   Other: keep the last successful run
            if [ "$wf_name" = "$self_name" ]; then
              keep_id="$self_run_id"
              keep_label="current run"
            else
              keep_id=$(gh api "repos/$REPO/actions/workflows/$wf_id/runs?status=success&per_page=1" \
                --jq '.workflow_runs[0].id // empty' 2>/dev/null || echo "")
              keep_label="last success"
            fi

            if [ -z "$keep_id" ]; then
              echo "  No runs to keep — skip"
              echo "::endgroup::"
              continue
            fi

            echo "  Keep: #$keep_id ($keep_label)"

            # Delete all OTHER runs for this workflow (paginated)
            page=1
            while true; do
              run_ids=$(gh api "repos/$REPO/actions/workflows/$wf_id/runs?per_page=100&page=$page" \
                --jq '[.workflow_runs[] | select(.id != '$keep_id') | .id] | join(" ")' 2>/dev/null || echo "")

              if [ -z "$run_ids" ]; then
                break
              fi

              for run_id in $run_ids; do
                echo "  Delete #$run_id"
                gh api --silent -X DELETE "repos/$REPO/actions/runs/$run_id" 2>/dev/null || true
                total_deleted=$((total_deleted + 1))
              done

              page=$((page + 1))
            done

            echo "::endgroup::"
          done

          echo "Total deleted: $total_deleted"
