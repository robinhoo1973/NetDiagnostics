name: Cleanup CI Runs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # weekly Sunday 03:00 UTC

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs — keep only last success per workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          workflows=$(gh api "repos/$REPO/actions/workflows" --jq '.workflows[].id')
          total_deleted=0

          self_name="$GITHUB_WORKFLOW"

          for wf_id in $workflows; do
            wf_name=$(gh api "repos/$REPO/actions/workflows/$wf_id" --jq '.name')
            echo "::group::Workflow: $wf_name (id=$wf_id)"

            # Skip self — the currently running workflow can't delete itself.
            # Its old runs will be cleaned on the NEXT scheduled execution.
            if [ "$wf_name" = "$self_name" ]; then
              echo "  Skipping self (this workflow)"
              echo "::endgroup::"
              continue
            fi

            # Get the last successful run — API returns newest first
            last_id=$(gh api "repos/$REPO/actions/workflows/$wf_id/runs?status=success&per_page=1" \
              --jq '.workflow_runs[0].id // empty' 2>/dev/null || echo "")
            last_date=$(gh api "repos/$REPO/actions/workflows/$wf_id/runs?status=success&per_page=1" \
              --jq '.workflow_runs[0].created_at // empty' 2>/dev/null || echo "")

            if [ -z "$last_id" ]; then
              echo "  No successful runs — skip"
              echo "::endgroup::"
              continue
            fi

            echo "  Keep: #$last_id ($last_date)"

            # Delete all OTHER runs for this workflow (paginated)
            page=1
            while true; do
              run_ids=$(gh api "repos/$REPO/actions/workflows/$wf_id/runs?per_page=100&page=$page" \
                --jq '[.workflow_runs[] | select(.id != '$last_id') | .id] | join(" ")' 2>/dev/null || echo "")

              if [ -z "$run_ids" ]; then
                break
              fi

              for run_id in $run_ids; do
                echo "  Delete #$run_id"
                gh api --silent -X DELETE "repos/$REPO/actions/runs/$run_id" 2>/dev/null || true
                total_deleted=$((total_deleted + 1))
              done

              page=$((page + 1))
            done

            echo "::endgroup::"
          done

          echo "Total deleted: $total_deleted"
