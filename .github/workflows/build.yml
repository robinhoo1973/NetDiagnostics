name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.5.3

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Linux x86_64 — native GCC build + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            libqt6quickcontrols2-6 \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxcb-cursor-dev

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Linux-x86_64
          path: |
            build/net_diagnostic
            build-sim/net_diagnostic_sim
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Windows x86_64 — native MSVC build via aqtinstall + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Qt6
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: D:/Qt
          key: qt6-win-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 via aqt
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop $env:QT_VERSION win64_msvc2019_64 -O D:/Qt

      - name: Install ninja
        run: choco install ninja -y --no-progress

      - name: Install curl via vcpkg
        run: vcpkg install curl:x64-windows

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DCMAKE_PREFIX_PATH="D:/Qt/$env:QT_VERSION/msvc2019_64" `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DBUILD_SIMULATOR=ON `
            -DCMAKE_PREFIX_PATH="D:/Qt/$env:QT_VERSION/msvc2019_64" `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Windows-x86_64
          path: |
            build/net_diagnostic.exe
            build-sim/net_diagnostic_sim.exe
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS x86_64 — native Apple Clang + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja qt@6 curl

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-macOS-x86_64
          path: |
            build/net_diagnostic
            build-sim/net_diagnostic_sim
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS arm64 — native Apple Clang + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja qt@6 curl

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-macOS-arm64
          path: |
            build/net_diagnostic
            build-sim/net_diagnostic_sim
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Android x86_64 — cross-compile via aqtinstall + NDK, production only
  # ═══════════════════════════════════════════════════════════════════════════
  android-x86_64:
    name: Android x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Qt6 Android
        id: cache-qt-android
        uses: actions/cache@v4
        with:
          path: /opt/qt-android
          key: qt6-android-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 for Android via aqt
        if: steps.cache-qt-android.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux android $QT_VERSION android_x86_64 -O /opt/qt-android

      - name: Configure
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="/opt/qt-android/$QT_VERSION/android_x86_64" \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-26 \
            -B build -S .

      - name: Build
        run: ninja -C build net_diagnostic

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Android-x86_64
          path: build/android-build/build/outputs/apk/
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════════
  # Android arm64 — cross-compile via aqtinstall + NDK, production only
  # ═══════════════════════════════════════════════════════════════════════════
  android-arm64:
    name: Android arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Qt6 Android
        id: cache-qt-android
        uses: actions/cache@v4
        with:
          path: /opt/qt-android
          key: qt6-android-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 for Android via aqt
        if: steps.cache-qt-android.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux android $QT_VERSION android_arm64_v8a -O /opt/qt-android

      - name: Configure
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="/opt/qt-android/$QT_VERSION/android_arm64_v8a" \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -B build -S .

      - name: Build
        run: ninja -C build net_diagnostic

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Android-arm64
          path: build/android-build/build/outputs/apk/
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════════
  # iOS — native build via aqtinstall + Xcode, production only
  # ═══════════════════════════════════════════════════════════════════════════
  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja curl

      - name: Cache Qt6 iOS
        id: cache-qt-ios
        uses: actions/cache@v4
        with:
          path: /opt/qt-ios
          key: qt6-ios-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 for iOS via aqt
        if: steps.cache-qt-ios.outputs.cache-hit != 'true'
        run: |
          pip3 install aqtinstall
          aqt install-qt mac ios $QT_VERSION ios -O /opt/qt-ios

      - name: Configure
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="/opt/qt-ios/$QT_VERSION/ios" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -B build -S .

      - name: Build
        run: ninja -C build net_diagnostic

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-iOS
          path: build/*.app
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════════
  # Release — create GitHub Release on tag push
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs:
      - linux-x86_64
      - windows-x86_64
      - macos-x86_64
      - macos-arm64
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in NetDiagnostic-*; do
            if [ -d "$dir" ]; then
              tar -cJf "${dir}.tar.xz" "$dir"
            fi
          done
          ls -lh *.tar.xz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
