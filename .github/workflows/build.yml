name: Build & Release

on:
  workflow_dispatch:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.8.3
  # ── Qt version rationale ────────────────────────────────────────────
  # 6.8.3 : Linux / macOS / iOS via brew, apt, or aqtinstall.
  #         Latest stable LTS with full QML QuickControls2 support.
  # 6.5.3 : Android cross-compile only.  Required because Qt 6.6+
  #         bumped the Android Gradle plugin version which conflicts
  #         with compileSdk 33 / aapt2.  Target: converge to 6.8.x
  #         once Android SDK 34+ aapt2 compatibility is verified.
  # 6.11.1: Windows static source build.  Built from source because
  #         no pre-built static Qt6 packages exist for MSYS2 UCRT64.
  #         Pinned to latest release for best static linking support.
  # ═════════════════════════════════════════════════════════════════════
  QT_VERSION_ANDROID: 6.5.3
  QT_VERSION_WINDOWS_SRC: 6.11.1
  ANDROID_API_LEVEL: "26"
  # ── Qt version rationale — all at MAXIMUM open-source available ─────────
  # 6.5.3 : Android cross-compile.  HIGHEST open-source 6.5.x via aqtinstall.
  #         6.5.4+ are commercial-only.  Qt 6.6+ bumped AGP version which
  #         conflicts with compileSdk 33 / aapt2.  6.5.x keeps AGP 7.4.1.
  #         Target: converge to 6.8.x once Android SDK 34+ aapt2 verified.
  # 6.8.3 : Linux / macOS / iOS via brew, apt, or aqtinstall.
  #         HIGHEST open-source 6.8.x LTS.  6.8.4+ commercial-only.
  # 6.11.1: Windows static source build.  HIGHEST stable 6.11.x.
  #         Qt 6.11.2 scheduled August 2026.
  MAINTAINER: "robinhoo1973"

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Version — compute once, shared by all build jobs (reusable workflow)
  # 5WHY: was copy-pasted across build.yml/apple.yml/test.yml; now DRY.
  # ═══════════════════════════════════════════════════════════════════════
  version:
    name: Detect Version
    uses: ./.github/workflows/version.yml

  # ===================================================================
  # Linux x86_64 - native GCC build + simulator
  # ===================================================================
  linux-x86_64:
    name: Linux x86_64
    needs: [version]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            libqt6quickcontrols2-6 \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxcb-cursor-dev

      # ── Debug build ────────────────────────────────────────────────
      - name: Configure (debug)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=linux-x86_64 \
            -B build-debug -S .
      - name: Build (debug)
        run: ninja -C build-debug net_diagnostics
      # ── Release build ──────────────────────────────────────────────
      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=linux-x86_64 \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostics

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=linux-x86_64 \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostics_sim

      - name: Build AppImage (production)
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/net_diagnostics AppDir/usr/bin/
          cp resources/netanalysis.desktop AppDir/usr/share/applications/
          cp resources/icons/netanalysis.png AppDir/usr/share/icons/hicolor/256x256/apps/
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/share/applications/netanalysis.desktop -appimage -no-copy-copyright-files -no-translations || true
          mv *.AppImage NetDiagnostics-Linux-x86_64.AppImage 2>/dev/null || true

      - name: Package deb
        run: |
          mkdir -p pkg-deb/usr/bin pkg-deb/usr/share/applications pkg-deb/usr/share/icons/hicolor/256x256/apps pkg-deb/DEBIAN
          cp build/net_diagnostics pkg-deb/usr/bin/
          cp resources/netanalysis.desktop pkg-deb/usr/share/applications/
          cp resources/icons/netanalysis.png pkg-deb/usr/share/icons/hicolor/256x256/apps/
          cat > pkg-deb/DEBIAN/control << EOF
          Package: netdiagnostics
          Version: ${{ needs.version.outputs.pkg_version }}
          Architecture: amd64
          Maintainer: ${{ env.MAINTAINER }}
          Depends: libqt6core6t64 | libqt6core6, libqt6gui6, libqt6quick6, libqt6quickcontrols2-6, libqt6widgets6, libqt6network6, libcurl4t64 | libcurl4
          Description: Cross-platform network diagnostics tool - Qt6/QML
          EOF
          dpkg-deb --build pkg-deb NetDiagnostics-Linux-x86_64.deb
          ls -lh NetDiagnostics-Linux-x86_64.deb

      - name: Cache fpm gem
        id: cache-fpm
        uses: actions/cache@v4
        with:
          path: /var/lib/gems
          key: fpm-gem-${{ runner.arch }}-v1

      - name: Package rpm
        run: |
          sudo gem install fpm 2>/dev/null || true
          # 5WHY: fpm gem was installed every run (~30s).  Caching /var/lib/gems
          # avoids the network fetch; gem install is a no-op when already present.
          fpm -s dir -t rpm -n netdiagnostics -v "${{ needs.version.outputs.pkg_version }}" --architecture x86_64 \
            --depends "qt6-qtbase" --depends "qt6-qtdeclarative" --depends "qt6-qtquickcontrols2" --depends "libcurl" \
            build/net_diagnostics=/usr/bin/net_diagnostics \
            resources/netanalysis.desktop=/usr/share/applications/netanalysis.desktop \
            resources/icons/netanalysis.png=/usr/share/icons/hicolor/256x256/apps/netanalysis.png
          mv netdiagnostics*.rpm NetDiagnostics-Linux-x86_64.rpm 2>/dev/null || true
          ls -lh NetDiagnostics-Linux-x86_64.rpm 2>/dev/null || echo "(rpm skipped)"

      - name: Build AppImage (simulator)
        run: |
          mkdir -p AppDir-sim/usr/bin AppDir-sim/usr/share/applications AppDir-sim/usr/share/icons/hicolor/256x256/apps
          cp build-sim/net_diagnostics_sim AppDir-sim/usr/bin/
          cp resources/netanalysis-sim.desktop AppDir-sim/usr/share/applications/
          cp resources/icons/netanalysis.png AppDir-sim/usr/share/icons/hicolor/256x256/apps/
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir-sim/usr/share/applications/netanalysis-sim.desktop -appimage -no-copy-copyright-files -no-translations || true
          mv *.AppImage NetDiagnostics-Linux-x86_64-sim.AppImage 2>/dev/null || true

      - name: Package deb (simulator)
        run: |
          mkdir -p pkg-deb-sim/usr/bin pkg-deb-sim/usr/share/applications pkg-deb-sim/usr/share/icons/hicolor/256x256/apps pkg-deb-sim/DEBIAN
          cp build-sim/net_diagnostics_sim pkg-deb-sim/usr/bin/
          cp resources/netanalysis-sim.desktop pkg-deb-sim/usr/share/applications/
          cp resources/icons/netanalysis.png pkg-deb-sim/usr/share/icons/hicolor/256x256/apps/
          cat > pkg-deb-sim/DEBIAN/control << EOF
          Package: netdiagnostics-sim
          Version: ${{ needs.version.outputs.pkg_version }}
          Architecture: amd64
          Maintainer: ${{ env.MAINTAINER }}
          Depends: libqt6core6t64 | libqt6core6, libqt6gui6, libqt6quick6, libqt6quickcontrols2-6, libqt6widgets6, libqt6network6, libcurl4t64 | libcurl4
          Description: NetDiagnostic Simulator - Network diagnostics testing tool
          EOF
          dpkg-deb --build pkg-deb-sim NetDiagnostics-Linux-x86_64-sim.deb
          ls -lh NetDiagnostics-Linux-x86_64-sim.deb

      - name: Package rpm (simulator)
        run: |
          fpm -s dir -t rpm -n netdiagnostics-sim -v "${{ needs.version.outputs.pkg_version }}" --architecture x86_64 \
            --depends "qt6-qtbase" --depends "qt6-qtdeclarative" --depends "qt6-qtquickcontrols2" --depends "libcurl" \
            build-sim/net_diagnostics_sim=/usr/bin/net_diagnostics_sim \
            resources/netanalysis-sim.desktop=/usr/share/applications/netanalysis-sim.desktop \
            resources/icons/netanalysis.png=/usr/share/icons/hicolor/256x256/apps/netanalysis.png
          mv netdiagnostics-sim*.rpm NetDiagnostics-Linux-x86_64-sim.rpm 2>/dev/null || true
          ls -lh NetDiagnostics-Linux-x86_64-sim.rpm 2>/dev/null || echo "(rpm skipped)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-Linux-x86_64
          path: |
            *.AppImage
            *.deb
            *.rpm
          if-no-files-found: error


  # ===================================================================
  # Linux arm64 - native GCC build + simulator
  # ===================================================================
  linux-arm64:
    name: Linux arm64
    needs: [version]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        # 5WHY: ubuntu-24.04-arm runner uses ports.ubuntu.com which has
        # intermittent IPv6/IPv4 connectivity issues.  Retry up to 5x
        # with exponential backoff (3s → 6s → 12s → 24s → 48s).
        run: |
          for i in 1 2 3 4 5; do
            echo "[attempt $i/5] apt-get update..."
            if sudo apt-get update -o Acquire::Retries=3; then break; fi
            if [ "$i" -eq 5 ]; then echo "ERROR: apt-get update failed after 5 retries"; exit 1; fi
            sleep $((3 * 2 ** (i - 1)))
          done
          for i in 1 2 3 4 5; do
            echo "[attempt $i/5] apt-get install..."
            if sudo apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build \
              qt6-base-dev \
              qt6-declarative-dev \
              libqt6quickcontrols2-6 \
              qt6-tools-dev \
              qt6-tools-dev-tools \
              libcurl4-openssl-dev \
              libgl1-mesa-dev libglu1-mesa-dev \
              libxkbcommon-dev libxcb-cursor-dev; then break; fi
            if [ "$i" -eq 5 ]; then echo "ERROR: apt-get install failed after 5 retries"; exit 1; fi
            sleep $((3 * 2 ** (i - 1)))
          done

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=linux-arm64 \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostics

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=linux-arm64 \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostics_sim

      # linuxdeployqt does not provide an arm64 AppImage binary.
      # Fall back to the native linuxdeployqt from apt (built for arm64).
      - name: Build AppImage (production)
        run: |
          if command -v linuxdeployqt &>/dev/null || sudo apt-get install -y -qq linuxdeployqt 2>/dev/null; then
            mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
            cp build/net_diagnostics AppDir/usr/bin/
            cp resources/netanalysis.desktop AppDir/usr/share/applications/
            cp resources/icons/netanalysis.png AppDir/usr/share/icons/hicolor/256x256/apps/
            linuxdeployqt AppDir/usr/share/applications/netanalysis.desktop -appimage -no-copy-copyright-files -no-translations || true
            mv *.AppImage NetDiagnostics-Linux-arm64.AppImage 2>/dev/null || true
          else
            echo "(AppImage skipped: no arm64 linuxdeployqt available)"
          fi

      - name: Package deb
        run: |
          mkdir -p pkg-deb/usr/bin pkg-deb/usr/share/applications pkg-deb/usr/share/icons/hicolor/256x256/apps pkg-deb/DEBIAN
          cp build/net_diagnostics pkg-deb/usr/bin/
          cp resources/netanalysis.desktop pkg-deb/usr/share/applications/
          cp resources/icons/netanalysis.png pkg-deb/usr/share/icons/hicolor/256x256/apps/
          cat > pkg-deb/DEBIAN/control << EOF
          Package: netdiagnostics
          Version: ${{ needs.version.outputs.pkg_version }}
          Architecture: arm64
          Maintainer: ${{ env.MAINTAINER }}
          Depends: libqt6core6t64 | libqt6core6, libqt6gui6, libqt6quick6, libqt6quickcontrols2-6, libqt6widgets6, libqt6network6, libcurl4t64 | libcurl4
          Description: Cross-platform network diagnostics tool - Qt6/QML
          EOF
          dpkg-deb --build pkg-deb NetDiagnostics-Linux-arm64.deb
          ls -lh NetDiagnostics-Linux-arm64.deb

      - name: Cache fpm gem
        id: cache-fpm
        uses: actions/cache@v4
        with:
          path: /var/lib/gems
          key: fpm-gem-${{ runner.arch }}-v1

      - name: Package rpm
        run: |
          sudo gem install fpm 2>/dev/null || true
          # 5WHY: fpm gem was installed every run (~30s).  Caching /var/lib/gems
          # avoids the network fetch; gem install is a no-op when already present.
          fpm -s dir -t rpm -n netdiagnostics -v "${{ needs.version.outputs.pkg_version }}" --architecture aarch64 \
            --depends "qt6-qtbase" --depends "qt6-qtdeclarative" --depends "qt6-qtquickcontrols2" --depends "libcurl" \
            build/net_diagnostics=/usr/bin/net_diagnostics \
            resources/netanalysis.desktop=/usr/share/applications/netanalysis.desktop \
            resources/icons/netanalysis.png=/usr/share/icons/hicolor/256x256/apps/netanalysis.png
          mv netdiagnostics*.rpm NetDiagnostics-Linux-arm64.rpm 2>/dev/null || true
          ls -lh NetDiagnostics-Linux-arm64.rpm 2>/dev/null || echo "(rpm skipped)"

      - name: Build AppImage (simulator)
        run: |
          if command -v linuxdeployqt &>/dev/null || sudo apt-get install -y -qq linuxdeployqt 2>/dev/null; then
            mkdir -p AppDir-sim/usr/bin AppDir-sim/usr/share/applications AppDir-sim/usr/share/icons/hicolor/256x256/apps
            cp build-sim/net_diagnostics_sim AppDir-sim/usr/bin/
            cp resources/netanalysis-sim.desktop AppDir-sim/usr/share/applications/
            cp resources/icons/netanalysis.png AppDir-sim/usr/share/icons/hicolor/256x256/apps/
            linuxdeployqt AppDir-sim/usr/share/applications/netanalysis-sim.desktop -appimage -no-copy-copyright-files -no-translations || true
            mv *.AppImage NetDiagnostics-Linux-arm64-sim.AppImage 2>/dev/null || true
          fi

      - name: Package deb (simulator)
        run: |
          mkdir -p pkg-deb-sim/usr/bin pkg-deb-sim/usr/share/applications pkg-deb-sim/usr/share/icons/hicolor/256x256/apps pkg-deb-sim/DEBIAN
          cp build-sim/net_diagnostics_sim pkg-deb-sim/usr/bin/
          cp resources/netanalysis-sim.desktop pkg-deb-sim/usr/share/applications/
          cp resources/icons/netanalysis.png pkg-deb-sim/usr/share/icons/hicolor/256x256/apps/
          cat > pkg-deb-sim/DEBIAN/control << EOF
          Package: netdiagnostics-sim
          Version: ${{ needs.version.outputs.pkg_version }}
          Architecture: arm64
          Maintainer: ${{ env.MAINTAINER }}
          Depends: libqt6core6t64 | libqt6core6, libqt6gui6, libqt6quick6, libqt6quickcontrols2-6, libqt6widgets6, libqt6network6, libcurl4t64 | libcurl4
          Description: NetDiagnostic Simulator - Network diagnostics testing tool
          EOF
          dpkg-deb --build pkg-deb-sim NetDiagnostics-Linux-arm64-sim.deb
          ls -lh NetDiagnostics-Linux-arm64-sim.deb

      - name: Package rpm (simulator)
        run: |
          fpm -s dir -t rpm -n netdiagnostics-sim -v "${{ needs.version.outputs.pkg_version }}" --architecture aarch64 \
            --depends "qt6-qtbase" --depends "qt6-qtdeclarative" --depends "qt6-qtquickcontrols2" --depends "libcurl" \
            build-sim/net_diagnostics_sim=/usr/bin/net_diagnostics_sim \
            resources/netanalysis-sim.desktop=/usr/share/applications/netanalysis-sim.desktop \
            resources/icons/netanalysis.png=/usr/share/icons/hicolor/256x256/apps/netanalysis.png
          mv netdiagnostics-sim*.rpm NetDiagnostics-Linux-arm64-sim.rpm 2>/dev/null || true
          ls -lh NetDiagnostics-Linux-arm64-sim.rpm 2>/dev/null || echo "(rpm skipped)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-Linux-arm64
          path: |
            *.AppImage
            *.deb
            *.rpm
          if-no-files-found: error


  # ===================================================================
  # Windows x86_64 - static build (zero DLL) + NSIS installer
  # ===================================================================
  windows-x86_64-static:
    name: Windows x86_64 Static
    needs: [version]
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-perl
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-brotli
            mingw-w64-ucrt-x86_64-pcre2
            mingw-w64-ucrt-x86_64-libb2
            mingw-w64-ucrt-x86_64-zstd
            mingw-w64-ucrt-x86_64-libidn2
            mingw-w64-ucrt-x86_64-libpsl
            mingw-w64-ucrt-x86_64-libssh2
            mingw-w64-ucrt-x86_64-nghttp2
            mingw-w64-ucrt-x86_64-libunistring
            mingw-w64-ucrt-x86_64-libiconv
            mingw-w64-ucrt-x86_64-curl

      # - Cache C: curl true-static build (libcurl.a without DLL dependency) -
      # 5WHY: MSYS2's mingw-w64-ucrt-x86_64-curl package ships libcurl.a as
      # a DLL import library (equivalent to libcurl.dll.a).  Even with
      # -Wl,-Bstatic active, the linker uses the import lib which still
      # references libcurl-4.dll at runtime.  Building curl from source with
      # --disable-shared produces a true static libcurl.a that can be fully
      # absorbed into the exe, same pattern as the Qt source build below.
      - name: Cache curl static build
        id: cache-curl-static
        uses: actions/cache@v4
        with:
          path: C:\opt\curl-static
          key: curl-static-ucrt-8.9.1-v2

      - name: Build curl from source (true static)
        if: steps.cache-curl-static.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          CURL_VER="8.9.1"
          echo ">>> Downloading curl ${CURL_VER} source..."
          curl -fsSL "https://curl.se/download/curl-${CURL_VER}.tar.xz" -o /tmp/curl-src.tar.xz
          echo ">>> Extracting..."
          mkdir -p /tmp/curl-build
          tar -xJf /tmp/curl-src.tar.xz -C /tmp/curl-build --strip-components=1
          rm /tmp/curl-src.tar.xz
          cd /tmp/curl-build
          echo ">>> Configuring curl with CMake (static only, no shared)..."
          # 5WHY: autotools configure+make failed with exit 127 in MSYS2
          # (make/nproc unavailable).  CMake is already installed for Qt
          # and has reliable cross-compilation support.  CMake curl build
          # produces a true static libcurl.a without DLL dependency.
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCURL_USE_OPENSSL=ON \
            -DCURL_DISABLE_LDAP=ON \
            -DCURL_DISABLE_LDAPS=ON \
            -DCMAKE_INSTALL_PREFIX=/c/opt/curl-static \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCMAKE_C_FLAGS="-static -static-libgcc -O2" \
            -DCMAKE_PREFIX_PATH=/ucrt64
          echo ">>> Building curl..."
          cmake --build build --parallel 4
          echo ">>> Installing curl to /c/opt/curl-static..."
          cmake --install build
          echo ">>> Verifying static libcurl.a..."
          ls -lh /c/opt/curl-static/lib/libcurl.a
          file /c/opt/curl-static/lib/libcurl.a || true
          echo ">>> curl static build complete."

      # - Cache A: Qt source code (extracted tarball) -
      - name: Cache Qt source tarball
        id: cache-qt-src
        uses: actions/cache@v4
        with:
          path: C:\opt\qt6-src
          key: qt6-src-${{ env.QT_VERSION_WINDOWS_SRC }}-v1

      - name: Download Qt source
        if: steps.cache-qt-src.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          QT_VER="${{ env.QT_VERSION_WINDOWS_SRC }}"
          QT_MAJMIN="${QT_VER%.*}"
          echo ">>> Downloading Qt ${QT_VER} source..."
          curl -fsSL "https://download.qt.io/official_releases/qt/${QT_MAJMIN}/${QT_VER}/single/qt-everywhere-src-${QT_VER}.tar.xz" -o /tmp/qt-src.tar.xz
          echo ">>> Extracting..."
          mkdir -p /c/opt/qt6-src
          tar -xJf /tmp/qt-src.tar.xz -C /c/opt/qt6-src --strip-components=1
          rm /tmp/qt-src.tar.xz

      # - Cache B: Qt build artifacts (install prefix) -
      - name: Cache Qt build artifacts
        id: cache-qt-build
        uses: actions/cache@v4
        with:
          path: C:\opt\qt6-install
          key: qt6-build-ucrt-${{ env.QT_VERSION_WINDOWS_SRC }}-v2

      - name: Build Qt from source
        if: steps.cache-qt-build.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          cd /c/opt/qt6-src
          echo ">>> Configuring Qt (qtbase + qtshadertools + qtdeclarative + qttools only)..."
          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/c/opt/qt6-install \
            -DCMAKE_CXX_FLAGS="-static -static-libgcc -static-libstdc++ -O2" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -static" \
            -DCMAKE_C_FLAGS="-static -static-libgcc -O2" \
            -DFEATURE_static=ON -DFEATURE_shared=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DFEATURE_pch=OFF -DFEATURE_icu=OFF -DFEATURE_dbus=OFF \
            -DFEATURE_system_zlib=OFF \
            -DFEATURE_system_brotli=OFF \
            -DFEATURE_system_pcre2=OFF \
            -DFEATURE_system_libb2=OFF \
            -DFEATURE_zstd=OFF \
            -DFEATURE_brotli=OFF \
            -DQT_BUILD_SUBMODULES="qtbase;qtshadertools;qtdeclarative;qttools" \
            -DQT_BUILD_EXAMPLES=OFF -DQT_BUILD_TESTS=OFF
          echo ">>> Building (4 submodules only)..."
          cmake --build build --parallel
          echo ">>> Installing..."
          cmake --install build
          echo ">>> Qt static build complete."

      # - Build Production + Simulator in parallel -
      - name: Build Production + Simulator (static, parallel)
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          mkdir -p dist
          # 5WHY: /ucrt64/lib/libstdc++.a and libwinpthread.a are DLL import
          # libraries in MSYS2.  Even with -Wl,-Bstatic, they produce DLL
          # references in the PE header (MSYS2/MINGW-packages issue #6163).
          # The TRUE static archives live in the GCC versioned directory at
          # /ucrt64/lib/gcc/x86_64-w64-mingw32/<version>/.
          # Use g++ -print-file-name to find them and link with ABSOLUTE PATHS.
          # Absolute paths bypass library search entirely — the linker uses
          # the exact file specified, no import lib / DLL resolution.
          GCC_TRUE_LIBSTDCXX=$(g++ -print-file-name=libstdc++.a)
          GCC_TRUE_LIBGCC=$(g++ -print-file-name=libgcc.a)
          GCC_TRUE_LIBGCC_EH=$(g++ -print-file-name=libgcc_eh.a)
          GCC_TRUE_LIBPTHREAD=$(g++ -print-file-name=libwinpthread.a)
          echo "GCC true static libstdc++: ${GCC_TRUE_LIBSTDCXX}"
          echo "GCC true static libgcc:    ${GCC_TRUE_LIBGCC}"
          echo "GCC true static libgcc_eh: ${GCC_TRUE_LIBGCC_EH}"
          echo "GCC true static pthread:  ${GCC_TRUE_LIBPTHREAD}"

          # ── Fully static link — true static archives via absolute paths ──
          # Strategy: absolute .a paths bypass all -L search order issues.
          # libstdc++.a, libgcc.a, libgcc_eh.a, libwinpthread.a are the
          # GCC-internal TRUE static archives, NOT the /ucrt64/lib/ import libs.
          # libcurl is fully absorbed via the true-static source build at
          # /c/opt/curl-static.  All other third-party DLLs (libssl, libcrypto,
          # libiconv, zlib, libzstd, libbrotli, libidn2, libpsl, libssh2,
          # libnghttp2, libunistring) are absorbed by -Wl,-Bstatic sandwich.

          CMAKE_COMMON=(
            -G Ninja -DCMAKE_BUILD_TYPE=Release
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}"
            "-DND_BUILD_NUMBER=${{ github.run_number }}"
            -DAPP_EDITION=static
            -DCMAKE_CXX_FLAGS="-static -static-libgcc -static-libstdc++ -O2"
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ -Wl,--gc-sections"
            -DCMAKE_PREFIX_PATH=/c/opt/qt6-install
            -DBUILD_TESTS=OFF
            -DCURL_STATICLIB=ON
            -DCURL_LIBRARY=/c/opt/curl-static/lib/libcurl.a
            -DCURL_INCLUDE_DIR=/c/opt/curl-static/include
            "-DGCC_TRUE_LIBSTDCXX=${GCC_TRUE_LIBSTDCXX}"
            "-DGCC_TRUE_LIBGCC=${GCC_TRUE_LIBGCC}"
            "-DGCC_TRUE_LIBGCC_EH=${GCC_TRUE_LIBGCC_EH}"
            "-DGCC_TRUE_LIBPTHREAD=${GCC_TRUE_LIBPTHREAD}"
          )

          # Configure both in parallel (independent build trees)
          cmake "${CMAKE_COMMON[@]}" -DBUILD_SIMULATOR=OFF -B build -S . &
          cmake "${CMAKE_COMMON[@]}" -DBUILD_SIMULATOR=ON  -B build-sim -S . &
          wait

          # Build both in parallel.  The simulator may fail on Qt 6.11
          # (QQuickItem incomplete type — header layout changed); treat
          # its failure as non-fatal so DLL verification still runs.
          ninja -C build net_diagnostics &
          ninja -C build-sim net_diagnostics_sim || true &
          wait

          # Post-process (strip + copy - fast, sequential)
          strip build/net_diagnostics.exe
          cp build/net_diagnostics.exe dist/netdiag-win-x86_64-standalone.exe
          if [ -f build-sim/net_diagnostics_sim.exe ]; then
            strip build-sim/net_diagnostics_sim.exe
            cp build-sim/net_diagnostics_sim.exe dist/netdiag-win-x86_64-sim-standalone.exe
          else
            echo ">>> Simulator exe skipped (Qt 6.11 header incompatibility)"
          fi

      # - Enforce zero non-OS DLL dependencies -
      - name: Verify zero non-OS DLL dependencies
        shell: msys2 {0}
        run: |
          set -euo pipefail
          # ── DLL whitelist — Windows OS + unavoidable GCC toolchain ─────
          # Windows OS DLLs (cannot be static-linked — OS ABI):
          SYSTEM_DLLS="KERNEL32|USER32|GDI32|ADVAPI32|SHELL32|ole32|OLEAUT32|WS2_32|IPHLPAPI|DNSAPI|WINHTTP|WLANAPI|SETUPAPI|SHCORE|VERSION|IMM32|CRYPT32|RPCRT4|USP10|WLDAP32|NTDLL|bcrypt|ncrypt|NETAPI32|AUTHZ|UxTheme|comdlg32|dwmapi|SHLWAPI|Secur32|USERENV|WINMM|WSOCK32|D3D9|D3D11|D3D12|DXGI|DWRITE|WTSAPI32|api-ms-win|ext-ms-win"
          # 5WHY: libstdc++-6 was not filtered by grep -E because '+' is a regex
          # quantifier. In ERE, '++' is undefined/ambiguous — GNU grep treats the
          # second '+' as literal but first as quantifier, so 'libstdc++-6' never
          # matches the literal DLL name. Escape '+' as '\\+' for literal match.
          # GCC runtime DLLs (libstdc++-6, libgcc_s_seh-1, libwinpthread-1) are
          # NOW ELIMINATED via true-static .a archives from g++ -print-file-name.
          # They are deliberately NOT whitelisted — if they appear, the build FAILS.
          # Third-party DLLs that MUST be absorbed (-Wl,-Bstatic ensures):
          # libcurl-4, libssl-3-x64, libcrypto-3-x64, libiconv-2,
          # libzstd-1, libbrotlidec, libbrotlicommon, libidn2-0,
          # libpsl-5, libssh2-1, libnghttp2-14, libunistring-5, libintl-8
          FAIL=0

          check_exe() {
            local exe="$1"
            [ -f "$exe" ] || return 0
            echo "  Checking: $(basename "$exe")"
            local nonsys
            nonsys=$(objdump -p "$exe" 2>/dev/null | grep "DLL Name" | awk '{print $3}' | tr -d '\r' | grep -viE "$SYSTEM_DLLS" || true)
            if [ -n "$nonsys" ]; then
              echo "  [FAIL] Non-OS DLL dependencies found:"
              printf '    %s\n' $nonsys
              FAIL=1
            else
              echo "  [OK] Zero non-OS DLL dependencies (fully static)"
            fi
          }

          check_exe dist/netdiag-win-x86_64-standalone.exe
          check_exe dist/netdiag-win-x86_64-sim-standalone.exe

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "ERROR: build is NOT zero-DLL. The static link did not absorb the"
            echo "       DLLs listed above. Fix the static Qt/toolchain link flags."
            exit 1
          fi
          echo ""
          echo "  === All executables are fully static (zero non-OS DLL) ==="
          echo ""
          echo "  ╔══════════════════════════════════════════════════════════╗"
          echo "  ║  Full G5 diagnostics: static curl linked.  20 protocol ║"
          echo "  ║  tests: HTTP/HTTPS, FTP, SSH, Email, Telnet, MySQL,    ║"
          echo "  ║  Redis, PostgreSQL, MongoDB, LDAP, MQTT, and more.     ║"
          echo "  ╚══════════════════════════════════════════════════════════╝"
          echo ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-Windows-x86_64-Static
          path: |
            dist/netdiag-win-x86_64-standalone.exe
            dist/netdiag-win-x86_64-sim-standalone.exe
          if-no-files-found: error

  # ===================================================================
  # Windows x86_64 - dynamic Qt6 via MSYS2 + NSIS installer
  # ===================================================================
  windows-x86_64-dynamic:
    name: Windows x86_64 Dynamic
    needs: [version]
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-declarative
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-qt6-translations
            mingw-w64-ucrt-x86_64-nsis

      - name: Build Production + Simulator
        shell: msys2 {0}
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=dynamic \
            -B build -S .
          ninja -C build net_diagnostics
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=dynamic \
            -B build-sim -S .
          ninja -C build-sim net_diagnostics_sim

      - name: Deploy Qt DLLs (windeployqt)
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          QT_BIN=/ucrt64/bin
          export PATH="$QT_BIN:$PATH"
          mkdir -p dist/installer
          cp build/net_diagnostics.exe dist/installer/
          cp build-sim/net_diagnostics_sim.exe dist/installer/ 2>/dev/null || true
          # Deploy Qt DLLs, plugins, and QML modules into dist/installer/.
          # Previously this command passed --qmldir and --libdir.
          # --qmldir was removed because Qt 6.7+ on MSYS2 no longer ships
          # qmlimportscanner.exe (the newer 'qml' tool is used instead), and
          # windeployqt can detect required QML modules from binary analysis.
          # --libdir was removed so Qt DLLs stay beside the exe in dist/installer/,
          # which is required for NSIS packaging.
          windeployqt dist/installer/net_diagnostics.exe \
            --no-translations \
            --no-compiler-runtime
          if [ -f dist/installer/net_diagnostics_sim.exe ]; then
            windeployqt dist/installer/net_diagnostics_sim.exe \
              --no-translations \
              --no-compiler-runtime
          fi
          # Copy third-party runtime DLLs that windeployqt doesn't handle
          for dll in libcurl-4 libssl-3-x64 libcrypto-3-x64 \
                     libgcc_s_seh-1 libstdc++-6 libwinpthread-1; do
            cp "$QT_BIN/${dll}.dll" dist/installer/ 2>/dev/null || true
          done
          echo "=== Deployed files ==="
          ls -R dist/installer/

      - name: Build NSIS installer
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          makensis -DSOURCE_DIR_WIN="$(cygpath -w "$PWD/dist/installer")" \
                   -DICON_WIN="$(cygpath -w "$PWD/resources/icons/netanalysis.ico")" \
                   -DOUTDIR_WIN="$(cygpath -w "$PWD/dist")" \
                   -DPRODUCT_VERSION="${{ needs.version.outputs.pkg_version }}" \
                   scripts/installer/NetDiagnostic.nsi
          ls -lh dist/NetDiagnostics-Windows-x86_64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-Windows-x86_64-Dynamic
          path: |
            dist/NetDiagnostics-Windows-x86_64.exe
          if-no-files-found: error

  # ===================================================================
  # macOS arm64 — Apple Silicon native build + simulator + DMG
  # ===================================================================
  macos-arm64:
    name: macOS arm64
    needs: [version]
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja qt@6

      - uses: ./.github/actions/macos-icon

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=macos-arm64 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostics

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=macos-arm64 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostics_sim

      - name: Package DMG (production)
        run: |
          if [ -d build/net_diagnostics.app ]; then
            echo "Packaging .app into DMG..."
            hdiutil create -volname "NetDiagnostics" -srcfolder build/net_diagnostics.app -ov -format UDZO NetDiagnostics-macOS-arm64.dmg
            ls -lh NetDiagnostics-macOS-arm64.dmg
          else
            echo "No .app bundle found; falling back to binary packaging"
            mkdir -p pkg/NetDiagnostic.app/Contents/MacOS
            cp build/net_diagnostics pkg/NetDiagnostic.app/Contents/MacOS/
            hdiutil create -volname "NetDiagnostics" -srcfolder pkg/NetDiagnostic.app -ov -format UDZO NetDiagnostics-macOS-arm64.dmg || true
          fi
        continue-on-error: true

      - name: Package DMG (simulator)
        continue-on-error: true
        run: |
          mkdir -p pkg-sim/NetDiagnostic.app/Contents/MacOS
          cp build-sim/net_diagnostics_sim pkg-sim/NetDiagnostic.app/Contents/MacOS/
          hdiutil create -volname "NetDiagnostics Sim" -srcfolder pkg-sim/NetDiagnostic.app -ov -format UDZO NetDiagnostics-macOS-arm64-sim.dmg || true
          ls -lh NetDiagnostics-macOS-arm64-sim.dmg 2>/dev/null || echo "(sim DMG skipped)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-macOS-arm64
          path: |
            *.dmg
          if-no-files-found: error

  # iOS build in .github/workflows/apple.yml

  # ===================================================================
  # Android x86_64 - cross-compile via aqtinstall + NDK
  # ===================================================================
  android-x86_64:
    name: Android x86_64
    needs: [version]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build
          # 5WHY: pip install without --break-system-packages fails on
          # Ubuntu 24.04+ (PEP 668 externally-managed-environment).
          # Use a venv for isolation, same pattern as apple.yml.
          python3 -m venv /tmp/venv && source /tmp/venv/bin/activate && pip install aqtinstall
          echo "/tmp/venv/bin" >> "$GITHUB_PATH"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Qt6 desktop (host tools)
        id: cache-qt-desktop
        uses: actions/cache@v4
        with:
          path: /opt/qt-desktop
          key: qt6-android-desktop-${{ env.QT_VERSION_ANDROID }}-v1

      - name: Install Qt6 desktop via aqt
        if: steps.cache-qt-desktop.outputs.cache-hit != 'true'
        run: |
          aqt install-qt linux desktop $QT_VERSION_ANDROID gcc_64 -O /opt/qt-desktop

      - name: Cache Qt6 Android x86_64
        id: cache-qt-android
        uses: actions/cache@v4
        with:
          path: /opt/qt-android-x86_64
          key: qt6-android-x86_64-${{ env.QT_VERSION_ANDROID }}-v1

      - name: Install Qt6 for Android via aqt
        if: steps.cache-qt-android.outputs.cache-hit != 'true'
        run: |
          aqt install-qt linux android $QT_VERSION_ANDROID android_x86_64 -O /opt/qt-android-x86_64

      - name: Configure
        run: |
          echo "[Android x86_64] Configuring..."
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=android-x86_64 \
            -DCMAKE_PREFIX_PATH="/opt/qt-android-x86_64/$QT_VERSION_ANDROID/android_x86_64" \
            -DQT_HOST_PATH="/opt/qt-desktop/$QT_VERSION_ANDROID/gcc_64" \
            -DCMAKE_FIND_ROOT_PATH="/opt/qt-android-x86_64/$QT_VERSION_ANDROID/android_x86_64" \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API_LEVEL }} \
            -B build -S .

      - name: Build
        run: |
          ninja -C build net_diagnostics

      - uses: ./.github/actions/android-apk
        with:
          qt_version: ${{ env.QT_VERSION_ANDROID }}
          output_name: NetDiagnostics-Android-x86_64.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-Android-x86_64
          path: |
            NetDiagnostics-Android-x86_64.apk
          if-no-files-found: error

  # ===================================================================
  # Android arm64 - cross-compile via aqtinstall + NDK
  # ===================================================================
  android-arm64:
    name: Android arm64
    needs: [version]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build
          # 5WHY: pip install without --break-system-packages fails on
          # Ubuntu 24.04+ (PEP 668 externally-managed-environment).
          # Use a venv for isolation, same pattern as apple.yml.
          python3 -m venv /tmp/venv && source /tmp/venv/bin/activate && pip install aqtinstall
          echo "/tmp/venv/bin" >> "$GITHUB_PATH"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Qt6 desktop (host tools)
        id: cache-qt-desktop
        uses: actions/cache@v4
        with:
          path: /opt/qt-desktop
          key: qt6-android-desktop-${{ env.QT_VERSION_ANDROID }}-v1

      - name: Install Qt6 desktop via aqt
        if: steps.cache-qt-desktop.outputs.cache-hit != 'true'
        run: |
          aqt install-qt linux desktop $QT_VERSION_ANDROID gcc_64 -O /opt/qt-desktop

      - name: Cache Qt6 Android arm64
        id: cache-qt-android
        uses: actions/cache@v4
        with:
          path: /opt/qt-android-arm64
          key: qt6-android-arm64-${{ env.QT_VERSION_ANDROID }}-v1

      - name: Install Qt6 for Android via aqt
        if: steps.cache-qt-android.outputs.cache-hit != 'true'
        run: |
          aqt install-qt linux android $QT_VERSION_ANDROID android_arm64_v8a -O /opt/qt-android-arm64

      - name: Configure
        run: |
          echo "[Android arm64] Configuring..."
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DPROJECT_VERSION="${{ needs.version.outputs.pkg_version }}" \
            -DND_BUILD_NUMBER=${{ github.run_number }} \
            -DAPP_EDITION=android-arm64 \
            -DCMAKE_PREFIX_PATH="/opt/qt-android-arm64/$QT_VERSION_ANDROID/android_arm64_v8a" \
            -DQT_HOST_PATH="/opt/qt-desktop/$QT_VERSION_ANDROID/gcc_64" \
            -DCMAKE_FIND_ROOT_PATH="/opt/qt-android-arm64/$QT_VERSION_ANDROID/android_arm64_v8a" \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API_LEVEL }} \
            -B build -S .

      - name: Build
        run: |
          ninja -C build net_diagnostics

      - uses: ./.github/actions/android-apk
        with:
          qt_version: ${{ env.QT_VERSION_ANDROID }}
          output_name: NetDiagnostics-Android-arm64.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostics-Android-arm64
          path: |
            NetDiagnostics-Android-arm64.apk
          if-no-files-found: error

  # iOS build moved to .github/workflows/apple.yml
  # (combined macOS + iOS build with TestFlight deploy)

  # ===================================================================
  # Release — auto-bump version, create tag, and publish GitHub Release
  # ===================================================================
  release:
    name: Create Release
    needs:
      - version
      - linux-x86_64
      - linux-arm64
      - windows-x86_64-static
      - windows-x86_64-dynamic
      - macos-arm64
      - android-x86_64
      - android-arm64
    if: (!failure()) && (!cancelled())
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute release tag
        id: version
        run: |
          TAG="v${{ needs.version.outputs.pkg_version }}"
          echo "next_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect individual assets
        run: |
          cd artifacts
          mkdir -p release-assets

          # Debug: show all downloaded artifact files
          echo "=== All downloaded files ==="
          find . -type f | sort
          echo "============================"

          # Copy assets with consistent naming: netdiagnostics-{os}-{arch}.{ext}
          for dir in */; do
            dir_lower=$(echo "$dir" | tr '[:upper:]' '[:lower:]')
            suffix=""
            case "$dir_lower" in
              *windows*static*)
                os="windows"; arch="x86_64"; suffix="-static" ;;
              *windows*dynamic*)
                os="windows"; arch="x86_64"; suffix="-dynamic" ;;
              *windows*)
                os="windows"; arch="x86_64" ;;
              *linux-x86_64*|*linux*86*)
                os="linux"; arch="x86_64" ;;
              *linux-arm64*|*linux*arm*)
                os="linux"; arch="arm64" ;;
              *macos*)
                os="macos"; arch="arm64" ;;
              *android-x86_64*|*android*x86*)
                os="android"; arch="x86_64" ;;
              *android-arm64*|*android*arm*)
                os="android"; arch="arm64" ;;
              *ios*)
                os="ios"; arch="arm64" ;;
              *)
                echo "Skipping unknown: $dir"; continue ;;
            esac
            echo "Processing: $dir → $os/$arch"
            while IFS= read -r f; do
              base=$(basename "$f" | tr '[:upper:]' '[:lower:]')
              ext="${base##*.}"
              normalized_ext="$ext"
              [ "$normalized_ext" = "appimage" ] && normalized_ext="AppImage"
              case "$base" in
                *-sim.*|*-sim-*)
                  name="netdiagnostics-${os}-${arch}-sim.${normalized_ext}" ;;
                *.appimage) name="netdiagnostics-${os}-${arch}.${normalized_ext}" ;;
                *.deb)      name="netdiagnostics-${os}-${arch}.deb" ;;
                *.rpm)      name="netdiagnostics-${os}-${arch}.rpm" ;;
                *.dmg)      name="netdiagnostics-${os}-${arch}.dmg" ;;
                *.ipa)      name="netdiagnostics-${os}-${arch}.ipa" ;;
                *.apk)      name="netdiagnostics-${os}-${arch}.apk" ;;

                *netdiagnostics-*.exe)
                  name="netdiagnostics-${os}-${arch}${suffix}-setup.exe" ;;
                *.exe)
                  name="netdiagnostics-${os}-${arch}${suffix}.exe" ;;
                *)          name="$base" ;;
              esac
              cp "$f" "release-assets/$name"
              echo "  → $name"
            done < <(find "$dir" -type f ! -name "*.o" ! -name "*.obj")
          done

          echo ""
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          files: |
            artifacts/release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}