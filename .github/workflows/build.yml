name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Linux x86_64 — native GCC build + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            libqt6quickcontrols2-6 \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxcb-cursor-dev

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Linux-x86_64
          path: |
            build/net_diagnostic
            build-sim/net_diagnostic_sim
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Windows x86_64 — native MSVC build + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtquickcontrols2'
          cache: true

      - name: Install ninja
        run: choco install ninja -y --no-progress

      - name: Install libcurl (pre-built)
        run: |
          vcpkg install curl:x64-windows

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DBUILD_SIMULATOR=ON `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Windows-x86_64
          path: |
            build/net_diagnostic.exe
            build-sim/net_diagnostic_sim.exe
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS x86_64 — native Apple Clang + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja qt@6 curl

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-macOS-x86_64
          path: |
            build/net_diagnostic
            build-sim/net_diagnostic_sim
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS arm64 — native Apple Clang + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja qt@6 curl

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-macOS-arm64
          path: |
            build/net_diagnostic
            build-sim/net_diagnostic_sim
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Release — create GitHub Release on tag push
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs:
      - linux-x86_64
      - windows-x86_64
      - macos-x86_64
      - macos-arm64
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in NetDiagnostic-*; do
            if [ -d "$dir" ]; then
              tar -cJf "${dir}.tar.xz" "$dir"
            fi
          done
          ls -lh *.tar.xz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
