name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.5.3

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Linux x86_64 — native GCC build + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            libqt6quickcontrols2-6 \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxcb-cursor-dev

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Build AppImage (production)
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp build/net_diagnostic AppDir/usr/bin/
          cp resources/icons/netanalysis.png AppDir/ || true
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/bin/net_diagnostic -appimage -no-copy-copyright-files -no-translations || true
          mv *.AppImage NetDiagnostic-Linux-x86_64.AppImage 2>/dev/null || true
        continue-on-error: true

      - name: Package deb
        run: |
          mkdir -p pkg-deb/usr/bin pkg-deb/DEBIAN
          cp build/net_diagnostic pkg-deb/usr/bin/
          cat > pkg-deb/DEBIAN/control << EOF
          Package: netdiagnostic
          Version: 0.0.1
          Architecture: amd64
          Maintainer: robinhoo1973
          Depends: qt6-base, qt6-declarative, libqt6quickcontrols2-6, libcurl4
          Description: Cross-platform network diagnostics tool — Qt6/QML
          EOF
          dpkg-deb --build pkg-deb NetDiagnostic-Linux-x86_64.deb
          ls -lh NetDiagnostic-Linux-x86_64.deb
        continue-on-error: true

      - name: Package rpm
        run: |
          sudo gem install fpm
          fpm -s dir -t rpm -n netdiagnostic -v 0.0.1 --architecture x86_64 \
            --depends "qt6-base" --depends "qt6-declarative" --depends "libcurl4" \
            build/net_diagnostic=/usr/bin/net_diagnostic
          mv netdiagnostic*.rpm NetDiagnostic-Linux-x86_64.rpm 2>/dev/null || true
          ls -lh NetDiagnostic-Linux-x86_64.rpm 2>/dev/null || echo "(rpm skipped)"
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Linux-x86_64
          path: |
            build/net_diagnostic
            build-sim/net_diagnostic_sim
            *.AppImage
            *.deb
            *.rpm
          if-no-files-found: error


  # ═══════════════════════════════════════════════════════════════════════════
  # Linux arm64 — native GCC build + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            libqt6quickcontrols2-6 \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxcb-cursor-dev

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Build AppImage (production)
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp build/net_diagnostic AppDir/usr/bin/
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/bin/net_diagnostic -appimage -no-copy-copyright-files -no-translations || true
          mv *.AppImage NetDiagnostic-Linux-arm64.AppImage 2>/dev/null || true
        continue-on-error: true

      - name: Package deb
        run: |
          mkdir -p pkg-deb/usr/bin pkg-deb/DEBIAN
          cp build/net_diagnostic pkg-deb/usr/bin/
          cat > pkg-deb/DEBIAN/control << EOF
          Package: netdiagnostic
          Version: 0.0.1
          Architecture: arm64
          Maintainer: robinhoo1973
          Depends: qt6-base, qt6-declarative, libqt6quickcontrols2-6, libcurl4
          Description: Cross-platform network diagnostics tool — Qt6/QML
          EOF
          dpkg-deb --build pkg-deb NetDiagnostic-Linux-arm64.deb
          ls -lh NetDiagnostic-Linux-arm64.deb
        continue-on-error: true

      - name: Package rpm
        run: |
          sudo gem install fpm
          fpm -s dir -t rpm -n netdiagnostic -v 0.0.1 --architecture aarch64 \
            --depends "qt6-base" --depends "qt6-declarative" --depends "libcurl4" \
            build/net_diagnostic=/usr/bin/net_diagnostic
          mv netdiagnostic*.rpm NetDiagnostic-Linux-arm64.rpm 2>/dev/null || true
          ls -lh NetDiagnostic-Linux-arm64.rpm 2>/dev/null || echo "(rpm skipped)"
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Linux-arm64
          path: |
            build/net_diagnostic
            *.AppImage
            *.deb
            *.rpm
          if-no-files-found: error


  # ═══════════════════════════════════════════════════════════════════════════
  # Windows x86_64 — static build via MSYS2 + Qt6-static (zero DLL deps)
  # ═══════════════════════════════════════════════════════════════════════════
  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        id: setup-msys2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-perl
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-curl-winssl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-libffi
            mingw-w64-ucrt-x86_64-dbus
            mingw-w64-ucrt-x86_64-libiconv
            mingw-w64-ucrt-x86_64-zstd
            mingw-w64-ucrt-x86_64-brotli

      - name: Cache source-built Qt 6.5.3 static
        id: cache-qt6-source
        uses: actions/cache@v4
        with:
          path: C:\opt\qt6-static-source
          key: qt6-source-mingw-ucrt-6.5.3-v2

      - name: Build Qt 6.5.3 static from source
        if: steps.cache-qt6-source.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          curl -fsSL https://download.qt.io/official_releases/qt/6.5/6.5.3/single/qt-everywhere-src-6.5.3.tar.xz \
            -o /tmp/qt-src.tar.xz
          mkdir -p /c/opt/qt6-static-source
          tar -xJf /tmp/qt-src.tar.xz -C /c/opt/qt6-static-source --strip-components=1
          rm /tmp/qt-src.tar.xz
          cd /c/opt/qt6-static-source
          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/c/opt/qt6-static-source/install \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++ -O2" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -static" \
            -DFEATURE_static=ON -DFEATURE_shared=OFF \
            -DFEATURE_static_runtime=ON \
            -DFEATURE_pch=OFF -DFEATURE_icu=OFF -DFEATURE_dbus=OFF \
            -DQT_BUILD_EXAMPLES=OFF -DQT_BUILD_TESTS=OFF \
            -DBUILD_qtwebengine=OFF -DBUILD_qttools=OFF \
            -DBUILD_qttranslations=OFF -DBUILD_qtactiveqt=OFF \
            -DBUILD_qtcharts=OFF -DBUILD_qtlocation=OFF \
            -DBUILD_qtmultimedia=OFF -DBUILD_qtsensors=OFF \
            -DBUILD_qtspeech=OFF -DBUILD_qtvirtualkeyboard=OFF \
            -DBUILD_qtdoc=OFF -DBUILD_qtquick3d=OFF \
            -DBUILD_qtshadertools=OFF -DBUILD_qtserialport=OFF \
            -DBUILD_qtwebsockets=OFF -DBUILD_qtwebchannel=OFF
          ninja -C build qtbase qtdeclarative qtsvg
          cmake --install build --prefix /c/opt/qt6-static-source/install

      - name: Static Build (prod + sim)
        shell: pwsh
        run: |
          $msysPath = "${{ steps.setup-msys2.outputs.msys2-location }}"
          if (-not $msysPath -or $msysPath -eq '') { $msysPath = "C:\msys64" }
          Write-Host "MSYS2 path: $msysPath"
          .\scripts\build-static.ps1 -Clean -MsysPath $msysPath `
            -Qt6StaticPath "C:\opt\qt6-static-source\install\lib\cmake\Qt6"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Windows-x86_64
          path: |
            dist/netdiag-*.exe
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS x86_64 — native Apple Clang + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  # macOS arm64 — native Apple Clang + simulator
  # ═══════════════════════════════════════════════════════════════════════════
  macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja qt@6 curl

      - name: Generate macOS app icon (.icns)
        run: |
          mkdir -p icon.iconset
          sips -z 16 16 resources/icons/netanalysis.png --out icon.iconset/icon_16x16.png 2>/dev/null
          sips -z 32 32 resources/icons/netanalysis.png --out icon.iconset/icon_32x32.png 2>/dev/null
          sips -z 128 128 resources/icons/netanalysis.png --out icon.iconset/icon_128x128.png 2>/dev/null
          sips -z 256 256 resources/icons/netanalysis.png --out icon.iconset/icon_256x256.png 2>/dev/null
          sips -z 512 512 resources/icons/netanalysis.png --out icon.iconset/icon_512x512.png 2>/dev/null
          iconutil -c icns icon.iconset -o resources/icons/netanalysis.icns 2>/dev/null && echo "icon generated" || echo "icon skipped (png not found)"
        continue-on-error: true

      - name: Configure (production)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build -S .

      - name: Build (production)
        run: ninja -C build net_diagnostic

      - name: Configure (simulator)
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_SIMULATOR=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -B build-sim -S .

      - name: Build (simulator)
        run: ninja -C build-sim net_diagnostic_sim

      - name: Package DMG (production)
        run: |
          if [ -d build/net_diagnostic.app ]; then
            echo "Packaging .app into DMG..."
            hdiutil create -volname "NetDiagnostic" -srcfolder build/net_diagnostic.app -ov -format UDZO NetDiagnostic-macOS-arm64.dmg
            ls -lh NetDiagnostic-macOS-arm64.dmg
          else
            echo "No .app bundle found; falling back to binary packaging"
            mkdir -p pkg/NetDiagnostic.app/Contents/MacOS
            cp build/net_diagnostic pkg/NetDiagnostic.app/Contents/MacOS/
            hdiutil create -volname "NetDiagnostic" -srcfolder pkg/NetDiagnostic.app -ov -format UDZO NetDiagnostic-macOS-arm64.dmg || true
          fi
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-macOS-arm64
          path: |
            build/net_diagnostic
            build/net_diagnostic.app
            build-sim/net_diagnostic_sim
            *.dmg
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Android x86_64 — cross-compile via aqtinstall + NDK
  # ═══════════════════════════════════════════════════════════════════════════
  android-x86_64:
    name: Android x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Qt6 desktop (host tools)
        id: cache-qt-desktop
        uses: actions/cache@v4
        with:
          path: /opt/qt-desktop
          key: qt6-android-desktop-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 desktop via aqt
        if: steps.cache-qt-desktop.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop $QT_VERSION gcc_64 -O /opt/qt-desktop

      - name: Cache Qt6 Android x86_64
        id: cache-qt-android
        uses: actions/cache@v4
        with:
          path: /opt/qt-android-x86_64
          key: qt6-android-x86_64-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 for Android via aqt
        if: steps.cache-qt-android.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux android $QT_VERSION android_x86_64 -O /opt/qt-android-x86_64

      - name: Configure
        run: |
          echo "[Android x86_64] Configuring..."
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="/opt/qt-android-x86_64/$QT_VERSION/android_x86_64" \
            -DQT_HOST_PATH="/opt/qt-desktop/$QT_VERSION/gcc_64" \
            -DCMAKE_FIND_ROOT_PATH="/opt/qt-android-x86_64/$QT_VERSION/android_x86_64" \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-26 \
            -DQT_ANDROID_ABIS="x86_64" \
            -B build -S .

      - name: Build
        run: |
          ninja -C build net_diagnostic

      - name: Package APK
        run: |
          QT_ANDROID="/opt/qt-android-x86_64/$QT_VERSION/android_x86_64"
          DEPLOY_JSON=$(find build -name "*deployment*.json" 2>/dev/null | head -1)
          if [ -f "$DEPLOY_JSON" ]; then
            "$QT_ANDROID/bin/androiddeployqt" --input "$DEPLOY_JSON" --output build/android-build --android-platform android-34 --jdk "$JAVA_HOME" --verbose
          else
            mkdir -p build/android-build/libs/x86_64
            cp build/libnet_diagnostic_x86_64.so build/android-build/libs/x86_64/libnet_diagnostic.so
            cp resources/android/AndroidManifest.xml build/android-build/
            (cd build/android-build \&\& zip -r ../../NetDiagnostic-Android-x86_64.apk .)
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Android-x86_64
          path: |
            build/libnet_diagnostic_x86_64.so
            build/*.apk
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Android arm64 — cross-compile via aqtinstall + NDK
  # ═══════════════════════════════════════════════════════════════════════════
  android-arm64:
    name: Android arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Qt6 desktop (host tools)
        id: cache-qt-desktop
        uses: actions/cache@v4
        with:
          path: /opt/qt-desktop
          key: qt6-android-desktop-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 desktop via aqt
        if: steps.cache-qt-desktop.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop $QT_VERSION gcc_64 -O /opt/qt-desktop

      - name: Cache Qt6 Android arm64
        id: cache-qt-android
        uses: actions/cache@v4
        with:
          path: /opt/qt-android-arm64
          key: qt6-android-arm64-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 for Android via aqt
        if: steps.cache-qt-android.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux android $QT_VERSION android_arm64_v8a -O /opt/qt-android-arm64

      - name: Configure
        run: |
          echo "[Android arm64] Configuring..."
          cmake -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_PREFIX_PATH="/opt/qt-android-arm64/$QT_VERSION/android_arm64_v8a" \
            -DQT_HOST_PATH="/opt/qt-desktop/$QT_VERSION/gcc_64" \
            -DCMAKE_FIND_ROOT_PATH="/opt/qt-android-arm64/$QT_VERSION/android_arm64_v8a" \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DQT_ANDROID_ABIS="arm64-v8a" \
            -B build -S .

      - name: Build
        run: |
          ninja -C build net_diagnostic

      - name: Package APK
        run: |
          QT_ANDROID="/opt/qt-android-arm64/$QT_VERSION/android_arm64_v8a"
          DEPLOY_JSON=$(find build -name "*deployment*.json" 2>/dev/null | head -1)
          if [ -f "$DEPLOY_JSON" ]; then
            "$QT_ANDROID/bin/androiddeployqt" --input "$DEPLOY_JSON" --output build/android-build --android-platform android-34 --jdk "$JAVA_HOME" --verbose
          else
            mkdir -p build/android-build/libs/arm64-v8a
            cp build/libnet_diagnostic_arm64-v8a.so build/android-build/libs/arm64-v8a/libnet_diagnostic.so
            cp resources/android/AndroidManifest.xml build/android-build/
            (cd build/android-build \&\& zip -r ../../NetDiagnostic-Android-arm64.apk .)
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-Android-arm64
          path: |
            build/libnet_diagnostic_arm64-v8a.so
            build/*.apk
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # iOS — native build via aqtinstall + Xcode, production only
  # ═══════════════════════════════════════════════════════════════════════════
  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select --reset
          echo "SDK path: $(xcrun --sdk iphoneos --show-sdk-path)"

      - name: Install dependencies
        run: |
          brew install ninja
          pip3 install --break-system-packages cmake==3.29.6

      - name: Cache Qt6 macOS desktop (host tools)
        id: cache-qt-desktop
        uses: actions/cache@v4
        with:
          path: ~/qt-desktop
          key: qt6-ios-desktop-${{ env.QT_VERSION }}-v1

      - name: Install Qt6 desktop via aqt
        if: steps.cache-qt-desktop.outputs.cache-hit != 'true'
        run: |
          pip3 install --break-system-packages aqtinstall
          aqt install-qt mac desktop $QT_VERSION clang_64 -O ~/qt-desktop

      - name: Cache Qt6 iOS
        id: cache-qt-ios
        uses: actions/cache@v4
        with:
          path: ~/qt-ios
          key: qt6-ios-${{ env.QT_VERSION }}-v3

      - name: Install Qt6 for iOS via aqt
        if: steps.cache-qt-ios.outputs.cache-hit != 'true'
        run: |
          pip3 install --break-system-packages aqtinstall
          aqt install-qt mac ios $QT_VERSION ios -O ~/qt-ios

      - name: Configure
        run: |
          export QT_HOST_PATH="$HOME/qt-desktop/$QT_VERSION/macos"
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          "$HOME/qt-ios/$QT_VERSION/ios/bin/qt-cmake" \
            -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -DCURL_INCLUDE_DIR="$SDKROOT/usr/include" \
            -B build -S .

      - name: Build
        run: ninja -v -C build net_diagnostic

      - name: Verify bundle
        run: |
          if [ -d build/net_diagnostic.app ]; then
            echo "✅ .app bundle generated"
            ls -la build/net_diagnostic.app/
          else
            echo "❌ No .app bundle"
            exit 1
          fi

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/net_diagnostic.app Payload/
          zip -r NetDiagnostic-iOS.ipa Payload
          ls -lh NetDiagnostic-iOS.ipa

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetDiagnostic-iOS
          path: |
            build/net_diagnostic.app
            NetDiagnostic-iOS.ipa
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Release — create GitHub Release on tag push
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs:
      - linux-x86_64
      - linux-arm64
      - windows-x86_64
      - macos-arm64
      - android-x86_64
      - android-arm64
      - ios
    if: startsWith(github.ref, 'refs/tags/') && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect individual assets
        run: |
          cd artifacts
          # Flatten all files from subdirectories into a flat list
          find . -type f ! -name "*.tar.xz" | while read f; do
            base=$(basename "$f")
            # Rename with platform prefix for uniqueness
            dir=$(dirname "$f" | sed 's|^\./||' | sed 's|/|_|g')
            cp "$f" "${dir}_${base}"
            echo "Asset: ${dir}_${base}"
          done
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}