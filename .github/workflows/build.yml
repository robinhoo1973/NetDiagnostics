  # iOS build moved to .github/workflows/apple.yml
  # (combined macOS + iOS build with TestFlight deploy)

  # ===================================================================
  # Release — auto-bump version, create tag, and publish GitHub Release
  # ===================================================================
  release:
    name: Create Release
    needs:
      - version
      - linux-x86_64
      - linux-arm64
      - windows-x86_64-static
      - windows-x86_64-dynamic
      - macos-arm64
      - android-x86_64
      - android-arm64
    if: (!failure()) && (!cancelled())
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute release tag
        id: version
        run: |
          TAG="v${{ needs.version.outputs.pkg_version }}"
          echo "next_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect individual assets
        run: |
          cd artifacts
          mkdir -p release-assets

          # Debug: show all downloaded artifact files
          echo "=== All downloaded files ==="
          find . -type f | sort
          echo "============================"

          # Copy assets with consistent naming: netdiagnostics-{os}-{arch}.{ext}
          for dir in */; do
            dir_lower=$(echo "$dir" | tr '[:upper:]' '[:lower:]')
            suffix=""
            case "$dir_lower" in
              *windows*static*)
                os="windows"; arch="x86_64"; suffix="-static" ;;
              *windows*dynamic*)
                os="windows"; arch="x86_64"; suffix="-dynamic" ;;
              *windows*)
                os="windows"; arch="x86_64" ;;
              *linux-x86_64*|*linux*86*)
                os="linux"; arch="x86_64" ;;
              *linux-arm64*|*linux*arm*)
                os="linux"; arch="arm64" ;;
              *macos*)
                os="macos"; arch="arm64" ;;
              *android-x86_64*|*android*x86*)
                os="android"; arch="x86_64" ;;
              *android-arm64*|*android*arm*)
                os="android"; arch="arm64" ;;
              *ios*)
                os="ios"; arch="arm64" ;;
              *)
                echo "Skipping unknown: $dir"; continue ;;
            esac
            echo "Processing: $dir → $os/$arch"
            while IFS= read -r f; do
              base=$(basename "$f" | tr '[:upper:]' '[:lower:]')
              ext="${base##*.}"
              normalized_ext="$ext"
              [ "$normalized_ext" = "appimage" ] && normalized_ext="AppImage"
              case "$base" in
                *-sim.*|*-sim-*)
                  name="netdiagnostics-${os}-${arch}-sim.${normalized_ext}" ;;
                *.appimage) name="netdiagnostics-${os}-${arch}.${normalized_ext}" ;;
                *.deb)      name="netdiagnostics-${os}-${arch}.deb" ;;
                *.rpm)      name="netdiagnostics-${os}-${arch}.rpm" ;;
                *.dmg)      name="netdiagnostics-${os}-${arch}.dmg" ;;
                *.ipa)      name="netdiagnostics-${os}-${arch}.ipa" ;;
                *.apk)      name="netdiagnostics-${os}-${arch}.apk" ;;

                *netdiagnostics-*.exe)
                  name="netdiagnostics-${os}-${arch}${suffix}-setup.exe" ;;
                *.exe)
                  name="netdiagnostics-${os}-${arch}${suffix}.exe" ;;
                *)          name="$base" ;;
              esac
              cp "$f" "release-assets/$name"
              echo "  → $name"
            done < <(find "$dir" -type f ! -name "*.o" ! -name "*.obj")
          done

          echo ""
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          files: |
            artifacts/release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}