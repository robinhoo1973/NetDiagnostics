name: Select Xcode 16+
description: Selects an available Xcode installation (16+ preferred)
runs:
  using: composite
  steps:
    - name: Select Xcode
      shell: bash
      run: |
        set -euo pipefail
        XCODE=""
        # 1. Try the default Xcode.app symlink first
        if [ -d /Applications/Xcode.app ]; then
          XCODE=/Applications/Xcode.app
        fi
        # 2. Try versioned installations
        if [ -z "$XCODE" ]; then
          CANDIDATES=()
          for app in /Applications/Xcode_*.app; do
            [ -d "$app" ] || continue
            ver="${app##*/Xcode_}"; ver="${ver%.app}"
            CANDIDATES+=("$app")
          done
          if [ ${#CANDIDATES[@]} -gt 0 ]; then
            XCODE=$(printf '%s\n' "${CANDIDATES[@]}" | sort -V | tail -1)
          fi
        fi
        # 3. Fall back to xcode-select discovery
        if [ -z "$XCODE" ]; then
          XCODE=$(xcode-select -p 2>/dev/null || echo "")
          if [ -d "$XCODE" ]; then
            XCODE=$(dirname "$(dirname "$XCODE")")
          else
            echo "ERROR: No Xcode installation found."; exit 1
          fi
        fi
        sudo xcode-select -s "$XCODE/Contents/Developer"
        xcodebuild -version
        echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"
