name: Select Xcode
description: Finds and selects an available Xcode installation
runs:
  using: composite
  steps:
    - name: Select Xcode
      shell: bash
      run: |
        set -euo pipefail
        # Try xcode-select discovery first (most reliable across runner images)
        XCDEV=$(xcode-select -p 2>/dev/null || echo "")
        if [ -n "$XCDEV" ] && [ -d "$XCDEV" ]; then
          echo "Found Xcode at: $XCDEV"
        else
          # Fallback: search default paths
          for path in /Applications/Xcode.app /Applications/Xcode_*.app; do
            if [ -d "$path" ]; then
              sudo xcode-select -s "$path/Contents/Developer" 2>/dev/null || true
              XCDEV=$(xcode-select -p 2>/dev/null || echo "")
              [ -n "$XCDEV" ] && break
            fi
          done
        fi
        if [ -z "$XCDEV" ] || [ ! -d "$XCDEV" ]; then
          echo "ERROR: No Xcode installation found."; exit 1
        fi
        xcodebuild -version
        echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo 'N/A')"
