name: Select Xcode
description: Finds and selects an available Xcode installation
runs:
  using: composite
  steps:
    - name: Select Xcode
      shell: bash
      run: |
        set -euo pipefail
        XCDEV=$(xcode-select -p 2>/dev/null || echo "")
        if [ -z "$XCDEV" ] || [ ! -d "$XCDEV" ]; then
          for d in /Applications/Xcode.app /Applications/Xcode_*.app; do
            if [ -d "$d/Contents/Developer" ]; then
              sudo xcode-select -s "$d/Contents/Developer" 2>/dev/null || true
              XCDEV="$d/Contents/Developer"
              break
            fi
          done
        fi
        if [ -z "$XCDEV" ] || [ ! -d "$XCDEV" ]; then
          echo "ERROR: No Xcode installation found."
          echo "Checked: xcode-select -p, /Applications/Xcode*.app"
          exit 1
        fi
        sudo xcode-select -s "$XCDEV" 2>/dev/null || true
        xcodebuild -version
        echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo 'N/A')"
