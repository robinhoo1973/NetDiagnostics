name: Install Qt via aqtinstall
description: Installs a Qt target via aqtinstall with caching
inputs:
  qt_version:
    description: Qt version (e.g. 6.8.3)
    required: true
  target:
    description: aqt target (desktop, ios, android)
    required: true
  arch:
    description: aqt architecture (clang_64, ios, android_x86_64, etc.)
    required: true
  install_dir:
    description: Installation directory
    required: true
  cache_key_prefix:
    description: Prefix for the cache key
    required: false
    default: qt6-aqt
  host:
    description: Host OS for aqt (linux, mac, windows)
    required: false
    default: mac
    # 5WHY: was hardcoded to 'mac', breaking reuse on Linux/Windows runners.
    # Fix: parameterized so callers specify the correct host OS.
runs:
  using: composite
  steps:
    - name: Cache Qt6 ${{ inputs.target }} ${{ inputs.arch }}
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ inputs.install_dir }}
        key: ${{ inputs.cache_key_prefix }}-${{ inputs.target }}-${{ inputs.arch }}-${{ inputs.qt_version }}-v1

    - name: Install Qt6 ${{ inputs.target }} ${{ inputs.arch }}
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: aqt install-qt ${{ inputs.host }} ${{ inputs.target }} ${{ inputs.qt_version }} ${{ inputs.arch }} -O ${{ inputs.install_dir }}
