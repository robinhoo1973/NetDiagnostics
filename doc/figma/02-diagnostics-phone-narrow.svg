<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'DejaVu Sans Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; }
      .tb { fill: #0078D4; } .tg { fill: #4ADE80; } .ty { fill: #FACC15; }
      .tr { fill: #EF4444; } .tsk { fill: #888888; }
    </style>
  </defs>

  <!-- Scaffold #1E1E2E -->
  <rect width="375" height="812" fill="#1E1E2E"/>

  <!-- ═══ Navigation Bar (AppContent.qml compact mode) ═══ -->
  <rect x="0" y="0" width="375" height="32" fill="#1A1A2E"/>
  <rect x="0" y="31" width="375" height="1" fill="#3A3A5A"/>
  <!-- Tabs: icons only, right-aligned side by side -->
  <text x="195" y="22" font-size="13" fill="#A0A0B8">⊞ ⚡ ⚙ 📄 ⚙</text>
  <!-- Active indicator under Diagnostics -->
  <rect x="225" y="29" width="24" height="2" fill="#00BCD4"/>

  <!-- Content header -->
  <rect x="0" y="32" width="375" height="36" fill="#1A1A2E"/>
  <rect x="0" y="67" width="375" height="1" fill="#3A3A5A"/>
  <text x="12" y="55" font-size="14" font-weight="600" fill="#E0E0E0">Results</text>

  <!-- Results area (empty state) -->
  <rect x="0" y="68" width="375" height="240" fill="#1E1E2E"/>
  <text x="187" y="180" font-size="13" fill="rgba(160,160,184,0.6)" text-anchor="middle">Enter a target and press Run</text>
  <text x="187" y="200" font-size="11" fill="rgba(160,160,184,0.4)" text-anchor="middle">Analyze your network</text>

  <!-- Divider -->
  <rect x="0" y="308" width="375" height="1" fill="#3A3A5A"/>

  <!-- Controls area bg #252538 -->
  <rect x="0" y="309" width="375" height="444" fill="#252538"/>

  <!-- Target input -->
  <text x="12" y="334" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.6">Target</text>
  <rect x="12" y="342" width="351" height="38" rx="8" fill="#2A2A4A" stroke="#3A3A5A" stroke-width="1"/>
  <text x="22" y="366" font-size="12" fill="rgba(160,160,184,0.4)">Enter URL, IP address, or hostname...</text>

  <!-- Run button -->
  <rect x="12" y="388" width="351" height="38" rx="8" fill="#0078D4"/>
  <text x="140" y="411" font-size="12" font-weight="600" fill="#FFFFFF">▶ Run Diagnostics</text>

  <!-- Diagnosis Group -->
  <text x="12" y="454" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.8">Diagnosis Group</text>
  <rect x="12" y="462" width="351" height="26" rx="6" fill="rgba(0,120,212,0.12)"/>
  <rect x="20" y="468" width="14" height="14" rx="3" fill="#0078D4"/>
  <text x="40" y="480" font-size="11" font-weight="600" fill="#E0E0E0">G1-G5 All Groups</text>

  <!-- Port scan -->
  <rect x="12" y="498" width="351" height="54" rx="8" fill="rgba(22,33,62,0.5)" stroke="rgba(0,120,212,0.3)" stroke-width="1"/>
  <text x="22" y="516" font-size="11" font-weight="600" fill="#0078D4">Port Scan</text>
  <rect x="22" y="524" width="14" height="14" rx="3" fill="#00BCD4"/>
  <text x="42" y="536" font-size="11" fill="#E0E0E0">Scan Common Ports</text>

  <!-- Summary cards -->
  <line x1="12" y1="568" x2="363" y2="568" stroke="#3A3A5A" stroke-width="1"/>
  <text x="16" y="588" font-size="11" font-weight="600" fill="#A0A0B8">Summary</text>
  <text x="320" y="588" font-size="10" fill="#A0A0B8">Total: 38</text>

  <rect x="12" y="598" width="170" height="42" rx="8" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.25)"/>
  <text x="22" y="626" font-size="18" font-weight="700" fill="#4ADE80">30</text>
  <text x="22" y="637" font-size="8" fill="rgba(160,160,184,0.8)">Pass</text>

  <rect x="190" y="598" width="170" height="42" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)"/>
  <text x="200" y="626" font-size="18" font-weight="700" fill="#EF4444">2</text>
  <text x="200" y="637" font-size="8" fill="rgba(160,160,184,0.8)">Fail</text>

  <rect x="12" y="646" width="170" height="42" rx="8" fill="rgba(250,204,21,0.08)" stroke="rgba(250,204,21,0.25)"/>
  <text x="22" y="674" font-size="18" font-weight="700" fill="#FACC15">3</text>
  <text x="22" y="685" font-size="8" fill="rgba(160,160,184,0.8)">Warning</text>

  <rect x="190" y="646" width="170" height="42" rx="8" fill="rgba(136,136,136,0.08)" stroke="rgba(136,136,136,0.25)"/>
  <text x="200" y="674" font-size="18" font-weight="700" fill="#888888">3</text>
  <text x="200" y="685" font-size="8" fill="rgba(160,160,184,0.8)">Skipped</text>

  <!-- Bottom status -->
  <rect x="0" y="772" width="375" height="40" fill="#1A1A2E"/>
  <rect x="0" y="772" width="375" height="1" fill="#3A3A5A"/>
  <text x="16" y="796" font-size="12" fill="#A0A0B8">○ Ready</text>

  <text x="187" y="809" font-size="8" fill="#00BCD4" text-anchor="middle">
    Diagnostics — Phone Narrow (&lt;600px) — compact nav — controls below content
  </text>
</svg>
