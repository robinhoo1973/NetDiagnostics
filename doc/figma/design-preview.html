<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NetDiagnostics — Design Preview</title>
<style>
:root {
  --bg:#1E1E2E; --card:#16213E; --bar:#1A1A2E; --input:#2A2A4A;
  --t1:#E0E0E0; --t2:#A0A0B8; --t3:#606080;
  --cyan:#00BCD4; --green:#4ADE80; --yellow:#FACC15; --red:#EF4444;
  --blue:#0078D4; --border:#3A3A5A; --hover:#252538;
  --mono:'JetBrains Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0D1A;font-family:var(--mono);color:var(--t1);padding:20px}
h1{font-size:22px;margin-bottom:8px}
h2{font-size:14px;color:var(--t2);margin-bottom:20px;font-weight:400}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.toolbar select,.toolbar button{background:var(--card);color:var(--t1);border:1px solid var(--border);
  padding:8px 14px;border-radius:6px;font-family:var(--mono);font-size:12px;cursor:pointer}
.toolbar button.active{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.device{border:2px solid var(--border);border-radius:16px;overflow:hidden;background:var(--bg)}
.device-header{background:var(--bar);padding:8px 14px;font-size:11px;color:var(--t3);
  display:flex;justify-content:space-between;align-items:center}
.device-body{background:var(--bg);overflow:hidden;position:relative}
.device-body iframe{border:none}

/* ── Inline mockup (no iframe) ── */
.mock{background:var(--bg);min-height:500px;font-size:11px}
.appbar{background:var(--bar);height:36px;display:flex;align-items:center;padding:0 12px;
  font-size:12px;font-weight:700;color:var(--cyan);border-bottom:1px solid var(--border)}
.appbar .title{flex:1}
.sidebar{width:200px;background:var(--hover);border-right:1px solid var(--border);
  float:left;min-height:500px;padding:12px}
.sidebar .nav-item{padding:8px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;
  display:flex;align-items:center;gap:8px;font-size:11px}
.sidebar .nav-item.active{background:var(--cyan);color:var(--bg)}
.sidebar .nav-item .icon{width:18px;height:18px;border-radius:4px;background:var(--t3)}
.sidebar .nav-item.active .icon{background:var(--bg)}
.content{margin-left:200px;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.card h4{font-size:12px;margin-bottom:8px;color:var(--cyan)}
.card .row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.04)}
.card .row .val{color:var(--t2)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.badge-ok{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-warn{background:rgba(250,204,21,0.15);color:var(--yellow)}
.badge-fail{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-pro{background:rgba(250,204,21,0.15);color:var(--yellow)}
.btn{display:inline-block;padding:6px 16px;border-radius:6px;font-size:11px;font-family:var(--mono);
  cursor:pointer;background:var(--cyan);color:var(--bg);border:none;font-weight:700}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn-warn{background:rgba(250,204,21,0.12);border:1px solid rgba(250,204,21,0.3);color:var(--yellow)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.platform-tag{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--input)}
.platform-ios{color:var(--cyan)}
.platform-android{color:var(--green)}
.platform-desktop{color:var(--blue)}
</style></head><body>

<h1>NetDiagnostics — Design Preview</h1>
<h2>Interactive reference for all screens, platforms &amp; screen sizes</h2>

<div class="toolbar">
  <select id="screen" onchange="render()">
    <option value="dashboard">Dashboard</option>
    <option value="diagnostics">Diagnostics</option>
    <option value="config">Config</option>
    <option value="report" selected>Report</option>
    <option value="settings">Settings</option>
  </select>
  <select id="platform" onchange="render()">
    <option value="ios">iOS</option>
    <option value="android">Android</option>
    <option value="desktop">Desktop</option>
    <option value="all">All Platforms</option>
  </select>
  <select id="size" onchange="render()">
    <option value="narrow">Phone (<600px)</option>
    <option value="wide">Tablet/Desktop (>=600px)</option>
    <option value="all">All Sizes</option>
  </select>
  <button onclick="resetFilters()">Show All</button>
</div>

<div class="preview-grid" id="grid"></div>

<script>
const MOCKS = {
  dashboard: function(w,h,plat) { return `
<div class="mock" style="width:${w}px;min-height:${h}px">
<div class="appbar"><span class="title">&#x25A0; Dashboard</span><span class="platform-tag platform-${plat==='ios'?'ios':plat==='android'?'android':'desktop'}">${plat}</span></div>
<div class="content" style="margin-left:${w>=600?200:0}px">
<div class="card"><h4>Diagnostic Run Complete</h4>
<div class="row"><span>Target</span><span class="val">192.168.1.1</span></div>
<div class="row"><span>Total Tests</span><span class="val">38</span></div>
<div class="row"><span>Total Time</span><span class="val">12.4s</span></div>
<div class="row"><span>Completed</span><span class="val">38</span></div>
</div>
<div class="card"><h4>Summary</h4>
<div class="row"><span>&#x2714; Pass</span><span class="val">32</span></div>
<div class="row"><span>&#x26A0; Warning</span><span class="val">4</span></div>
<div class="row"><span>&#x2718; Fail</span><span class="val">1</span></div>
<div class="row"><span>&#x29B8; Skipped</span><span class="val">1</span></div>
</div>
<div class="card"><h4>Per-Group Results</h4>
<div class="row"><span>System & Adapters</span><span class="val"><span class="badge badge-ok">8/8</span></span></div>
<div class="row"><span>Connectivity & Security</span><span class="val"><span class="badge badge-ok">6/6</span></span></div>
<div class="row"><span>Internet & DNS</span><span class="val"><span class="badge badge-warn">4/5</span></span></div>
<div class="row"><span>Remote Host</span><span class="val"><span class="badge badge-ok">6/6</span></span></div>
<div class="row"><span>Website / URL</span><span class="val"><span class="badge badge-fail">12/13</span></span></div>
</div>
</div>
</div>`; },

  diagnostics: function(w,h,plat) { const groups = ['System & Adapters','Connectivity & Security','Internet & DNS','Remote Host','Website / URL'];
    let ghtml = groups.map((g,i)=>`<div class="card"><h4>G${i+1}: ${g}</h4>
    <div class="row"><span>Network Adapters</span><span class="val"><span class="badge badge-ok">Pass</span></span></div>
    <div class="row"><span>DHCP Status</span><span class="val"><span class="badge badge-ok">Pass</span></span></div>
    <div class="row"><span>IP Configuration</span><span class="val"><span class="badge badge-warn">Warn</span></span></div>
    </div>`).join('');
    return `<div class="mock" style="width:${w}px;min-height:${h}px">
<div class="appbar"><span class="title">&#x25A0; Diagnostics</span><span class="platform-tag platform-${plat==='ios'?'ios':plat==='android'?'android':'desktop'}">${plat}</span></div>
${w>=600?`<div class="sidebar"><div class="nav-item active"><div class="icon"></div>Running...</div><div class="nav-item"><div class="icon"></div>G1: System</div><div class="nav-item"><div class="icon"></div>G2: Connect</div><div class="nav-item"><div class="icon"></div>G3: Internet</div><div class="nav-item"><div class="icon"></div>G4: Remote</div><div class="nav-item"><div class="icon"></div>G5: Website</div></div>`:''}
<div class="content" style="margin-left:${w>=600?200:0}px">${ghtml}</div></div>`; },

  config: function(w,h,plat) { return `
<div class="mock" style="width:${w}px;min-height:${h}px">
<div class="appbar"><span class="title">&#x25A0; Config</span><span class="platform-tag platform-${plat==='ios'?'ios':plat==='android'?'android':'desktop'}">${plat}</span></div>
<div class="content" style="margin-left:${w>=600?200:0}px">
<div class="card"><h4>Port Scan</h4>
<div class="row"><span>Scan Common Ports</span><span class="val">&#x2714; On</span></div>
<div class="row"><span>Range</span><span class="val">1 - 65535</span></div>
</div>
<div class="card"><h4>Diagnostic Configuration</h4>
<div class="row"><span>&#x2714; G1: System & Adapters</span><span class="val"><button class="btn btn-outline" style="font-size:10px;padding:2px 8px">Select All</button></span></div>
<div class="row"><span>&#x2714; G2: Connectivity</span><span class="val"><button class="btn btn-outline" style="font-size:10px;padding:2px 8px">Select All</button></span></div>
<div class="row"><span>&#x2714; G3: Internet & DNS</span><span class="val"><button class="btn btn-outline" style="font-size:10px;padding:2px 8px">Deselect All</button></span></div>
<div class="row"><span>&#x2714; G4: Remote Host</span><span class="val"><button class="btn btn-outline" style="font-size:10px;padding:2px 8px">Select All</button></span></div>
<div class="row"><span>&#x2714; G5: Website / URL</span><span class="val"><button class="btn btn-outline" style="font-size:10px;padding:2px 8px">Select All</button></span></div>
</div>
</div></div>`; },

  report: function(w,h,plat) { return `
<div class="mock" style="width:${w}px;min-height:${h}px">
<div class="appbar"><span class="title">&#x25A0; Report Preview</span><span class="platform-tag platform-${plat==='ios'?'ios':plat==='android'?'android':'desktop'}">${plat}</span></div>
<div class="content" style="margin-left:${w>=600?200:0}px;text-align:center">
<div style="padding:20px">
<div style="width:${w>=600?100:72}px;height:${w>=600?100:72}px;border-radius:24px;background:rgba(0,188,212,0.08);margin:0 auto;border:1px solid rgba(0,188,212,0.2)"></div>
<div style="font-size:${w>=600?22:19}px;font-weight:700;margin:12px 0">Report Preview</div>
<div style="font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.5">Export your diagnostic results as a one-page PDF summary or a full HTML report.</div>
<button class="btn" style="margin:4px">Preview PDF (summary)</button>
<button class="btn" style="margin:4px;background:var(--blue)">Preview HTML (full)</button>
<div style="margin-top:16px;display:inline-block;padding:8px 20px;border-radius:8px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);font-size:12px">
<span style="color:var(--green)">&#x2714;</span> 38 results available</div>
${plat==='ios'||plat==='android'?`<div style="margin-top:12px;padding:12px;background:var(--card);border-radius:8px;border:1px solid var(--border);max-width:300px;margin-left:auto;margin-right:auto">
<div style="font-size:11px;color:var(--t2);margin-bottom:8px">${w>=600?'':'<span class="badge badge-pro">PRO</span> '}Premium Feature</div>
<div style="font-size:10px;color:var(--t3);margin-bottom:10px;line-height:1.4">Sharing is a Premium feature. Unlock with a one-time purchase.</div>
<button class="btn btn-warn" style="width:100%;margin-bottom:4px">Unlock Premium</button>
<button class="btn btn-outline" style="width:100%">Not now</button>
</div>`:''}
</div>
</div></div>`; },

  settings: function(w,h,plat) { return `
<div class="mock" style="width:${w}px;min-height:${h}px">
<div class="appbar"><span class="title">&#x25A0; Settings</span><span class="platform-tag platform-${plat==='ios'?'ios':plat==='android'?'android':'desktop'}">${plat}</span></div>
<div class="content" style="margin-left:${w>=600?200:0}px">
<div class="card"><h4>Language</h4>
<div class="row"><span>Interface Language</span><span class="val">
<select style="background:var(--input);color:var(--t1);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-family:var(--mono);font-size:11px">
<option>English</option><option>Francais</option><option>Deutsch</option><option>Русский</option>
<option>Italiano</option><option>简体中文</option><option>繁體中文</option><option>Espanol</option><option>Portugues</option>
</select></span></div></div>
${plat==='ios'||plat==='android'?`<div class="card"><h4>Premium Feature</h4>
<div style="font-size:10px;color:var(--t2);margin-bottom:8px;line-height:1.4">Sharing is a premium feature — unlock to share reports.</div>
<button class="btn btn-warn" style="width:100%;margin-bottom:6px">Restore Purchases</button>
</div>`:''}
<div class="card"><h4>About</h4>
<div class="row"><span>&#x25A0; NetDiagnostics <span class="badge badge-pro">PRO</span></span><span class="val">v0.0.1</span></div>
<div class="row" style="font-size:10px;color:var(--t3)">A comprehensive cross-platform network diagnostic tool supporting Windows, macOS, Linux, iOS, and Android.</div>
</div>
</div></div>`; }
};

function render() {
  const screen = document.getElementById('screen').value;
  const platform = document.getElementById('platform').value;
  const size = document.getElementById('size').value;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const platforms = platform==='all' ? ['ios','android','desktop'] : [platform];
  const widths = size==='all'
    ? [{l:'Phone',w:375,h:700},{l:'Tablet/Desktop',w:800,h:600}]
    : (size==='wide'
      ? [{l:'Wide',w:800,h:600}]
      : [{l:'Narrow',w:375,h:700}]);
  const screenNames = {dashboard:'Dashboard',diagnostics:'Diagnostics',config:'Config',report:'Report',settings:'Settings'};

  platforms.forEach(p => {
    widths.forEach(sz => {
      const mock = MOCKS[screen](sz.w, sz.h, p);
      grid.innerHTML += `<div class="device">
        <div class="device-header"><span>${screenNames[screen]} &mdash; ${sz.l} &mdash; ${p.toUpperCase()}</span><span class="platform-tag platform-${p==='ios'?'ios':p==='android'?'android':'desktop'}">${p}</span></div>
        <div class="device-body">${mock}</div>
      </div>`;
    });
  });
}

function resetFilters() {
  document.getElementById('screen').value='dashboard';
  document.getElementById('platform').value='all';
  document.getElementById('size').value='all';
  render();
}

render();
</script>
</body></html>
