<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'DejaVu Sans Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; } .tb { fill: #0078D4; } .tr { fill: #EF4444; }
    </style>
  </defs>

  <!-- Scaffold #2D2D2D -->
  <rect width="1100" height="700" fill="#2D2D2D"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="48" fill="#1A1A2E"/>
  <text x="20" y="31" font-size="16" font-weight="600" fill="#E0E0E0">NetDiagnostic Simulator</text>

  <!-- Device selector dropdown -->
  <rect x="880" y="10" width="160" height="28" rx="8" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.15)"/>
  <text x="894" y="29" font-size="12" fill="#FFFFFF">iPhone 15 Pro ▼</text>

  <!-- Rotate btn -->
  <rect x="1048" y="12" width="24" height="24" rx="4" fill="none" stroke="rgba(255,255,255,0.3)"/>
  <text x="1054" y="29" font-size="14" fill="rgba(255,255,255,0.7)">↻</text>

  <!-- Scale info -->
  <text x="385" y="88" font-size="10" fill="#A0A0B8">Scale: 1.0x (range 0.3x – 2.5x) — StackView-based page switching</text>

  <!-- Centered device frame (iPhone 15 Pro) -->
  <rect x="350" y="100" width="400" height="540" rx="55" fill="#000000" stroke="#333" stroke-width="2"/>
  <!-- Screen area -->
  <rect x="366" y="124" width="368" height="492" rx="40" fill="#1E1E2E"/>
  <!-- Dynamic Island -->
  <rect x="465" y="124" width="170" height="26" rx="13" fill="#000000"/>

  <!-- Content inside device screen -->
  <!-- Nav bar (compact mode) -->
  <rect x="366" y="156" width="368" height="28" fill="#1A1A2E"/>
  <rect x="366" y="183" width="368" height="1" fill="#3A3A5A"/>
  <!-- 5 tabs compact -->
  <text x="400" y="176" font-size="9" fill="#00BCD4" text-anchor="middle">⊞ Dash</text>
  <text x="462" y="176" font-size="9" fill="#A0A0B8" text-anchor="middle">⚡ Diag</text>
  <text x="524" y="176" font-size="9" fill="#A0A0B8" text-anchor="middle">⚙ Conf</text>
  <text x="586" y="176" font-size="9" fill="#A0A0B8" text-anchor="middle">📄 Rpt</text>
  <text x="648" y="176" font-size="9" fill="#A0A0B8" text-anchor="middle">⚙ Sett</text>
  <!-- Active indicator under Dashboard -->
  <rect x="385" y="181" width="30" height="2" fill="#00BCD4"/>

  <!-- Content header -->
  <rect x="366" y="184" width="368" height="30" fill="#1A1A2E"/>
  <rect x="366" y="213" width="368" height="1" fill="#3A3A5A"/>
  <text x="380" y="204" font-size="11" font-weight="600" fill="#E0E0E0">Results</text>

  <!-- Empty state in screen -->
  <text x="550" y="380" font-size="12" fill="rgba(160,160,184,0.6)" text-anchor="middle">Enter a target</text>
  <text x="550" y="398" font-size="10" fill="rgba(160,160,184,0.4)" text-anchor="middle">and press Run</text>

  <!-- Bottom status bar inside device -->
  <rect x="366" y="584" width="368" height="28" fill="#1A1A2E"/>
  <rect x="366" y="584" width="368" height="1" fill="#3A3A5A"/>
  <text x="380" y="602" font-size="9" fill="#A0A0B8">○ Ready</text>

  <!-- Platform indicator -->
  <rect x="350" y="648" width="400" height="24" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="550" y="664" font-size="9" fill="#A0A0B8" text-anchor="middle">iOS Simulator — iPhone 15 Pro — 393×852 @ 3×</text>

  <text x="550" y="696" font-size="9" fill="#00BCD4" text-anchor="middle">
    Simulator Screen — bg #2D2D2D — device frame — StackView tabs — minScale 0.3, maxScale 2.5
  </text>
</svg>
