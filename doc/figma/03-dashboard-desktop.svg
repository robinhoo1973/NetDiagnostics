<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'DejaVu Sans Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; }
      .tb { fill: #0078D4; } .tg { fill: #4ADE80; } .ty { fill: #FACC15; }
      .tr { fill: #EF4444; } .tsk { fill: #888888; }
    </style>
  </defs>

  <!-- Scaffold -->
  <rect width="1100" height="700" fill="#1E1E2E"/>

  <!-- ═══ Navigation Bar (AppContent.qml) ═══ -->
  <rect x="0" y="0" width="1100" height="36" fill="#1A1A2E"/>
  <rect x="0" y="35" width="1100" height="1" fill="#3A3A5A"/>
  <!-- Dashboard tab (active) -->
  <rect x="308" y="2" width="100" height="32" rx="6" fill="rgba(0,188,212,0.10)"/>
  <rect x="308" y="32" width="100" height="2" fill="#00BCD4"/>
  <text x="330" y="22" font-size="10" fill="#00BCD4">⊞ Dashboard</text>
  <!-- Diagnostics tab -->
  <rect x="410" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="430" y="22" font-size="10" fill="#A0A0B8">⚡ Diagnostics</text>
  <!-- Config tab -->
  <rect x="512" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="538" y="22" font-size="10" fill="#A0A0B8">⚙ Config</text>
  <!-- Report tab -->
  <rect x="614" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="638" y="22" font-size="10" fill="#A0A0B8">📄 Report</text>
  <!-- Settings tab -->
  <rect x="716" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="735" y="22" font-size="10" fill="#A0A0B8">⚙ Settings</text>
  <!-- Close btn -->
  <rect x="1060" y="6" width="24" height="24" rx="4" fill="transparent"/>
  <text x="1068" y="23" font-size="14" fill="#A0A0B8" text-anchor="middle">✕</text>

  <!-- AppBar -->
  <rect x="0" y="36" width="1100" height="52" fill="#1A1A2E"/>
  <rect x="0" y="87" width="1100" height="1" fill="#3A3A5A"/>
  <text x="20" y="68" font-size="15" font-weight="600" fill="#E0E0E0">⊞ Dashboard</text>
  <!-- Reset btn -->
  <rect x="1020" y="46" width="60" height="32" rx="6" fill="none" stroke="#5A5A7A" stroke-width="1"/>
  <text x="1032" y="67" font-size="12" fill="#A0A0B8">↻ Reset</text>

  <!-- Body (padding 24px) -->
  <!-- Run Info Header Card -->
  <rect x="24" y="104" width="1052" height="64" rx="12" fill="#16213E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="40" y="132" font-size="28" fill="#4ADE80">✓</text>
  <text x="82" y="128" font-size="16" font-weight="600" fill="#E0E0E0">Diagnostic Run Complete</text>
  <text x="82" y="152" font-size="12" fill="#A0A0B8">⊕ Target: example.com       ⏱ 2026-06-24 14:30 UTC</text>

  <!-- Per-Group Results header -->
  <text x="24" y="204" font-size="15" font-weight="600" fill="#E0E0E0">Per-Group Results</text>

  <!-- G1 Row -->
  <rect x="24" y="220" width="1052" height="64" rx="10" fill="#16213E" stroke="#2A2A4A" stroke-width="1"/>
  <rect x="36" y="228" width="3" height="20" rx="2" fill="#0078D4"/>
  <text x="49" y="244" font-size="13" font-weight="600" fill="#E0E0E0">G1 System &amp; Adapters</text>
  <rect x="900" y="232" width="22" height="16" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="905" y="244" font-size="10" font-weight="700" fill="#4ADE80">7</text>
  <text x="1030" y="244" font-size="11" fill="#A0A0B8">2.45s</text>
  <rect x="36" y="260" width="1028" height="4" rx="2" fill="#2A2A4A"/>
  <rect x="36" y="260" width="1028" height="4" rx="2" fill="#4ADE80"/>
  <text x="36" y="278" font-size="11" fill="#A0A0B8">✓ Network Adapters</text>

  <!-- G3 Row (warning) -->
  <rect x="24" y="290" width="1052" height="64" rx="10" fill="#16213E" stroke="#2A2A4A" stroke-width="1"/>
  <rect x="36" y="298" width="3" height="20" rx="2" fill="#0078D4"/>
  <text x="49" y="314" font-size="13" font-weight="600" fill="#E0E0E0">G3 Internet &amp; DNS</text>
  <rect x="905" y="302" width="22" height="16" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="910" y="314" font-size="10" font-weight="700" fill="#4ADE80">5</text>
  <rect x="930" y="302" width="22" height="16" rx="4" fill="rgba(239,68,68,0.15)"/>
  <text x="936" y="314" font-size="10" font-weight="700" fill="#EF4444">1</text>
  <text x="1030" y="314" font-size="11" fill="#A0A0B8">3.10s</text>
  <rect x="36" y="330" width="1028" height="4" rx="2" fill="#2A2A4A"/>
  <rect x="36" y="330" width="857" height="4" rx="2" fill="#FACC15"/>

  <!-- G5 Row -->
  <rect x="24" y="360" width="1052" height="64" rx="10" fill="#16213E" stroke="#2A2A4A" stroke-width="1"/>
  <rect x="36" y="368" width="3" height="20" rx="2" fill="#0078D4"/>
  <text x="49" y="384" font-size="13" font-weight="600" fill="#E0E0E0">G5 Website / URL</text>
  <rect x="890" y="372" width="22" height="16" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="895" y="384" font-size="10" font-weight="700" fill="#4ADE80">11</text>
  <rect x="915" y="372" width="22" height="16" rx="4" fill="rgba(250,204,21,0.15)"/>
  <text x="922" y="384" font-size="10" font-weight="700" fill="#FACC15">1</text>
  <text x="1030" y="384" font-size="11" fill="#A0A0B8">12.40s</text>
  <rect x="36" y="400" width="1028" height="4" rx="2" fill="#2A2A4A"/>
  <rect x="36" y="400" width="900" height="4" rx="2" fill="#4ADE80"/>

  <!-- Overall Summary Card -->
  <rect x="24" y="452" width="1052" height="190" rx="12" fill="#16213E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="40" y="482" font-size="15" font-weight="600" fill="#E0E0E0">Summary</text>

  <!-- Stats row -->
  <text x="40" y="517" font-size="22" font-weight="700" fill="#E0E0E0">38</text>
  <text x="40" y="534" font-size="10" fill="#A0A0B8">Total Tests</text>
  <text x="180" y="517" font-size="22" font-weight="700" fill="#E0E0E0">32.8s</text>
  <text x="180" y="534" font-size="10" fill="#A0A0B8">Total Time</text>
  <text x="330" y="517" font-size="22" font-weight="700" fill="#E0E0E0">36</text>
  <text x="330" y="534" font-size="10" fill="#A0A0B8">Completed</text>

  <!-- Divider + Layer Timings -->
  <line x1="40" y1="550" x2="1060" y2="550" stroke="#2A2A4A" stroke-width="1"/>
  <text x="40" y="572" font-size="12" font-weight="600" fill="#A0A0B8">Layer Timings</text>
  <rect x="40" y="584" width="8" height="8" rx="2" fill="#0078D4"/>
  <text x="58" y="593" font-size="12" fill="#E0E0E0">G1 System &amp; Adapters</text>
  <text x="380" y="593" font-size="12" fill="#A0A0B8">2.45s</text>
  <rect x="40" y="600" width="8" height="8" rx="2" fill="#0078D4"/>
  <text x="58" y="609" font-size="12" fill="#E0E0E0">G5 Website / URL</text>
  <text x="380" y="609" font-size="12" fill="#A0A0B8">12.40s</text>

  <text x="550" y="696" font-size="9" fill="#00BCD4" text-anchor="middle">
    Dashboard Screen — AppBar + Run Info Card + Per-Group Rows + Summary Card
  </text>
</svg>
