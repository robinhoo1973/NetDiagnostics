<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>
  <rect width="900" height="500" fill="#0D0D1A"/>

  <!-- Title -->
  <text x="20" y="36" font-size="20" font-weight="700" fill="#E0E0E0">NetDiagnostic Design System</text>
  <text x="20" y="56" font-size="11" fill="#A0A0B8">Generated from Qt6 QML source — AppTheme.qml / screen QML files</text>

  <!-- Color palette -->
  <text x="20" y="100" font-size="14" font-weight="600" fill="#00BCD4">Colors</text>
  <!-- Row 1 -->
  <rect x="20" y="112" width="80" height="56" rx="6" fill="#1E1E2E"/><text x="60" y="140" font-size="9" fill="#fff" text-anchor="middle">bgDark</text><text x="60" y="162" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#1E1E2E</text>
  <rect x="106" y="112" width="80" height="56" rx="6" fill="#252538"/><text x="146" y="140" font-size="9" fill="#fff" text-anchor="middle">bgSidebar</text><text x="146" y="162" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#252538</text>
  <rect x="192" y="112" width="80" height="56" rx="6" fill="#16213E"/><text x="232" y="140" font-size="9" fill="#fff" text-anchor="middle">bgCard</text><text x="232" y="162" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#16213E</text>
  <rect x="278" y="112" width="80" height="56" rx="6" fill="#1A1A2E"/><text x="318" y="140" font-size="9" fill="#fff" text-anchor="middle">AppBar</text><text x="318" y="162" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#1A1A2E</text>
  <rect x="364" y="112" width="80" height="56" rx="6" fill="#2D2D2D"/><text x="404" y="140" font-size="9" fill="#fff" text-anchor="middle">Sim bg</text><text x="404" y="162" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#2D2D2D</text>
  <rect x="450" y="112" width="80" height="56" rx="6" fill="#0078D4"/><text x="490" y="140" font-size="9" fill="#fff" text-anchor="middle">accentBlue</text><text x="490" y="162" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#0078D4</text>
  <rect x="536" y="112" width="80" height="56" rx="6" fill="#E94560"/><text x="576" y="140" font-size="9" fill="#fff" text-anchor="middle">accent</text><text x="576" y="162" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#E94560</text>
  <rect x="622" y="112" width="80" height="56" rx="6" fill="#00BCD4"/><text x="662" y="140" font-size="9" fill="#0D0D1A" text-anchor="middle">cyan</text><text x="662" y="162" font-size="8" fill="rgba(0,0,0,0.5)" text-anchor="middle">#00BCD4</text>
  <!-- Row 2 -->
  <rect x="20" y="176" width="80" height="56" rx="6" fill="#4ADE80"/><text x="60" y="204" font-size="9" fill="#0D0D1A" text-anchor="middle">passGreen</text><text x="60" y="226" font-size="8" fill="rgba(0,0,0,0.5)" text-anchor="middle">#4ADE80</text>
  <rect x="106" y="176" width="80" height="56" rx="6" fill="#FACC15"/><text x="146" y="204" font-size="9" fill="#0D0D1A" text-anchor="middle">warnYellow</text><text x="146" y="226" font-size="8" fill="rgba(0,0,0,0.5)" text-anchor="middle">#FACC15</text>
  <rect x="192" y="176" width="80" height="56" rx="6" fill="#EF4444"/><text x="232" y="204" font-size="9" fill="#fff" text-anchor="middle">failRed</text><text x="232" y="226" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#EF4444</text>
  <rect x="278" y="176" width="80" height="56" rx="6" fill="#888888"/><text x="318" y="204" font-size="9" fill="#fff" text-anchor="middle">skipGray</text><text x="318" y="226" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#888888</text>
  <rect x="364" y="176" width="80" height="56" rx="6" fill="#E0E0E0"/><text x="404" y="204" font-size="9" fill="#0D0D1A" text-anchor="middle">textPrimary</text><text x="404" y="226" font-size="8" fill="rgba(0,0,0,0.5)" text-anchor="middle">#E0E0E0</text>
  <rect x="450" y="176" width="80" height="56" rx="6" fill="#A0A0B8"/><text x="490" y="204" font-size="9" fill="#0D0D1A" text-anchor="middle">textSecondary</text><text x="490" y="226" font-size="8" fill="rgba(0,0,0,0.5)" text-anchor="middle">#A0A0B8</text>
  <rect x="536" y="176" width="80" height="56" rx="6" fill="#3A3A5A"/><text x="576" y="204" font-size="9" fill="#fff" text-anchor="middle">borderOuter</text><text x="576" y="226" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#3A3A5A</text>
  <rect x="622" y="176" width="80" height="56" rx="6" fill="#2A2A4A"/><text x="662" y="204" font-size="9" fill="#fff" text-anchor="middle">borderInner</text><text x="662" y="226" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">#2A2A4A</text>

  <!-- Typography -->
  <text x="20" y="275" font-size="14" font-weight="600" fill="#00BCD4">Typography — JetBrains Mono</text>
  <text x="20" y="305" font-size="22" font-weight="700" fill="#E0E0E0">22px Bold — Dashboard stat values</text>
  <text x="20" y="330" font-size="20" font-weight="700" fill="#E0E0E0">20px Bold — SummaryCard count</text>
  <text x="20" y="355" font-size="16" font-weight="700" fill="#E0E0E0">16px Bold — Sidebar title "NetDiagnostic"</text>
  <text x="20" y="380" font-size="15" font-weight="600" fill="#E0E0E0">15px Semibold — Content header, Per-Group header</text>
  <text x="20" y="403" font-size="13" font-weight="600" fill="#E0E0E0">13px Semibold — Group card label</text>
  <text x="20" y="426" font-size="12" font-weight="400" fill="#E0E0E0">12px Regular — Test name, body text, TextField</text>
  <text x="20" y="449" font-size="11" font-weight="400" fill="#A0A0B8">11px Regular — Secondary labels, meta text</text>
  <text x="20" y="472" font-size="10" font-weight="400" fill="#A0A0B8">10px Regular — Badge count, summary line</text>
  <text x="20" y="493" font-size="9"  font-weight="400" fill="#A0A0B8">9px Regular — SummaryCard label, timing row</text>

  <!-- Spacing -->
  <text x="740" y="275" font-size="14" font-weight="600" fill="#00BCD4">Spacing / Radius</text>
  <text x="740" y="305" font-size="11" fill="#A0A0B8">Screen padding: 24px all</text>
  <text x="740" y="325" font-size="11" fill="#A0A0B8">Standard gap: 8px (item), 24/32px (section)</text>
  <text x="740" y="345" font-size="11" fill="#A0A0B8">Sidebar: 260px wide</text>
  <text x="740" y="365" font-size="11" fill="#A0A0B8">Breakpoint: Wide &ge;600px / Narrow &lt;600px</text>
  <text x="740" y="395" font-size="11" fill="#A0A0B8">Border radius: 2 (bars), 4 (badges)</text>
  <text x="740" y="415" font-size="11" fill="#A0A0B8">  6 (buttons), 8 (cards/inputs)</text>
  <text x="740" y="435" font-size="11" fill="#A0A0B8">  10 (group cards), 12 (theme cards)</text>
  <text x="740" y="455" font-size="11" fill="#A0A0B8">  24 (report icon container)</text>

  <!-- Platforms -->
  <text x="740" y="490" font-size="14" font-weight="600" fill="#00BCD4">Platforms</text>
  <text x="740" y="510" font-size="10" fill="#A0A0B8">Linux / Windows / macOS / Android / iOS</text>
</svg>
