<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="750" viewBox="0 0 1100 750">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'DejaVu Sans Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; }
      .tb { fill: #0078D4; } .tg { fill: #4ADE80; } .ty { fill: #FACC15; }
      .tr { fill: #EF4444; } .tsk { fill: #888888; }
      .t9 { font-size: 9px; } .t10 { font-size: 10px; } .t11 { font-size: 11px; }
      .t12 { font-size: 12px; } .t13 { font-size: 13px; } .t15 { font-size: 15px; }
    </style>
  </defs>

  <!-- Scaffold bg #1E1E2E -->
  <rect width="1100" height="750" fill="#1E1E2E"/>

  <!-- ═══ Navigation Bar (AppContent.qml) ═══ -->
  <rect x="0" y="0" width="1100" height="36" fill="#1A1A2E"/>
  <rect x="0" y="35" width="1100" height="1" fill="#3A3A5A"/>
  <!-- Tab: Dashboard -->
  <rect x="308" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="330" y="22" font-size="10" fill="#A0A0B8">⊞ Dashboard</text>
  <!-- Tab: Diagnostics (active) -->
  <rect x="410" y="2" width="100" height="32" rx="6" fill="rgba(0,188,212,0.10)"/>
  <rect x="410" y="32" width="100" height="2" fill="#00BCD4"/>
  <text x="430" y="22" font-size="10" fill="#00BCD4">⚡ Diagnostics</text>
  <!-- Tab: Config -->
  <rect x="512" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="538" y="22" font-size="10" fill="#A0A0B8">⚙ Config</text>
  <!-- Tab: Report -->
  <rect x="614" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="638" y="22" font-size="10" fill="#A0A0B8">📄 Report</text>
  <!-- Tab: Settings -->
  <rect x="716" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="735" y="22" font-size="10" fill="#A0A0B8">⚙ Settings</text>
  <!-- Close button -->
  <rect x="1060" y="6" width="24" height="24" rx="4" fill="transparent"/>
  <text x="1068" y="23" font-size="14" fill="#A0A0B8" text-anchor="middle">✕</text>

  <!-- ═══ Sidebar 260px bg #252538 ═══ -->
  <rect x="0" y="36" width="260" height="714" fill="#252538"/>

  <!-- Sidebar header -->
  <rect x="0" y="36" width="260" height="49" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="16" y="66" font-size="16" font-weight="700" fill="#E0E0E0">NetDiagnostic</text>

  <!-- Target label -->
  <text x="16" y="112" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.6">Target</text>

  <!-- Target input field -->
  <rect x="12" y="120" width="236" height="40" rx="8" fill="#2A2A4A" stroke="#3A3A5A" stroke-width="1"/>
  <text x="22" y="144" font-size="12" fill="rgba(160,160,184,0.4)">Enter URL, IP address, or hostname...</text>

  <!-- Run + Stop buttons -->
  <rect x="12" y="168" width="182" height="38" rx="8" fill="#0078D4"/>
  <text x="48" y="191" font-size="12" font-weight="600" fill="#FFFFFF">▶ Run Diagnostics</text>
  <rect x="200" y="168" width="48" height="38" rx="8" fill="none" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="210" y="191" font-size="11" fill="#EF4444">■</text>

  <!-- Diagnosis Group label -->
  <text x="16" y="238" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.8">Diagnosis Group</text>

  <!-- G1-G5 checkboxes -->
  <rect x="12" y="246" width="236" height="28" rx="6" fill="rgba(0,120,212,0.12)"/>
  <rect x="20" y="253" width="16" height="16" rx="3" fill="#0078D4"/>
  <text x="42" y="266" font-size="12" font-weight="600" fill="#E0E0E0">G1 System &amp; Adapters</text>

  <rect x="12" y="276" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="283" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="296" font-size="12" fill="#A0A0B8">G2 Connectivity &amp; Security</text>

  <rect x="12" y="306" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="313" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="326" font-size="12" fill="#A0A0B8">G3 Internet &amp; DNS</text>

  <rect x="12" y="336" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="343" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="356" font-size="12" fill="#A0A0B8">G4 Remote Host</text>

  <rect x="12" y="366" width="236" height="28" rx="6" fill="transparent"/>
  <rect x="20" y="373" width="16" height="16" rx="3" fill="none" stroke="#5A5A7A" stroke-width="1.5"/>
  <text x="42" y="386" font-size="12" fill="#A0A0B8">G5 Website / URL</text>

  <!-- Port Scan card -->
  <rect x="12" y="406" width="236" height="108" rx="8" fill="rgba(22,33,62,0.5)" stroke="rgba(0,120,212,0.3)" stroke-width="1"/>
  <text x="22" y="426" font-size="11" font-weight="600" fill="#0078D4">Port Scan</text>
  <rect x="22" y="435" width="16" height="16" rx="3" fill="#00BCD4"/>
  <text x="44" y="448" font-size="11" fill="#E0E0E0">Scan Common Ports</text>
  <text x="22" y="470" font-size="11" fill="#A0A0B8">Range:</text>
  <rect x="22" y="477" width="104" height="28" rx="4" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="30" y="495" font-size="11" fill="#A0A0B8">From</text>
  <text x="132" y="495" font-size="13" fill="#A0A0B8">–</text>
  <rect x="144" y="477" width="104" height="28" rx="4" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="152" y="495" font-size="11" fill="#A0A0B8">To</text>

  <!-- Divider -->
  <line x1="12" y1="534" x2="248" y2="534" stroke="#3A3A5A" stroke-width="1"/>

  <!-- Summary cards -->
  <text x="16" y="557" font-size="11" font-weight="600" fill="#A0A0B8" letter-spacing="0.6">Summary</text>
  <text x="210" y="557" font-size="10" fill="#A0A0B8">Total: 38</text>

  <rect x="12" y="565" width="112" height="46" rx="8" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.25)"/>
  <text x="22" y="595" font-size="20" font-weight="700" fill="#4ADE80">32</text>
  <text x="22" y="607" font-size="9" fill="rgba(160,160,184,0.8)">Pass</text>

  <rect x="128" y="565" width="112" height="46" rx="8" fill="rgba(250,204,21,0.08)" stroke="rgba(250,204,21,0.25)"/>
  <text x="138" y="595" font-size="20" font-weight="700" fill="#FACC15">3</text>
  <text x="138" y="607" font-size="9" fill="rgba(160,160,184,0.8)">Warning</text>

  <rect x="12" y="617" width="112" height="46" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)"/>
  <text x="22" y="647" font-size="20" font-weight="700" fill="#EF4444">1</text>
  <text x="22" y="659" font-size="9" fill="rgba(160,160,184,0.8)">Fail</text>

  <rect x="128" y="617" width="112" height="46" rx="8" fill="rgba(136,136,136,0.08)" stroke="rgba(136,136,136,0.25)"/>
  <text x="138" y="647" font-size="20" font-weight="700" fill="#888888">2</text>
  <text x="138" y="659" font-size="9" fill="rgba(160,160,184,0.8)">Skipped</text>

  <!-- ═══ Vertical divider ═══ -->
  <rect x="260" y="36" width="1" height="714" fill="#3A3A5A"/>

  <!-- ═══ Content area (right of sidebar) ═══ -->

  <!-- Content header bar -->
  <rect x="261" y="36" width="839" height="41" fill="#1A1A2E"/>
  <rect x="261" y="76" width="839" height="1" fill="#3A3A5A"/>
  <text x="279" y="62" font-size="15" font-weight="600" fill="#E0E0E0">Results</text>
  <rect x="1000" y="44" width="80" height="26" rx="6" fill="none" stroke="#5A5A7A" stroke-width="1"/>
  <text x="1012" y="61" font-size="12" fill="#A0A0B8">↻ Reset</text>

  <!-- Group G1 Card (expanded) -->
  <rect x="269" y="85" width="823" height="80" rx="10" fill="#16213E" stroke="#2A2A4A" stroke-width="1"/>
  <rect x="281" y="93" width="3" height="20" rx="2" fill="#0078D4"/>
  <text x="294" y="108" font-size="13" font-weight="600" fill="#E0E0E0">G1 System &amp; Adapters</text>
  <text x="1020" y="108" font-size="11" fill="#A0A0B8">7/7</text>
  <rect x="1050" y="96" width="18" height="16" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="1055" y="108" font-size="10" font-weight="700" fill="#4ADE80">7</text>
  <rect x="281" y="121" width="799" height="3" rx="2" fill="#2A2A4A"/>
  <rect x="281" y="121" width="799" height="3" rx="2" fill="#4ADE80"/>
  <text x="281" y="144" font-size="12" fill="#E0E0E0">Network Adapters</text>
  <text x="1050" y="144" font-size="10" fill="#A0A0B8">120ms</text>
  <text x="281" y="158" font-size="12" fill="#E0E0E0">WiFi</text>
  <text x="1050" y="158" font-size="10" fill="#A0A0B8">340ms</text>

  <!-- Group G5 Card (running) -->
  <rect x="269" y="173" width="823" height="80" rx="10" fill="#16213E" stroke="rgba(0,188,212,0.4)" stroke-width="1"/>
  <rect x="281" y="181" width="3" height="20" rx="2" fill="#00BCD4"/>
  <text x="294" y="196" font-size="13" font-weight="600" fill="#E0E0E0">G5 Website / URL</text>
  <text x="1020" y="196" font-size="11" fill="#A0A0B8">12/13</text>
  <rect x="1050" y="184" width="18" height="16" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="1055" y="196" font-size="10" font-weight="700" fill="#4ADE80">11</text>
  <rect x="1070" y="184" width="18" height="16" rx="4" fill="rgba(250,204,21,0.15)"/>
  <text x="1075" y="196" font-size="10" font-weight="700" fill="#FACC15">1</text>
  <rect x="281" y="209" width="799" height="3" rx="2" fill="#2A2A4A"/>
  <rect x="281" y="209" width="735" height="3" rx="2" fill="#00BCD4"/>
  <text x="281" y="232" font-size="12" fill="#E0E0E0">URL Parsing</text>
  <text x="1050" y="232" font-size="10" fill="#A0A0B8">5ms</text>
  <text x="281" y="246" font-size="12" fill="#E0E0E0">TCP Connect</text>
  <text x="1050" y="246" font-size="10" fill="#A0A0B8">45ms</text>

  <!-- Bottom status bar -->
  <rect x="261" y="710" width="839" height="40" fill="#1A1A2E"/>
  <rect x="261" y="710" width="839" height="1" fill="#3A3A5A"/>
  <circle cx="285" cy="730" r="7" fill="none" stroke="#00BCD4" stroke-width="2" stroke-dasharray="33 11"/>
  <text x="301" y="735" font-size="12" font-weight="600" fill="#00BCD4">Running</text>
  <text x="600" y="735" font-size="11" fill="#00BCD4">HTTP Timing...</text>
  <text x="1070" y="735" font-size="11" font-weight="600" fill="#A0A0B8">35 / 38</text>

  <!-- Annotations -->
  <text x="550" y="748" font-size="9" fill="#00BCD4" text-anchor="middle">
    Diagnostics Screen — Desktop Wide (≥600px) — 5-tab nav bar (AppContent.qml) — Sidebar 260px
  </text>
</svg>
