<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'DejaVu Sans Mono', monospace; }
      .tp { fill: #E0E0E0; } .ts { fill: #A0A0B8; } .tc { fill: #00BCD4; } .tb { fill: #0078D4; }
    </style>
  </defs>

  <rect width="1100" height="700" fill="#1E1E2E"/>

  <!-- ═══ Navigation Bar (AppContent.qml) ═══ -->
  <rect x="0" y="0" width="1100" height="36" fill="#1A1A2E"/>
  <rect x="0" y="35" width="1100" height="1" fill="#3A3A5A"/>
  <!-- Dashboard -->
  <rect x="308" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="330" y="22" font-size="10" fill="#A0A0B8">⊞ Dashboard</text>
  <!-- Diagnostics -->
  <rect x="410" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="430" y="22" font-size="10" fill="#A0A0B8">⚡ Diagnostics</text>
  <!-- Config (active) -->
  <rect x="512" y="2" width="100" height="32" rx="6" fill="rgba(0,188,212,0.10)"/>
  <rect x="512" y="32" width="100" height="2" fill="#00BCD4"/>
  <text x="538" y="22" font-size="10" fill="#00BCD4">⚙ Config</text>
  <!-- Report -->
  <rect x="614" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="638" y="22" font-size="10" fill="#A0A0B8">📄 Report</text>
  <!-- Settings -->
  <rect x="716" y="2" width="100" height="32" rx="6" fill="transparent"/>
  <text x="735" y="22" font-size="10" fill="#A0A0B8">⚙ Settings</text>
  <!-- Close btn -->
  <rect x="1060" y="6" width="24" height="24" rx="4" fill="transparent"/>
  <text x="1068" y="23" font-size="14" fill="#A0A0B8" text-anchor="middle">✕</text>

  <!-- AppBar -->
  <rect x="0" y="36" width="1100" height="84" fill="#1A1A2E"/>
  <rect x="0" y="119" width="1100" height="1" fill="#3A3A5A"/>
  <text x="20" y="63" font-size="15" font-weight="600" fill="#E0E0E0">⚙ Test Configuration</text>

  <!-- TabBar (G1-G5) -->
  <rect x="0" y="66" width="1100" height="38" fill="#1A1A2E"/>
  <text x="40" y="92" font-size="12" font-weight="600" fill="#00BCD4">G1</text>
  <rect x="32" y="103" width="32" height="2" fill="#00BCD4"/>
  <text x="90" y="92" font-size="12" fill="#A0A0B8">G2</text>
  <text x="140" y="92" font-size="12" fill="#A0A0B8">G3</text>
  <text x="190" y="92" font-size="12" fill="#A0A0B8">G4</text>
  <text x="240" y="92" font-size="12" fill="#A0A0B8">G5</text>

  <!-- Action bar -->
  <rect x="0" y="120" width="1100" height="44" fill="rgba(22,33,62,0.5)"/>
  <rect x="0" y="163" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="138" font-size="14" font-weight="600" fill="#E0E0E0">System &amp; Adapters</text>
  <text x="20" y="153" font-size="11" fill="#A0A0B8">7 tests</text>
  <rect x="920" y="127" width="80" height="28" rx="6" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="932" y="145" font-size="11" fill="#E0E0E0">Select All</text>
  <rect x="1008" y="127" width="80" height="28" rx="6" fill="none" stroke="#3A3A5A" stroke-width="1"/>
  <text x="1014" y="145" font-size="11" fill="#E0E0E0">Deselect</text>

  <!-- Test list items (SwitchListTile pattern) -->
  <!-- Item 1 (enabled) -->
  <rect x="0" y="164" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="207" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="185" font-size="20" fill="#0078D4">✓</text>
  <text x="52" y="181" font-size="13" font-weight="500" fill="#E0E0E0">Network Adapters</text>
  <text x="52" y="197" font-size="11" fill="rgba(160,160,184,0.6)">Enumerate all network interfaces and their properties</text>
  <rect x="1040" y="174" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="186" r="10" fill="#FFFFFF"/>

  <!-- Item 2 (disabled) -->
  <rect x="0" y="208" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="251" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="229" font-size="20" fill="#5A5A7A">○</text>
  <text x="52" y="225" font-size="13" font-weight="500" fill="#E0E0E0">WiFi</text>
  <text x="52" y="241" font-size="11" fill="rgba(160,160,184,0.6)">Wireless interface diagnostics and signal analysis</text>
  <rect x="1040" y="218" width="44" height="24" rx="12" fill="#2A2A4A"/>
  <circle cx="1052" cy="230" r="10" fill="#5A5A7A"/>

  <!-- Item 3 (enabled) -->
  <rect x="0" y="252" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="295" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="273" font-size="20" fill="#0078D4">✓</text>
  <text x="52" y="269" font-size="13" font-weight="500" fill="#E0E0E0">Wired</text>
  <text x="52" y="285" font-size="11" fill="rgba(160,160,184,0.6)">Ethernet adapter diagnostics and link status</text>
  <rect x="1040" y="262" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="274" r="10" fill="#FFFFFF"/>

  <!-- Item 4 (enabled) -->
  <rect x="0" y="296" width="1100" height="44" fill="transparent"/>
  <rect x="0" y="339" width="1100" height="1" fill="#2A2A4A"/>
  <text x="20" y="317" font-size="20" fill="#0078D4">✓</text>
  <text x="52" y="313" font-size="13" font-weight="500" fill="#E0E0E0">DHCP Status</text>
  <text x="52" y="329" font-size="11" fill="rgba(160,160,184,0.6)">DHCP lease information and configuration</text>
  <rect x="1040" y="306" width="44" height="24" rx="12" fill="#0078D4"/>
  <circle cx="1062" cy="318" r="10" fill="#FFFFFF"/>

  <text x="550" y="696" font-size="9" fill="#00BCD4" text-anchor="middle">
    Config Screen — 5-tab nav — AppBar + TabBar (G1-G5) — Action bar — SwitchListTile items
  </text>
</svg>
