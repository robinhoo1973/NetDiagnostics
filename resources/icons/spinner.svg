<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
  <!-- 8-petal spinner — chrysanthemum style, cyan #00BCD4 -->
  <g opacity="0.15"><line x1="12" y1="3" x2="12" y2="7"/></g>
  <g opacity="0.25"><line x1="12" y1="3" x2="12" y2="7" transform="rotate(45 12 12)"/></g>
  <g opacity="0.4"><line x1="12" y1="3" x2="12" y2="7" transform="rotate(90 12 12)"/></g>
  <g opacity="0.55"><line x1="12" y1="3" x2="12" y2="7" transform="rotate(135 12 12)"/></g>
  <g opacity="0.7"><line x1="12" y1="3" x2="12" y2="7" transform="rotate(180 12 12)"/></g>
  <g opacity="0.85"><line x1="12" y1="3" x2="12" y2="7" transform="rotate(225 12 12)"/></g>
  <line x1="12" y1="3" x2="12" y2="7" transform="rotate(270 12 12)"/>
  <line x1="12" y1="3" x2="12" y2="7" transform="rotate(315 12 12)"/>
  <circle cx="12" cy="12" r="2" fill="#00BCD4" stroke="white"/>
</svg>
